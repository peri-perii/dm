      {d:'easy',q:'What does this print?',c:`class A{int x=5;public:\n  int get()const{return x;}\n};\nint main(){const A a;cout<<a.get();}`,o:['5','const','x','Error'],a:0,e:'const object can only call const methods. get() returns x=5.'},
      {d:'easy',q:'What is the output?',c:`#include<set>\nint main(){\n  set<int> s={3,1,4,1,5};\n  cout<<*s.begin();\n}`,o:['1','3','4','Error'],a:0,e:'set is sorted. begin() points to the smallest element = 1.'},
      {d:'easy',q:'What is printed?',c:`#include<map>\nint main(){\n  map<string,int> m;\n  m["a"]=1;m["b"]=2;\n  cout<<m["a"]+m["b"];\n}`,o:['3','12','ab','Error'],a:0,e:'m["a"]=1, m["b"]=2. Sum=3.'},
      {d:'easy',q:'What is the output?',c:`class A{public:void show(){cout<<"A";}};\nclass B:public A{public:void show(){cout<<"B";}};\nint main(){B b;b.show();}`,o:['B','A','AB','Error'],a:0,e:'b.show() calls B::show() (name hiding). Output: B.'},
      {d:'easy',q:'What is printed?',c:`class Inner{public:int x=5;};\nclass Outer{public:Inner i;};\nint main(){Outer o;cout<<o.i.x;}`,o:['5','0','i.x','Error'],a:0,e:'Outer has Inner member i. i.x is default-initialized to 5.'},
      {d:'easy',q:'What is the output?',c:`int main(){\n  int x=10;\n  auto f=[&x](){x++;};\n  f();f();\n  cout<<x;\n}`,o:['12','10','11','Error'],a:0,e:'[&x] captures by reference. Two increments: x becomes 12.'},
      {d:'easy',q:'What does this print?',c:`class A{int x;public:\n  A(int v):x(v){}\n  operator int(){return x;}\n};\nint main(){A a(5);int n=a;cout<<n;}`,o:['5','a','x','Error'],a:0,e:'operator int() converts A to int. n=a calls it. n=5.'},
      {d:'easy',q:'What is the output?',c:`constexpr int cube(int x){return x*x*x;}\nint main(){cout<<cube(3);}`,o:['27','9','3','Error'],a:0,e:'cube(3)=3*3*3=27, computed at compile time.'},
      {d:'easy',q:'What is printed?',c:`#include<memory>\nint main(){\n  auto p1=make_unique<int>(10);\n  auto p2=move(p1);\n  cout<<(p1==nullptr)<<*p2;\n}`,o:['110','010','1','Error'],a:0,e:'After move, p1=nullptr (prints 1). p2 owns int 10 (prints 10). Output: 110.'},
      {d:'easy',q:'What is the output?',c:`class A{public:int x=1;};\nclass B:public A{public:int y=2;};\nint main(){B b;cout<<b.x<<b.y;}`,o:['12','21','1','Error'],a:0,e:'B inherits x=1 from A, has y=2. Prints 12.'},
      {d:'easy',q:'What does this print?',c:`#include<memory>\nint main(){\n  auto s=make_shared<int>(5);\n  cout<<s.use_count();\n  auto s2=s;\n  cout<<s.use_count();\n}`,o:['12','11','21','Error'],a:0,e:'Initially use_count=1. After s2=s both share ownership: use_count=2. Output: 12.'},
      {d:'easy',q:'What is the output?',c:`void f(int){cout<<"I";}\nvoid f(double){cout<<"D";}\nvoid f(string){cout<<"S";}\nint main(){f(3.14);f("hi");f(1);}`,o:['DSI','DIS','IDS','SDI'],a:0,e:'3.14=double(D), "hi"=string(S), 1=int(I). Output: DSI.'},
      {d:'easy',q:'What is printed?',c:`namespace A{namespace B{int x=5;}}\nint main(){cout<<A::B::x;}`,o:['5','AB','x','Error'],a:0,e:'Nested namespace A::B contains x=5.'},
      {d:'easy',q:'What is the output?',c:`class A{public:int x;\n  A(int v):x(v){}\n};\nint main(){A arr[]={A(1),A(2),A(3)};cout<<arr[2].x;}`,o:['3','1','2','Error'],a:0,e:'arr[2] is A(3). Its x=3.'},
      
      // MEDIUM
      {d:'medium',q:'What is the output?',c:`class A{public:A(){cout<<"A";}~A(){cout<<"a";}};\nclass B{public:B(){cout<<"B";}~B(){cout<<"b";}};\nint main(){A a;B b;}`,o:['ABba','ABab','BAab','ABBA'],a:0,e:'Constructed A then B. Destroyed LIFO: b then a. Output: ABba.'},
      {d:'medium',q:'What is printed?',c:`class B{public:B(){cout<<"B";}};\nclass D:public B{public:D(){cout<<"D";}};\nint main(){D d;}`,o:['BD','DB','B','D'],a:0,e:'Base constructor runs before derived. B() then D(). Output: BD.'},
      {d:'medium',q:'What is the output?',c:`class B{public:~B(){cout<<"~B";}};\nclass D:public B{public:~D(){cout<<"~D";}};\nint main(){D d;}`,o:['~D~B','~B~D','~D','~B'],a:0,e:'Destructor order: derived first, then base. ~D~B.'},
      {d:'medium',q:'What does this print?',c:`class B{public:\n  void f(){cout<<"B";}\n  virtual void g(){cout<<"B";}\n};\nclass D:public B{public:\n  void f(){cout<<"D";}\n  void g()override{cout<<"D";}\n};\nint main(){B* p=new D();p->f();p->g();delete p;}`,o:['BD','DB','BB','DD'],a:0,e:'p->f(): non-virtual, resolved by pointer type B. p->g(): virtual, resolved by object D. Output: BD.'},
      {d:'medium',q:'What is the output?',c:`class A{static int n;public:\n  A(){n++;} ~A(){n--;}\n  static int get(){return n;}\n};\nint A::n=0;\nint main(){A a,b;{A c;cout<<A::get();}cout<<A::get();}`,o:['32','33','23','31'],a:0,e:'After a,b,c: n=3. Print 3. c destroyed: n=2. Print 2. Output: 32.'},
      {d:'medium',q:'What is printed?',c:`void f(int){cout<<"int";}\nvoid f(double){cout<<"double";}\nint main(){f(3.14);}`,o:['double','int','3.14','Error'],a:0,e:'3.14 is a double literal. f(double) is exact match.'},
      {d:'medium',q:'What is the output?',c:`class A{public:int x=1;void show(){cout<<x;}};\nclass B:public A{public:int x=2;void show(){cout<<x;}};\nint main(){B b;b.show();b.A::show();}`,o:['21','12','11','22'],a:0,e:'b.show() calls B::show() -> x=2. b.A::show() calls A::show() -> A::x=1. Output: 21.'},
      {d:'medium',q:'What is printed?',c:`class B{\npublic:\n  virtual void f(){cout<<"B";}\n  virtual void g(){cout<<"GB";}\n};\nclass D:public B{\npublic:\n  void f()override{cout<<"D";}\n};\nint main(){B* p=new D();p->f();p->g();delete p;}`,o:['DGB','DGD','BGB','Error'],a:0,e:'p->f(): virtual, D overrides it -> D. p->g(): virtual, D does NOT override it -> B::g() -> GB. Output: DGB.'},
      {d:'medium',q:'What is the output?',c:`class A{public:\n  A(){cout<<"D";}\n  A(int){cout<<"I";}\n  A(const A&){cout<<"C";}\n};\nint main(){A a;A b(1);A c=a;}`,o:['DIC','DCI','IDC','Error'],a:0,e:'A a: default(D). A b(1): int param(I). A c=a: copy(C). Output: DIC.'},
      {d:'medium',q:'What is printed?',c:`int main(){\n  int x=10;\n  auto f=[&x](){cout<<x;};\n  x=20;\n  f();\n}`,o:['20','10','x','Error'],a:0,e:'[&x] captures by reference. By call time x=20. Prints 20.'},
      {d:'medium',q:'What is the output?',c:`void f(){try{throw 1;}catch(int){cout<<"A";throw;}}\nint main(){try{f();}catch(int){cout<<"B";}}`,o:['AB','A','B','Error'],a:0,e:'f() catches, prints A, rethrows. main catches, prints B. Output: AB.'},
      {d:'medium',q:'What is printed?',c:`class A{int x=7;friend class B;};\nclass B{public:void show(A& a){cout<<a.x;}};\nint main(){A a;B b;b.show(a);}`,o:['7','x','A','Error'],a:0,e:'B is a friend of A, accessing private x=7.'},
      {d:'medium',q:'What is the output?',c:`int x=1;\nclass A{public:int x=2;void show(){cout<<x<<::x;}};\nint main(){A a;a.show();}`,o:['21','12','11','22'],a:0,e:'x refers to member x=2. ::x refers to global x=1. Output: 21.'},
      {d:'medium',q:'What is printed?',c:`class Shape{public:\n  virtual double area()=0;\n  void show(){cout<<"A="<<(int)area();}\n};\nclass Sq:public Shape{double s;\npublic:\n  Sq(double x):s(x){}\n  double area()override{return s*s;}\n};\nint main(){Sq q(3);q.show();}`,o:['A=9','A=3','9','Error'],a:0,e:'Virtual dispatch calls Sq::area()=9. show() prints A=9.'},
      {d:'medium',q:'What is the output?',c:`class A{public:\n  A(){cout<<"C";}\n  A(const A&){cout<<"P";}\n  A(A&&){cout<<"M";}\n};\nint main(){A a;A b=move(a);}`,o:['CM','CP','CC','Error'],a:0,e:'A a: default ctor(C). A b=move(a): move ctor(M). Output: CM.'},
      {d:'medium',q:'What is printed?',c:`#include<map>\nint main(){\n  map<int,char> m={{3,'c'},{1,'a'},{2,'b'}};\n  for(auto& p:m)cout<<p.second;\n}`,o:['abc','cba','bca','Error'],a:0,e:'std::map sorts by key: 1,2,3 -> a,b,c. Output: abc.'},
      {d:'medium',q:'What is the output?',c:`#include<memory>\nint main(){\n  auto s=make_shared<int>(5);\n  cout<<s.use_count();\n  {auto s2=s;cout<<s.use_count();}\n  cout<<s.use_count();\n}`,o:['121','122','111','Error'],a:0,e:'Count: 1 initially, 2 after s2 copies, 1 after s2 destroyed. Output: 121.'},
      {d:'medium',q:'What is printed?',c:`class A{public:A(){throw runtime_error("err");}};\nint main(){\n  try{A a;}\n  catch(const exception& e){cout<<e.what();}\n}`,o:['err','Error','A','Nothing'],a:0,e:"A's constructor throws. Caught by exception ref. what()='err'."},
      {d:'medium',q:'What is the output?',c:`class Animal{public:virtual void speak(){cout<<"?";}};  \nclass Cat:public Animal{public:void speak()override{cout<<"M";}};\nclass Dog:public Animal{public:void speak()override{cout<<"W";}};\nint main(){\n  Animal* a[]={new Cat(),new Dog(),new Cat()};\n  for(auto p:a)p->speak();\n}`,o:['MWM','WMW','MMW','Error'],a:0,e:'Virtual dispatch: Cat->M, Dog->W, Cat->M. Output: MWM.'},
      {d:'medium',q:'What is printed?',c:`class A{protected:int x=5;};\nclass B:public A{public:void show(){x*=2;cout<<x;}};\nint main(){B b;b.show();}`,o:['10','5','x','Error'],a:0,e:'Protected x is accessible in B. x*=2 -> x=10.'},
      {d:'medium',q:'What is the output?',c:`class Cnt{int n;public:\n  Cnt(int x):n(x){}\n  Cnt& operator++(){++n;return *this;}\n  Cnt operator++(int){Cnt t=*this;++n;return t;}\n  int get(){return n;}\n};\nint main(){Cnt c(0);cout<<(++c).get()<<(c++).get()<<c.get();}`,o:['112','012','123','111'],a:0,e:'++c: n=1, returns 1. c++: returns old n=1, then n=2. c.get()=2. Output: 112.'},
      {d:'medium',q:'What is printed?',c:`class A{int x,y;public:\n  A(int a,int b):x(a),y(b){cout<<x<<y;}\n  A(int a):A(a,a){}\n};\nint main(){A a(3);}`,o:['33','3','6','Error'],a:0,e:'A(3) delegates to A(3,3). Prints x=3 y=3 -> 33.'},
      {d:'medium',q:'What is the output?',c:`class Guard{public:\n  Guard(){cout<<"open";}\n  ~Guard(){cout<<"close";}\n};\nvoid work(){Guard g;cout<<"work";}\nint main(){work();}`,o:['openworkclose','workopenclose','openclose','Error'],a:0,e:'Guard ctor(open), work body(work), Guard dtor(close). Output: openworkclose.'},
      {d:'medium',q:'What is printed?',c:`class A{public:A(){cout<<"A";}};\nclass B{public:B(){cout<<"B";}};\nclass C:public A,public B{public:C(){cout<<"C";}};\nint main(){C c;}`,o:['ABC','BAC','CAB','Error'],a:0,e:'Bases constructed in declaration order (A then B), then C. Output: ABC.'},
      {d:'medium',q:'What is the output?',c:`class B{public:virtual int val(){return 0;}};\nclass D:public B{int x;public:\n  D(int v):x(v){}\n  int val()override{return x;}\n};\nint main(){B* p=new D(42);cout<<p->val();delete p;}`,o:['42','0','D','Error'],a:0,e:'Virtual dispatch: p->val() calls D::val() -> 42.'},
      {d:'medium',q:'What is printed?',c:`class A{static int x;public:\n  static void inc(){x++;}\n  static int get(){return x;}\n};\nint A::x=0;\nint main(){A::inc();A::inc();cout<<A::get();}`,o:['2','1','0','Error'],a:0,e:'Two inc() calls increment static x to 2. get() returns 2.'},
      {d:'medium',q:'What is the output?',c:`class B{public:virtual ~B(){cout<<"~B";}};\nclass D:public B{public:~D(){cout<<"~D";}};\nint main(){B* p=new D();delete p;}`,o:['~D~B','~B~D','~D','~B'],a:0,e:'Virtual destructor: delete p calls ~D() then ~B(). Output: ~D~B.'},
      {d:'medium',q:'What is printed?',c:`class A{public:A(){cout<<"A";}~A(){cout<<"a";}};\nclass B{A a;public:B(){cout<<"B";}~B(){cout<<"b";}};\nint main(){B b;}`,o:['ABba','BAab','ABab','Error'],a:0,e:'Member a constructed before B body: A, B. Destroyed: B body(b), then member a. Output: ABba.'},
      {d:'medium',q:'What is the output?',c:`#include<vector>\ntemplate<typename T>\nclass Stack{\n  vector<T> v;\npublic:\n  void push(T x){v.push_back(x);}\n  T top(){return v.back();}\n  int size(){return v.size();}\n};\nint main(){Stack<int> s;s.push(1);s.push(2);s.push(3);cout<<s.top()<<s.size();}`,o:['33','31','13','Error'],a:0,e:'After 3 pushes, top()=3, size()=3. Output: 33.'},
      {d:'medium',q:'What is printed?',c:`class MyEx:public runtime_error{public:\n  MyEx():runtime_error("mine"){}\n};\nint main(){\n  try{throw MyEx();}\n  catch(const exception& e){cout<<e.what();}\n}`,o:['mine','MyEx','Error','runtime'],a:0,e:'MyEx inherits runtime_error. Caught by base ref. what()=mine.'},
      {d:'medium',q:'What is the output?',c:`class A{mutable int x=0;public:\n  void inc()const{x++;}\n  int get()const{return x;}\n};\nint main(){const A a;a.inc();a.inc();cout<<a.get();}`,o:['2','0','1','Error'],a:0,e:'mutable allows modification in const functions. Two inc() -> x=2.'},
      {d:'medium',q:'What is printed?',c:`class Base{public:virtual void f(int x){cout<<"B"<<x;}};\nclass Der:public Base{public:void f(int x)override{cout<<"D"<<x;}};\nint main(){Base* p=new Der();p->f(5);delete p;}`,o:['D5','B5','5','Error'],a:0,e:'Virtual dispatch: p->f(5) calls Der::f(5) -> D5.'},
      {d:'medium',q:'What is the output?',c:`class Adder{int n;public:\n  Adder(int x):n(x){}\n  int operator()(int x){return x+n;}\n};\nint main(){Adder add5(5);cout<<add5(3)<<add5(10);}`,o:['815','53','35','Error'],a:0,e:'Functor: add5(3)=3+5=8, add5(10)=10+5=15. Output: 815.'},
      {d:'medium',q:'What is printed?',c:`#include<vector>\n#include<algorithm>\nint main(){\n  vector<int> v={3,1,4,1,5,9};\n  sort(v.begin(),v.end());\n  cout<<v[0]<<v.back();\n}`,o:['19','39','91','Error'],a:0,e:'Sorted: {1,1,3,4,5,9}. v[0]=1, v.back()=9. Output: 19.'},
      {d:'medium',q:'What is the output?',c:`#include<queue>\nint main(){\n  priority_queue<int> pq;\n  pq.push(3);pq.push(1);pq.push(4);\n  cout<<pq.top();\n}`,o:['4','1','3','Error'],a:0,e:'priority_queue is a max-heap. top() returns largest = 4.'},
      {d:'medium',q:'What is printed?',c:`#include<initializer_list>\nclass Sum{int t=0;public:\n  Sum(initializer_list<int> l){for(auto x:l)t+=x;}\n  int get(){return t;}\n};\nint main(){Sum s{1,2,3,4,5};cout<<s.get();}`,o:['15','12345','0','Error'],a:0,e:'Sums 1+2+3+4+5=15.'},
      {d:'medium',q:'What is the output?',c:`class Builder{string s;public:\n  Builder& add(const string& x){s+=x;return *this;}\n  void show(){cout<<s;}\n};\nint main(){Builder b;b.add("Hi").add(" ").add("OOP").show();}`,o:['Hi OOP','HiOOP','Hi','Error'],a:0,e:'Method chaining concatenates strings. Result: Hi OOP.'},
      {d:'medium',q:'What is printed?',c:`class A{public:virtual ~A(){}};\nclass B:public A{};\nint main(){\n  A* a=new B();\n  B* b=dynamic_cast<B*>(a);\n  cout<<(b!=nullptr?"ok":"fail");\n  delete a;\n}`,o:['ok','fail','Error','nullptr'],a:0,e:'dynamic_cast<B*>(a) succeeds since a actually points to a B object.'},
      {d:'medium',q:'What is the output?',c:`#include<memory>\nint main(){\n  shared_ptr<int> sp=make_shared<int>(5);\n  weak_ptr<int> wp=sp;\n  cout<<wp.expired();\n  sp.reset();\n  cout<<wp.expired();\n}`,o:['01','10','00','11'],a:0,e:'wp is valid(0) initially. After sp.reset(), no owner remains, wp expires(1). Output: 01.'},
      {d:'medium',q:'What is printed?',c:`class B{public:B(){f();}virtual void f(){cout<<"B";}};\nclass D:public B{public:D(){f();}void f()override{cout<<"D";}};\nint main(){D d;}`,o:['BD','DD','BB','DB'],a:0,e:'During B(): vtable is B, no polymorphism yet -> B::f() -> B. During D(): vtable is D -> D::f() -> D. Output: BD.'},
      {d:'medium',q:'What is the output?',c:`template<int N>\nstruct Fact{static const int val=N*Fact<N-1>::val;};\ntemplate<>struct Fact<0>{static const int val=1;};\nint main(){cout<<Fact<5>::val;}`,o:['120','24','5','Error'],a:0,e:'Compile-time factorial: 5*4*3*2*1=120.'},
      {d:'medium',q:'What is printed?',c:`#include<vector>\n#include<algorithm>\nint main(){\n  vector<int> v={1,2,3};\n  int s=0;\n  for_each(v.begin(),v.end(),[&s](int x){s+=x;});\n  cout<<s;\n}`,o:['6','123','0','Error'],a:0,e:'for_each with lambda sums elements: 1+2+3=6.'},
      {d:'medium',q:'What is the output?',c:`class Base{public:int x=1;virtual int get(){return x;}};\nclass Der:public Base{public:int y=2;int get()override{return x+y;}};\nint main(){Der d;Base b=d;cout<<b.get();}`,o:['1','3','2','Error'],a:0,e:'Base b=d: object slicing. b is a Base value copy. b.get() calls Base::get() (no vtable on values) -> x=1.'},
      {d:'medium',q:'What is printed?',c:`class A{public:A(int x){cout<<"A"<<x;}};\nvoid f(A a){cout<<"f";}\nint main(){f(42);}`,o:['A42f','f42','42f','Error'],a:0,e:'f(42): implicit conversion int->A via A(int). Prints A42, then f. Output: A42f.'},
      {d:'medium',q:'What is the output?',c:`template<typename T>class TypeId{public:static string name(){return "unknown";}};\ntemplate<>class TypeId<int>{public:static string name(){return "int";}};\nint main(){cout<<TypeId<int>::name()<<" "<<TypeId<char>::name();}`,o:['int unknown','int char','unknown int','Error'],a:0,e:'TypeId<int> uses specialization -> int. TypeId<char> uses general template -> unknown.'},
      {d:'medium',q:'What is printed?',c:`class A{static int x;public:\n  static int get(){return x;}\n  static void set(int v){x=v;}\n};\nint A::x=10;\nint main(){A::set(20);cout<<A::get();}`,o:['20','10','x','Error'],a:0,e:'Static x initialized to 10, set(20) changes it, get() returns 20.'},
      {d:'medium',q:'What is the output?',c:`class Base{public:void f(int x){cout<<"B"<<x;}};\nclass Der:public Base{public:void f(double x){cout<<"D"<<(int)x;}};\nint main(){Der d;d.f(5);}`,o:['D5','B5','5','Error'],a:0,e:'D::f(double) hides Base::f(int). d.f(5): 5 converts to double, calls D::f -> D5.'},
      {d:'medium',q:'What is printed?',c:`template<typename T>\nT sum(T x){return x;}\ntemplate<typename T,typename... Args>\nT sum(T x,Args... args){return x+sum(args...);}\nint main(){cout<<sum(1,2,3,4,5);}`,o:['15','12345','5','Error'],a:0,e:'Variadic template sums all args: 1+2+3+4+5=15.'},
      {d:'medium',q:'What is the output?',c:`void safe()noexcept{cout<<"safe";}\nint main(){\n  safe();\n  cout<<(noexcept(safe())?"T":"F");\n}`,o:['safeT','safeF','safe','Error'],a:0,e:'safe() prints safe. noexcept(safe()) is true -> T. Output: safeT.'},
      {d:'medium',q:'What is printed?',c:`#include<tuple>\nint main(){\n  auto [a,b,c]=make_tuple(1,2.5,string("hi"));\n  cout<<a<<b<<c;\n}`,o:['12.5hi','12hi','1hi','Error'],a:0,e:'Structured bindings: a=1, b=2.5, c=hi. Prints 12.5hi.'},
      {d:'medium',q:'What is the output?',c:`#include<utility>\nvoid f(int&){cout<<"L";}\nvoid f(int&&){cout<<"R";}\ntemplate<typename T>void fwd(T&& x){f(forward<T>(x));}\nint main(){int n=5;fwd(n);fwd(5);}`,o:['LR','RL','LL','RR'],a:0,e:'fwd(n): n is lvalue -> L. fwd(5): 5 is rvalue -> R. Output: LR.'},
      {d:'medium',q:'What is printed?',c:`#include<type_traits>\nint main(){\n  cout<<is_integral<int>::value;\n  cout<<is_floating_point<double>::value;\n  cout<<is_pointer<int*>::value;\n}`,o:['111','100','010','Error'],a:0,e:'int is integral(1), double is floating_point(1), int* is pointer(1). Output: 111.'},
      {d:'medium',q:'What is the output?',c:`enum class Color{Red=1,Green=2,Blue=4};\nint main(){Color c=Color::Green;cout<<static_cast<int>(c);}`,o:['2','Green','1','Error'],a:0,e:'Color::Green has value 2. static_cast<int> converts enum class to int.'},
      {d:'medium',q:'What is printed?',c:`class I{public:virtual void run()=0;virtual ~I(){}};\nclass A:public I{public:void run()override{cout<<"A";}};\nclass B:public A{public:void run()override{cout<<"B";A::run();}};\nint main(){I* p=new B();p->run();delete p;}`,o:['BA','AB','B','A'],a:0,e:'p->run() dispatched to B::run(): prints B, then calls A::run() -> A. Output: BA.'},

      {d:'hard',q:'What is printed?',c:`class A{\npublic:\n  virtual void f(){cout<<"A";}\n  void g(){f();}\n};\nclass B:public A{public:void f()override{cout<<"B";}};\nclass C:public B{public:void f()override{cout<<"C";}};\nint main(){A* p=new C();p->g();delete p;}`,o:['C','A','B','Error'],a:0,e:'p->g() is non-virtual, calls A::g(). Inside g(), f() dispatches via this (C) -> C::f() -> C.'},
      {d:'hard',q:'What is the output?',c:`class A{public:int x;A(int v):x(v){cout<<"A"<<v;}~A(){cout<<"~A"<<x;}};\nclass B{A a1,a2;public:B():a1(1),a2(2){cout<<"B";}~B(){cout<<"~B";}};\nint main(){B b;}`,o:['A1A2B~B~A2~A1','A1A2B~A1~A2~B','BA1A2~B~A2~A1','Error'],a:0,e:'Members a1,a2 before B body: A1,A2,B. Destruction: ~B body, then members reversed: ~A2,~A1. Output: A1A2B~B~A2~A1.'},
      {d:'hard',q:'What is printed?',c:`class A{string n;public:\n  A(string x):n(x){cout<<"+"<<n;}\n  ~A(){cout<<"-"<<n;}\n};\nvoid risky(){A g("G");throw runtime_error("oops");}\nint main(){try{A m("M");risky();}catch(...){cout<<"E";}}`,o:['+M+G-G-ME','+M+G-M-GE','+M+GE','+M+G-GE-M'],a:0,e:'Create M(+M), create G(+G), throw: unwind risky(-G), then try block(-M), catch(E). Output: +M+G-G-ME.'},
      {d:'hard',q:'What is the output?',c:`template<typename T>class Base{public:\n  void iface(){static_cast<T*>(this)->impl();}\n};\nclass Der:public Base<Der>{public:void impl(){cout<<"CRTP";}};\nint main(){Der d;d.iface();}`,o:['CRTP','Base','Der','Error'],a:0,e:'CRTP: Base<Der> casts this to Der* and calls impl(). Prints CRTP.'},
      {d:'hard',q:'What is printed?',c:`class A{public:\n  A(){cout<<"A";}\n  ~A(){cout<<"~A";}\n};\nclass B{A a;public:\n  B(){cout<<"B";throw 1;}\n  ~B(){cout<<"~B";}\n};\nint main(){try{B b;}catch(int){cout<<"E";}}`,o:['AB~AE','AB~B~AE','ABE','Error'],a:0,e:"Member a constructed(A). B body starts(B). Throws: B's dtor NOT called(incomplete ctor). a's dtor IS called(~A). Catch(E). Output: AB~AE."},
      {d:'hard',q:'What is the output?',c:`template<typename T,typename U>\nclass Pair{public:void show(){cout<<"general";}};\ntemplate<typename T>\nclass Pair<T,T>{public:void show(){cout<<"same";}};\nint main(){Pair<int,double>p1;Pair<int,int>p2;p1.show();p2.show();}`,o:['generalsame','samegeneral','samesame','Error'],a:0,e:'Pair<int,double>: general template. Pair<int,int>: partial specialization T=T. Output: generalsame.'},
      {d:'hard',q:'What is printed?',c:`template<typename T>void f(T x){cout<<"T";}\nvoid f(int x){cout<<"I";}\nvoid f(double x){cout<<"D";}\nint main(){f(1);f(1.0);f('a');}`,o:['IDT','DIT','TDI','ITD'],a:0,e:"f(1): int exact match -> I. f(1.0): double exact match -> D. f('a'): char, template is exact match with T=char -> T. Output: IDT."},
      {d:'hard',q:'What is the output?',c:`class A{string n;public:\n  A(string x):n(x){cout<<"+"<<n;}\n  ~A(){cout<<"-"<<n;}\n};\nvoid work(){A a("A");A b("B");throw runtime_error("fail");}\nint main(){try{work();}catch(...){cout<<"E";}}`,o:['+A+B-B-AE','+A+B-A-BE','+A+B-ABE','Error'],a:0,e:'Create a,b. Throw: unwind b(-B) then a(-A). Catch(E). Output: +A+B-B-AE.'},
      {d:'hard',q:'What is printed?',c:`class V{public:int x=0;};\nclass A:virtual public V{public:A(){x+=1;}};\nclass B:virtual public V{public:B(){x+=2;}};\nclass C:public A,public B{public:C(){x+=3;}};\nint main(){C c;cout<<c.x;}`,o:['6','1','3','Error'],a:0,e:'Virtual inheritance: one V. A adds 1, B adds 2, C adds 3. Total x=6.'},

      {d:'hard',q:'What is printed?',c:`constexpr int fib(int n){return n<=1?n:fib(n-1)+fib(n-2);}\nint main(){cout<<fib(7);}`,o:['13','8','21','Error'],a:0,e:'Fibonacci: fib(7)=fib(6)+fib(5)=8+5=13.'},
      {d:'hard',q:'What is the output?',c:`class A{public:virtual void f(){cout<<"A";}virtual void g(){cout<<"a";f();}};\nclass B:public A{public:void f()override{cout<<"B";}void g()override{cout<<"b";f();}};\nint main(){A* p=new B();p->g();delete p;}`,o:['bB','bA','aB','Error'],a:0,e:'p->g(): virtual -> B::g(). Prints b. Calls f() via this(B) -> B::f() -> B. Output: bB.'},

      {d:'hard',q:'What is the output?',c:`template<int N>class Arr{int data[N];public:int size(){return N;}};\nint main(){Arr<5>a;Arr<10>b;cout<<a.size()<<b.size();}`,o:['510','55','1010','Error'],a:0,e:'Non-type template param. Arr<5>::size()=5, Arr<10>::size()=10. Output: 510.'},

      {d:'hard',q:'What is printed?',c:`class Base{public:int x=1;};\nclass Der:public Base{public:int y=2;};\nint main(){Der d;Base* b=&d;Der* dd=static_cast<Der*>(b);cout<<dd->x<<dd->y;}`,o:['12','21','1','Error'],a:0,e:'b points to Der. static_cast<Der*> is safe here (downcast). dd->x=1, dd->y=2. Output: 12.'},
      {d:'hard',q:'What is the output?',c:`class A{public:virtual void f(){cout<<"A";}};class B{public:virtual void g(){cout<<"B";}};\nclass C:public A,public B{public:void f()override{cout<<"C";}void g()override{cout<<"C";}};\nint main(){A* a=new C();B* b=new C();a->f();b->g();delete a;delete b;}`,o:['CC','AC','CA','Error'],a:0,e:'Both vtables dispatch to C. a->f()->C::f(), b->g()->C::g(). Output: CC.'},
      {d:'hard',q:'What is printed?',c:`class A{int* p;public:\n  A(int v):p(new int(v)){cout<<"C"<<v;}\n  A(A&& o):p(o.p){o.p=nullptr;cout<<"M";}\n  ~A(){if(p)cout<<"D"<<*p;else cout<<"d";}\n};\nint main(){A a(5);A b=move(a);b.~A();}`,o:['C5MD5d','C5MdD5','C5MD','Error'],a:0,e:'A a(5)->C5. move: M, a.p=null. b.~A() explicit: *p=5->D5. Then a.~A(): p null->d. Output: C5MD5d.'},

      {d:'hard',q:'What is printed?',c:`struct Ex{int code;};\nvoid proc(int x){if(x==1)throw Ex{1};if(x==2)throw Ex{2};}\nint main(){\n  for(int i=1;i<=3;i++){\n    try{proc(i);cout<<"ok";}\n    catch(Ex& e){cout<<e.code;}\n  }\n}`,o:['12ok','ok12','12','Error'],a:0,e:'i=1: throws Ex{1}->1. i=2: throws Ex{2}->2. i=3: no throw->ok. Output: 12ok.'},
      {d:'hard',q:'What is the output?',c:`class A{int id;public:\n  A(int i):id(i){cout<<"["<<id;}\n  ~A(){cout<<id<<"]";}\n};\nvoid f(){A a(1),b(2);throw 0;}\nint main(){try{f();}catch(...){}}`,o:['[1[22]1]','[1[21]2]','[1[2','Error'],a:0,e:'Create a([1), create b([2). Throw: unwind b(2]) then a(1]). Output: [1[22]1].'},
      {d:'hard',q:'What is printed?',c:`template<typename T>void f(T x){cout<<"T";}\ntemplate<typename T>void f(T* x){cout<<"P";}\nint main(){int n=5;f(n);f(&n);}`,o:['TP','PT','TT','Error'],a:0,e:'f(n): int matches T template. f(&n): int* matches T* specialization (more specific). Output: TP.'},

      {d:'hard',q:'What is printed?',c:`#include<vector>\n#include<memory>\nclass B{public:virtual void f()=0;virtual ~B(){}};\nclass D1:public B{public:void f()override{cout<<"1";}};\nclass D2:public B{public:void f()override{cout<<"2";}};\nint main(){\n  vector<shared_ptr<B>> v;\n  v.push_back(make_shared<D1>());\n  v.push_back(make_shared<D2>());\n  for(auto& p:v)p->f();\n}`,o:['12','21','11','Error'],a:0,e:'Virtual dispatch through shared_ptr: D1->1, D2->2. Output: 12.'},

      {d:'hard',q:'What is the output?',c:`struct A{A(){cout<<"init";}};\nA global_a;\nint main(){cout<<"main";}`,o:['initmain','maininit','init','Error'],a:0,e:'Global objects initialized before main. A global_a: ctor -> init. Then main -> main. Output: initmain.'},
      {d:'hard',q:'What is printed?',c:`class Str{string s;public:\n  Str(string x):s(x){}\n  Str operator+(const Str& o)const{return Str(s+o.s);}\n  void show()const{cout<<s;}\n};\nint main(){Str a("H"),b("e"),c("y");(a+b+c).show();}`,o:['Hey','HeyHey','H','Error'],a:0,e:'a+b -> He. (He)+c -> Hey. show() prints Hey.'},
      {d:'hard',q:'What is the output?',c:`class A{public:\n  explicit A(int x){cout<<x;}\n};\nvoid f(A a){cout<<"f";}\nint main(){A a(5);f(a);}`,o:['5f','f5','5','Error'],a:0,e:'A a(5): explicit ctor -> 5. f(a): passes existing A -> f. Output: 5f.'},

      {d:'hard',q:'What is printed?',c:`class A{public:void f(){cout<<"A";}};\nclass B:private A{public:\n  void use(){f();}\n  void expose(){A::f();}\n};\nint main(){B b;b.use();b.expose();}`,o:['AA','AB','A','Error'],a:0,e:'Private inheritance makes A::f inaccessible from outside but B can call it internally. Both use() and expose() call A::f -> A. Output: AA.'},
      {d:'hard',q:'What is the output?',c:`class Base{protected:static int count;public:\n  Base(){count++;}\n  virtual~Base(){count--;}\n  static int get(){return count;}\n};\nint Base::count=0;\nclass Der:public Base{public:\n  Der():Base(){cout<<"D";}\n  ~Der(){cout<<"~D";}\n};\nint main(){Der* p=new Der();cout<<Base::get();delete p;cout<<Base::get();}`,o:['D1~D0','D1~D1','D~D10','Error'],a:0,e:'new Der(): Base ctor(count=1), Der ctor(D). Print get()=1. delete p: ~Der(~D), ~Base(count=0). Print get()=0. Output: D1~D0.'},
      {d:'hard',q:'What is printed?',c:`#include<functional>\nint apply(function<int(int)> f,int x){return f(x);}\nint main(){\n  auto dbl=[](int x){return x*2;};\n  auto add10=[](int x){return x+10;};\n  cout<<apply(dbl,5)<<" "<<apply(add10,5);\n}`,o:['10 15','5 15','15 10','Error'],a:0,e:'apply(dbl,5)=5*2=10. apply(add10,5)=5+10=15. Output: 10 15.'},
      {d:'hard',q:'What is the output?',c:`class Vec{int x,y;public:\n  constexpr Vec(int a,int b):x(a),y(b){}\n  constexpr int dot(const Vec& o)const{return x*o.x+y*o.y;}\n};\nint main(){constexpr Vec a(3,4),b(1,2);constexpr int d=a.dot(b);cout<<d;}`,o:['11','7','25','Error'],a:0,e:'dot product: 3*1+4*2=3+8=11. Computed at compile time (constexpr).'},
      {d:'hard',q:'What is printed?',c:`class A{public:A(){cout<<"A";}~A(){cout<<"a";}};\nclass B:virtual public A{public:B(){cout<<"B";}~B(){cout<<"b";}};\nclass C:public B{public:C(){cout<<"C";}~C(){cout<<"c";}};\nint main(){C c;}`,o:['ABCcba','ABCcab','CBAabc','Error'],a:0,e:'Virtual base A first: A. Then B: B. Then C: C. Destruction reversed: c,b,a. Output: ABCcba.'},
      {d:'hard',q:'What is the output?',c:`#include<utility>\nclass A{public:A(){cout<<"C";}A(const A&){cout<<"P";}A(A&&){cout<<"M";}};\nint main(){\n  vector<A> v;\n  v.reserve(2);\n  v.push_back(A());\n  v.push_back(A());\n}`,o:['CMDMD','CPCPDD','CMCM','Error'],a:0,e:'Each push_back: create temp(C), move into vector(M), destroy temp. Two calls: CMDMD. (Temp destroyed after move D each time).'},
      {d:'hard',q:'What is printed?',c:`template<int N>\nstruct Fib3{static const int v=Fib3<N-1>::v+Fib3<N-2>::v;};\ntemplate<>struct Fib3<1>{static const int v=1;};\ntemplate<>struct Fib3<0>{static const int v=0;};\nint main(){cout<<Fib3<8>::v;}`,o:['21','13','34','Error'],a:0,e:'Fibonacci(8): 0,1,1,2,3,5,8,13,21. Fib(8)=21.'},
      {d:'easy',q:'What is printed?',c:`class A{public:\n  int x = 5;\n  A() = default;\n  A(int val):x(val){}\n};\nint main(){A a; A b(10); cout<<a.x<<b.x;}`,o:['510','55','1010','Error'],a:0,e:'A a uses the default compiler constructor which preserves default initializer x=5. A b(10) uses parameterized ctor setting x=10. Output: 510.'},
      {d:'easy',q:'What is the output?',c:`class Base{public:virtual void f(){cout<<"B";}};\nclass Der:public Base{public:void f()final{cout<<"D";}};\nint main(){Der d; d.f();}`,o:['D','B','Error','BD'],a:0,e:'The final specifier prevents further overriding in derived classes but does not prevent calling the method. Prints D.'},
      {d:'medium',q:'What is printed?',c:`class A{public:\n  void f()const{cout<<"const ";}\n  void f(){cout<<"mutable ";}\n};\nint main(){const A a; A b; a.f(); b.f();}`,o:['const mutable ','mutable const ','const const ','Error'],a:0,e:'Overloading on constness: const object calling const method prints const , mutable object calling non-const method prints mutable . Output: const mutable .'},
      {d:'medium',q:'What is the output?',c:`class A{public:\n  virtual void f(){cout<<"A";}\n};\nclass B:public A{\n  void f()override{cout<<"B";}\n};\nint main(){B b; A& a=b; a.f();}`,o:['B','A','Error','AB'],a:0,e:'Even though B::f is private in B, it is called polymorphically through base reference A& where it is public. Prints B.'},
      {d:'medium',q:'What is printed?',c:`#include<memory>\nint main(){\n  std::shared_ptr<int> p1 = std::make_shared<int>(10);\n  std::weak_ptr<int> w = p1;\n  if(auto p2 = w.lock()){\n    cout<<*p2<<" "<<w.use_count();\n  }\n}`,o:['10 2','10 1','10 0','Error'],a:0,e:'w.lock() returns a shared_ptr, incrementing ref count to 2 inside the if scope, but w.use_count() observes the original shared state (ref count = 1 before lock? No! lock returns a shared_ptr, so use_count is 2! Wait. Let us check: w.use_count() returns the number of shared_ptr instances sharing ownership, which is p1 AND the temporary returned by lock(). So ref count is indeed 2!). Let us double check: Yes! w.use_count() is 2.'},
      {d:'medium',q:'What is the output?',c:`class B{public:virtual void f(){cout<<"B";}};\nclass D:public B{public:void f()override{cout<<"D";}};\nint main(){D d; B b = d; b.f();}`,o:['B','D','BD','Error'],a:0,e:'Object slicing: assignment copies only the Base slice of d into b. Since b is a value of type B, no virtual dispatch occurs. Prints B.'},
      {d:'hard',q:'What is the output?',c:`class A{public:A(){cout<<"A";}};\nclass B:public A{public:B(){cout<<"B";}};\nclass C:public A{public:C(){cout<<"C";}};\nclass D:public B,public C{public:D(){cout<<"D";}};\nint main(){D d;}`,o:['ABACD','ABCD','AABCD','Error'],a:0,e:'D inherits from B and C, which both inherit non-virtually from A. Thus, A is constructed twice: once for B, once for C. Order: A, B, A, C, D. Output: ABACD.'},
      {d:'hard',q:'What is printed?',c:`#include<utility>\nclass A{public:\n  A(){cout<<"C";}\n  A(const A&){cout<<"K";}\n  A(A&&){cout<<"M";}\n};\nvoid f(A a){}\nint main(){A a; f(std::move(a));}`,o:['CM','CK','C','Error'],a:0,e:'A a is constructed (C). f(std::move(a)) passes an rvalue, invoking the move constructor (M) to construct the parameter. Output: CM.'},
      {d:'hard',q:'What is the output?',c:`class A{public:\n  virtual void f(int x=10){cout<<"A"<<x;}\n};\nclass B:public A{public:\n  void f(int x=20)override{cout<<"B"<<x;}\n};\nint main(){A* p = new B(); p->f(); delete p;}`,o:['B10','B20','A10','Error'],a:0,e:'Virtual dispatch resolves the method to B::f at runtime, but default arguments are bound statically at compile-time based on the pointer type A*. Prints B10.'},

    ];

    /* ── RUNTIME CLASSIFICATION OF QUESTIONS ── */
    function tagQuestions() {
      QS.forEach(q => {
        const text = ((q.q || '') + ' ' + (q.c || '') + ' ' + (q.e || '')).toLowerCase();
        let cat = "Core";
        if (
          text.includes('move(') || text.includes('move semantics') || text.includes('&&') || 
          text.includes('lambda') || text.includes('constexpr') || 
          text.includes('cast') || text.includes('namespace') || text.includes('rule of five') || 
          text.includes('rule of 5') || text.includes('inline') || text.includes('decltype') ||
          text.includes('structured binding') || text.includes('noexcept') || text.includes('smart pointer') ||
          text.includes('unique_ptr') || text.includes('shared_ptr') || text.includes('weak_ptr')
        ) {
          cat = "Modern C++";
        } else if (
          text.includes('operator') || text.includes('friend') || text.includes('static') || 
          text.includes('template') || text.includes('typename') || text.includes('throw') || 
          text.includes('catch') || text.includes('try') || text.includes('stl') || 
          text.includes('vector') || text.includes('map') || text.includes('set') || 
          text.includes('stream') || text.includes('fstream') || text.includes('file') || 
          text.includes('raii')
        ) {
          cat = "Advanced";
        }
        q.category = cat;

        // Dynamic topic detection based on keywords
        let topicKey = "intro"; // default fallback
        if (text.includes('destructor') || text.includes('constructor') || text.includes('ctor') || text.includes('~')) {
          topicKey = "ctor";
        } else if (text.includes('rule of five') || text.includes('rule of 5') || text.includes('rule of three') || text.includes('rule of 3') || text.includes('rule of zero') || text.includes('rule of 0')) {
          topicKey = "ro5";
        } else if (text.includes('move(') || text.includes('move semantics') || text.includes('rvalue reference') || text.includes('&&')) {
          topicKey = "move";
        } else if (text.includes('lambda') || text.includes('closure')) {
          topicKey = "lam";
        } else if (text.includes('constexpr') || text.includes('compile-time') || text.includes('static_assert')) {
          topicKey = "cexp";
        } else if (text.includes('smart pointer') || text.includes('unique_ptr') || text.includes('shared_ptr') || text.includes('weak_ptr') || text.includes('make_unique') || text.includes('make_shared')) {
          topicKey = "sptr";
        } else if (text.includes('raii') || text.includes('lock_guard') || text.includes('mutex') || text.includes('scoped_lock')) {
          topicKey = "raii";
        } else if (text.includes('cast') || text.includes('static_cast') || text.includes('dynamic_cast') || text.includes('reinterpret_cast') || text.includes('const_cast')) {
          topicKey = "cast";
        } else if (text.includes('namespace') || text.includes('using namespace')) {
          topicKey = "ns";
        } else if (text.includes('inline')) {
          topicKey = "inl";
        } else if (text.includes('exception') || text.includes('throw') || text.includes('catch') || text.includes('try') || text.includes('noexcept')) {
          topicKey = "exc";
        } else if (text.includes('operator') || text.includes('operator+') || text.includes('operator-') || text.includes('operator<<') || text.includes('operator=')) {
          topicKey = "opov";
        } else if (text.includes('friend')) {
          topicKey = "friend";
        } else if (text.includes('static ') || text.includes('static_') || text.includes('::')) {
          topicKey = "static";
        } else if (text.includes('template') || text.includes('typename') || text.includes('template<')) {
          topicKey = "tpl";
        } else if (text.includes('vector') || text.includes('map') || text.includes('set') || text.includes('unordered_') || text.includes('list') || text.includes('stl')) {
          topicKey = "stl";
        } else if (text.includes('stream') || text.includes('fstream') || text.includes('ifstream') || text.includes('ofstream') || text.includes('file')) {
          topicKey = "fio";
        } else if (text.includes('virtual') || text.includes('vtable') || text.includes('vptr') || text.includes('dynamic dispatch')) {
          topicKey = "virt";
        } else if (text.includes('pure virtual') || text.includes('abstract class') || text.includes('interface')) {
          topicKey = "abs";
        } else if (text.includes('polymorphism') || text.includes('override') || text.includes('overload')) {
          topicKey = "poly";
        } else if (text.includes('inheritance') || text.includes('derived') || text.includes('base class') || text.includes('diamond')) {
          topicKey = "inh";
        } else if (text.includes('encapsulation') || text.includes('data hiding') || text.includes('getter') || text.includes('setter')) {
          topicKey = "enc";
        } else if (text.includes('access specifier') || text.includes('public') || text.includes('private') || text.includes('protected')) {
          topicKey = "access";
        } else if (text.includes('class') || text.includes('object') || text.includes('struct') || text.includes('this pointer')) {
          topicKey = "classes";
        } else {
          topicKey = "intro";
        }
        q.topic = topicKey;
      });
    }

    /* ── ROUTING MATRIX ── */
    function router() {
      const hash = location.hash || '#home';
      const app = document.getElementById('app');
      
      // Clear styling active flags
      document.querySelectorAll('aside nav a').forEach(el => el.classList.remove('active'));
      
      app.innerHTML = `<div class="page-fade" id="pageContainer"></div>`;
      const container = document.getElementById('pageContainer');
      
      if (hash === '#home' || hash === '#') {
        document.querySelector('aside nav a[href="#home"]').classList.add('active');
        renderHome(container);
      } else if (hash === '#quiz') {
        const quizNav = document.getElementById('nav-quiz');
        if (quizNav) quizNav.classList.add('active');
        renderQuiz(container);
      } else if (hash.startsWith('#topic/')) {
        const slug = hash.split('/')[1];
        const topic = TOPICS_DATA[slug];
        if (topic) {
          const navEl = document.getElementById(`nav-${slug}`);
          if (navEl) navEl.classList.add('active');
          renderTopic(container, slug, topic);
        } else {
          location.hash = '#home';
        }
      } else {
        location.hash = '#home';
      }
      
      window.scrollTo(0,0);
    }
    
    window.addEventListener('hashchange', router);
    window.addEventListener('load', router);

          <div class="rcard" style="background: var(--card); border: 1px solid var(--bd); border-radius: 20px; padding: 48px; text-align: center; box-shadow: var(--sh2); position: relative; overflow: hidden;">
            <div class="remoji" id="remoji" style="font-size:64px; margin-bottom:16px; display:block;">🏆</div>
            <div class="rscore" id="rscore" style="font-family: var(--se); font-size: 64px; font-weight: 400; margin-bottom: 6px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; display: inline-block;">0/0</div>
            <div class="rlbl" id="rpct" style="font-family: var(--mo); font-size: 12px; color: var(--mu); margin-bottom: 24px;">0% correct</div>
            <div class="rgrade" id="rgrade" style="display:inline-block; font-family: var(--mo); font-size: 13px; padding: 8px 24px; border-radius: 24px; margin-bottom: 32px; font-weight: 600;">Grade A</div>
            
            <div class="rbd" style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 32px;">
              <div class="rbi" style="padding:16px 12px; background:var(--bg2); border-radius:12px; border:1px solid var(--bd);"><div class="rbn" id="bdc" style="color:#10b981; font-family:var(--se); font-size:32px; font-weight:400;">0</div><div class="rbnl" style="font-family:var(--mo); font-size:9px; text-transform:uppercase; letter-spacing:0.12em; color:var(--mu); margin-top:4px;">Correct</div></div>
              <div class="rbi" style="padding:16px 12px; background:var(--bg2); border-radius:12px; border:1px solid var(--bd);"><div class="rbn" id="bdw" style="color:#ef4444; font-family:var(--se); font-size:32px; font-weight:400;">0</div><div class="rbnl" style="font-family:var(--mo); font-size:9px; text-transform:uppercase; letter-spacing:0.12em; color:var(--mu); margin-top:4px;">Wrong</div></div>
              <div class="rbi" style="padding:16px 12px; background:var(--bg2); border-radius:12px; border:1px solid var(--bd);"><div class="rbn" id="bds" style="color:#f59e0b; font-family:var(--se); font-size:32px; font-weight:400;">0</div><div class="rbnl" style="font-family:var(--mo); font-size:9px; text-transform:uppercase; letter-spacing:0.12em; color:var(--mu); margin-top:4px;">Skipped</div></div>
            </div>
            
            <button class="rbtn" onclick="resetQuiz()" style="font-family: var(--mo); font-size: 12px; padding: 12px 32px; background: var(--grad); color: #fff; border: none; border-radius: 30px; cursor: pointer; transition: all 0.2s; margin: 5px; box-shadow: 0 4px 14px rgba(124, 58, 237, 0.3);">Play Again</button>
            <button class="rbtn out" onclick="resetQuiz()" style="font-family: var(--mo); font-size: 12px; padding: 12px 32px; background: transparent; border: 1.5px solid var(--bd); color: var(--ink); border-radius: 30px; cursor: pointer; transition: all 0.2s; margin: 5px;" onmouseover="this.style.borderColor='var(--ac)'; this.style.color='var(--ac)'; this.style.background='var(--ac2)';" onmouseout="this.style.borderColor='var(--bd)'; this.style.color='var(--ink)'; this.style.background='transparent';">Change Settings</button>
          </div>
        </div>
      `;
      populateTopicFilterChips();
      updatePoolCountInfo();
    }

    function toggleChip(chip, gid) {
      document.querySelectorAll('#' + gid + ' .chip').forEach(c => c.classList.remove('sel'));
      chip.classList.add('sel');
      updatePoolCountInfo();
    }

    function toggleMultiChip(chip) {
      const parent = chip.parentElement;
      const selected = parent.querySelectorAll('.chip.sel');
      if (chip.classList.contains('sel') && selected.length <= 1) {
        return; // Prevent deselecting the last category
      }
      chip.classList.toggle('sel');
      updatePoolCountInfo();
    }

    function selectQCount(chip, val) {
      document.querySelectorAll('#nchips .chip').forEach(c => c.classList.remove('sel'));
      chip.classList.add('sel');
      const customInput = document.getElementById('customQCount');
      if (customInput) {
        customInput.value = '';
      }
    }

    function onCustomQCountInput(input) {
      document.querySelectorAll('#nchips .chip').forEach(c => c.classList.remove('sel'));
      const pool = calculatePool();
      let val = parseInt(input.value);
      if (isNaN(val)) return;
      if (val < 1) input.value = 1;
      if (val > pool.length) input.value = pool.length;
    }

    function getSelectedCategories() {
      const chips = document.querySelectorAll('#cchips .chip.sel');
      return Array.from(chips).map(c => c.dataset.v);
    }

    function getSelectedDifficulty() {
      const sel = document.querySelector('#dchips .chip.sel');
      return sel ? sel.dataset.v : 'all';
    }

    function getSelectedTopics() {
      const container = document.getElementById('topicChipsContainer');
      if (!container) return TOPIC_KEYS; // default if not rendered yet
      const chips = container.querySelectorAll('.chip.sel');
      return Array.from(chips).map(c => c.dataset.v);
    }

    function calculatePool() {
      const diff = getSelectedDifficulty();
      const cats = getSelectedCategories();
      const topics = getSelectedTopics();
      return QS.filter(q => {
        const dMatch = (diff === 'all' || q.d === diff);
        const cMatch = cats.includes(q.category);
        const tMatch = topics.includes(q.topic);
        return dMatch && cMatch && tMatch;
      });
    }

    function updatePoolCountInfo() {
      const pool = calculatePool();
      const countLabel = document.getElementById('poolCountLabel');
      if (countLabel) {
        countLabel.textContent = pool.length;
      }
      const customInput = document.getElementById('customQCount');
      if (customInput) {
        customInput.max = pool.length;
        customInput.placeholder = `1-${pool.length}`;
      }
    }

    function toggleTimerChip(chip) {
      document.querySelectorAll('#tlimitChips .chip').forEach(c => c.classList.remove('sel'));
      chip.classList.add('sel');
    }

    function toggleOrderChip(chip) {
      document.querySelectorAll('#orderChips .chip').forEach(c => c.classList.remove('sel'));
      chip.classList.add('sel');
    }

    function toggleTopicsDrawer() {
      const drawer = document.getElementById('topicsDrawer');
      const btn = document.getElementById('topicsDrawerBtn');
      if (!drawer || !btn) return;
      
      if (drawer.style.display === 'none') {
        drawer.style.display = 'block';
        btn.innerHTML = `<span>Collapse</span> ▴`;
      } else {
        drawer.style.display = 'none';
        btn.innerHTML = `<span>Expand</span> ▾`;
      }
    }

    function populateTopicFilterChips() {
      const container = document.getElementById('topicChipsContainer');
      if (!container) return;
      
      let html = '';
      TOPIC_KEYS.forEach(key => {
        const t = TOPICS_DATA[key];
        html += `
          <div class="chip sel" data-v="${key}" onclick="toggleTopicChip(this)" style="font-size: 10px; padding: 6px 12px; margin: 2px;">
            ✦ ${t.title}
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function toggleTopicChip(chip) {
      const container = document.getElementById('topicChipsContainer');
      const selected = container.querySelectorAll('.chip.sel');
      if (chip.classList.contains('sel') && selected.length <= 1) {
        return; // lock at least 1 topic selected
      }
      chip.classList.toggle('sel');
      updatePoolCountInfo();
    }

    function selectAllTopics(select) {
      const container = document.getElementById('topicChipsContainer');
      if (!container) return;
      container.querySelectorAll('.chip').forEach(c => {
        if (select) {
          c.classList.add('sel');
        } else {
          c.classList.remove('sel');
        }
      });
      
      if (!select) {
        const first = container.querySelector('.chip');
        if (first) first.classList.add('sel');
      }
      
      updatePoolCountInfo();
    }

    /* ── GAME PLAY SYSTEM ENGINE ── */
    let gameQs = [], curIdx = 0, score = 0, skipped = 0, timerInt = null, timeLeft = 30, timerDuration = 30, hasAnswered = false;

    function getChipVal(gid) {
      const sel = document.querySelector('#' + gid + ' .chip.sel');
      return sel ? sel.dataset.v : null;
    }

    function startQuiz() {
      let pool = calculatePool();
      
      if (pool.length === 0) {
        alert("No questions match your selected criteria!");
        return;
      }
      
      const orderChip = document.querySelector('#orderChips .chip.sel');
      const ordering = orderChip ? orderChip.dataset.v : 'shuffled';
      
      if (ordering === 'sequential') {
        pool.sort((a, b) => TOPIC_KEYS.indexOf(a.topic) - TOPIC_KEYS.indexOf(b.topic));
      } else {
        pool.sort(() => Math.random() - 0.5);
      }
      
      let count = pool.length;
      const customInput = document.getElementById('customQCount');
      const customVal = customInput ? parseInt(customInput.value) : NaN;
      
      if (!isNaN(customVal) && customVal > 0) {
        count = Math.min(customVal, pool.length);
      } else {
        const range = getChipVal('nchips') || '10';
        count = range === 'all' ? pool.length : Math.min(parseInt(range), pool.length);
      }
      
      const timerChip = document.querySelector('#tlimitChips .chip.sel');
      timerDuration = timerChip ? parseInt(timerChip.dataset.v) : 30;
      
      gameQs = pool.slice(0, count);
      curIdx = 0;
      score = 0;
      skipped = 0;
      hasAnswered = false;
      
      document.getElementById('qs').style.display = 'none';
      document.getElementById('qg').style.display = 'block';
      document.getElementById('qr').style.display = 'none';
      showQuestion();
    }

    function showQuestion() {
      if (curIdx >= gameQs.length) {
        showResults();
        return;
      }
      
      hasAnswered = false;
      const q = gameQs[curIdx];
      const tot = gameQs.length;
      
      document.getElementById('qnl').textContent = 'Q' + (curIdx + 1);
      document.getElementById('qtl').textContent = 'of ' + tot;
      document.getElementById('qdl').textContent = q.d.toUpperCase();
      document.getElementById('slive').textContent = score;
      document.getElementById('pf').style.width = (curIdx / tot * 100) + '%';
      
      const tag = document.getElementById('qtag');
      tag.textContent = q.d.toUpperCase();
      tag.className = 'qtag ' + q.d;
      
      document.getElementById('qttl').textContent = q.q;
      const cd = document.getElementById('qcode');
      if (q.c) {
        cd.style.display = 'block';
        cd.textContent = q.c;
      } else {
        cd.style.display = 'none';
      }
      
      const opts = document.getElementById('qopts');
      const labels = ['A', 'B', 'C', 'D'];
      
      opts.innerHTML = q.o.map((opt, i) => `
        <div class="term-opt" id="op${i}" onclick="submitAnswer(${i})">
          <div class="term-opt-lbl">${labels[i]}</div>
          <span>${opt}</span>
        </div>
      `).join('');
      
      const exp = document.getElementById('qexp');
      exp.style.display = 'none';
      exp.textContent = '';
      
      document.getElementById('nxtb').style.display = 'none';
      startTimer();
    }

    function startTimer() {
      clearInterval(timerInt);
      
      const tring = document.getElementById('tringContainer');
      if (timerDuration === 0) {
        if (tring) {
          tring.style.display = 'block';
        }
        const circ = document.getElementById('tcirc');
        if (circ) {
          circ.style.strokeDashoffset = 0;
          circ.style.stroke = '#10b981';
        }
        const tnum = document.getElementById('tnum');
        if (tnum) {
          tnum.textContent = '∞';
        }
        return;
      }
      
      if (tring) {
        tring.style.display = 'block';
      }
      timeLeft = timerDuration;
      updateTimerUI();
      timerInt = setInterval(() => {
        timeLeft--;
        updateTimerUI();
        if (timeLeft <= 0) {
          clearInterval(timerInt);
          if (!hasAnswered) {
            skipped++;
            revealSolution(-1);
          }
        }
      }, 1000);
    }

    function updateTimerUI() {
      if (timerDuration === 0) return;
      const C = 119.4;
      const offset = C * (1 - timeLeft / timerDuration);
      const circ = document.getElementById('tcirc');
      if (circ) {
        circ.style.strokeDashoffset = offset;
        circ.style.stroke = timeLeft <= (timerDuration * 0.3) ? '#ef4444' : 'var(--ac)';
      }
      const tnum = document.getElementById('tnum');
      if (tnum) {
        tnum.textContent = timeLeft;
      }
    }

    function submitAnswer(idx) {
      if (hasAnswered) return;
      hasAnswered = true;
      clearInterval(timerInt);
      
      if (idx === gameQs[curIdx].a) score++;
      revealSolution(idx);
    }

    function revealSolution(chosen) {
      const q = gameQs[curIdx];
      
      for (let i = 0; i < q.o.length; i++) {
        const el = document.getElementById('op' + i);
        if (!el) continue;
        
        if (i === q.a) {
          el.classList.add('correct');
        } else if (i === chosen) {
          el.classList.add('incorrect');
        }
        
        el.style.pointerEvents = 'none';
      }
      
      const exp = document.getElementById('qexp');
      exp.innerHTML = `<strong style="font-family:var(--mo); font-size:10px; color:#a78bfa; letter-spacing:0.12em;">[wistaar@macbook] stdout: // EXPLANATION</strong><br><br>${q.e}`;
      exp.style.display = 'block';
      
      document.getElementById('nxtb').style.display = 'inline-flex';
      document.getElementById('slive').textContent = score;
    }

    function nextQ() {
      curIdx++;
      const card = document.getElementById('qcard');
      card.style.opacity = '0';
      card.style.transform = 'translateY(10px)';
      setTimeout(() => {
        card.style.opacity = '1';
        card.style.transform = 'translateY(0)';
        showQuestion();
      }, 200);
    }

    function showResults() {
      clearInterval(timerInt);
      document.getElementById('qg').style.display = 'none';
      document.getElementById('qr').style.display = 'block';
      
      const tot = gameQs.length;
      const wrong = tot - score - skipped;
      const pct = Math.round(score / tot * 100);
      
      document.getElementById('rscore').textContent = score + '/' + tot;
      document.getElementById('rpct').textContent = pct + '% correct';
      document.getElementById('bdc').textContent = score;
      document.getElementById('bdw').textContent = wrong;
      document.getElementById('bds').textContent = skipped;
      
      const grade = document.getElementById('rgrade');
      const remoji = document.getElementById('remoji');
      
      if (pct >= 85) {
        grade.textContent = 'Grade A — Master Standard';
        grade.style.background = 'linear-gradient(135deg, #d1fae5, #a7f3d0)';
        grade.style.color = '#065f46';
        grade.style.border = '1px solid #34d399';
        remoji.textContent = '🏆';
      } else if (pct >= 60) {
        grade.textContent = 'Grade B — Safe Competency';
        grade.style.background = 'linear-gradient(135deg, #fef3c7, #fde68a)';
        grade.style.color = '#92400e';
        grade.style.border = '1px solid #fb923c';
        remoji.textContent = '🎯';
      } else {
        grade.textContent = 'Grade C — Keep Practicing';
        grade.style.background = 'linear-gradient(135deg, #fee2e2, #fecaca)';
        grade.style.color = '#991b1b';
        grade.style.border = '1px solid #f87171';
        remoji.textContent = '📚';
      }
    }

    function resetQuiz() {
      clearInterval(timerInt);
      document.getElementById('qg').style.display = 'none';
      document.getElementById('qr').style.display = 'none';
      document.getElementById('qs').style.display = 'block';
    }
  </script>
</body>
</html>
