<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C++ OOP Reference & Interactive Quiz | @wistaar</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* ── DESIGN SYSTEM & VARIABLE SYSTEM ── */
    :root {
      --bg: #fafaf9;
      --bg2: #f4f4f5;
      --ink: #09090b;
      --ink2: #27272a;
      --mu: #71717a;
      --ac: #7c3aed;
      --ac2: rgba(124, 58, 237, 0.06);
      --ac3: rgba(124, 58, 237, 0.15);
      --bd: #e4e4e7;
      --card: #ffffff;
      --cbg: #18181b;
      --cfg: #e4e4e7;
      
      --sh: 0 1px 2px rgba(0, 0, 0, 0.04), 0 4px 16px rgba(0, 0, 0, 0.05);
      --sh2: 0 8px 32px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04);
      --grad: linear-gradient(135deg, #7c3aed, #3b82f6);
      --grad2: linear-gradient(135deg, #7c3aed, #ec4899);
      
      --mo: 'DM Mono', monospace;
      --se: 'Instrument Serif', serif;
      --sa: 'DM Sans', sans-serif;
      --r: 12px;
    }

    [data-theme="dark"] {
      --bg: #09090b;
      --bg2: #18181b;
      --ink: #fafafa;
      --ink2: #d4d4d8;
      --mu: #a1a1aa;
      --ac: #a78bfa;
      --ac2: rgba(167, 139, 250, 0.08);
      --ac3: rgba(167, 139, 250, 0.2);
      --bd: #27272a;
      --card: #18181b;
      --cbg: #09090b;
      --cfg: #e4e4e7;
      
      --sh: 0 1px 2px rgba(0, 0, 0, 0.3), 0 4px 16px rgba(0, 0, 0, 0.3);
      --sh2: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    /* ── BASE & TYPOGRAPHY ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html {
      scroll-behavior: smooth;
      height: 100%;
    }
    
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sa);
      font-size: 15px;
      line-height: 1.75;
      transition: background 0.3s, color 0.3s;
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── LAYOUT SHELL ── */
    .shell {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* ── SIDEBAR NAVIGATION ── */
    aside {
      width: 280px;
      min-width: 280px;
      border-right: 1px solid var(--bd);
      background: var(--bg);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s, transform 0.3s;
      z-index: 100;
    }

    aside::-webkit-scrollbar {
      width: 4px;
    }
    aside::-webkit-scrollbar-thumb {
      background: var(--bd);
      border-radius: 4px;
    }

    .logo {
      padding: 24px 22px 18px;
      border-bottom: 1px solid var(--bd);
      background: linear-gradient(180deg, var(--ac2), transparent);
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mo);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ac);
      background: var(--ac2);
      border: 1px solid var(--ac3);
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .logo strong {
      display: block;
      font-family: var(--se);
      font-size: 26px;
      color: var(--ink);
      letter-spacing: -0.5px;
      font-weight: 400;
      line-height: 1.1;
    }

    .logo span {
      font-family: var(--mo);
      font-size: 10px;
      color: var(--mu);
      margin-top: 4px;
      display: block;
    }

    /* Sidebar Search */
    .search-box {
      padding: 12px 16px;
      border-bottom: 1px solid var(--bd);
    }

    .search-box input {
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--bd);
      background: var(--bg2);
      color: var(--ink);
      font-family: var(--sa);
      font-size: 13px;
      outline: none;
      transition: all 0.2s;
    }

    .search-box input:focus {
      border-color: var(--ac);
      background: var(--card);
      box-shadow: 0 0 0 2px var(--ac3);
    }

    nav {
      flex: 1;
      padding: 16px 8px;
    }

    nav ul {
      list-style: none;
    }

    nav ul li .sh {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--mu);
      margin-top: 18px;
      padding: 6px 14px 4px;
      font-weight: 700;
      font-family: var(--mo);
      display: block;
    }

    nav ul li:first-child .sh {
      margin-top: 0;
    }

    nav ul li a {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--sa);
      font-size: 13.5px;
      color: var(--ink2);
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 8px;
      transition: all 0.18s;
      margin-bottom: 2px;
      position: relative;
      font-weight: 400;
    }

    nav ul li a::before {
      content: '';
      width: 3px;
      height: 0;
      background: var(--grad);
      border-radius: 2px;
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      transition: height 0.18s;
    }

    nav ul li a:hover {
      color: var(--ac);
      background: var(--ac2);
    }

    nav ul li a:hover::before {
      height: 50%;
    }

    nav ul li a.active {
      color: var(--ac);
      background: var(--ac2);
      font-weight: 550;
    }

    nav ul li a.active::before {
      height: 70%;
    }

    /* ── MAIN WORKSPACE ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky;
      top: 0;
      right: 0;
      left: 0;
      padding: 14px 40px;
      z-index: 90;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--bd);
      background: rgba(250, 250, 249, 0.85);
      backdrop-filter: blur(12px);
      transition: background 0.3s, border-color 0.3s;
    }

    [data-theme="dark"] .topbar {
      background: rgba(9, 9, 11, 0.85);
    }

    .m-toggle {
      display: none;
      font-size: 20px;
      background: transparent;
      border: none;
      color: var(--ink);
      cursor: pointer;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .tbtn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--bd);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: var(--sh);
      position: relative;
      overflow: hidden;
    }

    .tbtn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--ac3), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .tbtn:hover {
      transform: translateY(-2px) scale(1.05);
      border-color: var(--ac);
    }

    .tbtn:hover::before {
      opacity: 1;
    }

    html[data-theme="light"] .tbtn {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
    }

    html[data-theme="light"] .tbtn:hover {
      box-shadow: 0 8px 20px rgba(251, 191, 36, 0.25), inset 0 0 0 1px rgba(251, 191, 36, 0.2);
      border-color: #fbbf24;
      background: #fffbeb;
    }

    html[data-theme="dark"] .tbtn {
      background: rgba(24, 24, 27, 0.7);
      backdrop-filter: blur(8px);
    }

    html[data-theme="dark"] .tbtn:hover {
      box-shadow: 0 8px 20px rgba(167, 139, 250, 0.25), inset 0 0 0 1px rgba(167, 139, 250, 0.2);
      border-color: var(--ac);
      background: #12101e;
    }

    .tbtn:active {
      transform: scale(0.95) translateY(0);
    }

    #customQCount:focus {
      border-color: var(--ac);
      box-shadow: 0 0 8px var(--ac3);
      background: var(--card);
    }

    .tbtn svg {
      position: absolute;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s, filter 0.3s;
    }

    /* Light Theme (shows Moon icon with rotation and scale-down) */
    html[data-theme="light"] .tbtn .sun-icon {
      transform: translateY(24px) scale(0.5) rotate(90deg);
      opacity: 0;
      filter: blur(2px);
    }
    html[data-theme="light"] .tbtn .moon-icon {
      transform: translateY(0) scale(1) rotate(0deg);
      opacity: 1;
      filter: none;
    }

    /* Dark Theme (shows Sun icon with rotation and scale-down) */
    html[data-theme="dark"] .tbtn .sun-icon {
      transform: translateY(0) scale(1) rotate(0deg);
      opacity: 1;
      filter: none;
    }
    html[data-theme="dark"] .tbtn .moon-icon {
      transform: translateY(-24px) scale(0.5) rotate(-90deg);
      opacity: 0;
      filter: blur(2px);
    }

    /* ── MACBOOK TERMINAL QUIZ CARD ── */
    .qcard-terminal {
      background: #0f0f11 !important;
      border: 1px solid #2d2d31 !important;
      border-radius: 12px !important;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45) !important;
      padding: 0 !important;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: #e4e4e7 !important;
      margin-top: 20px;
    }

    .terminal-hdr {
      background: #18181b;
      border-bottom: 1px solid #27272a;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      position: relative;
    }

    .terminal-dots {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .terminal-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
    }
    .terminal-dot.red { background: #ff5f56; }
    .terminal-dot.yellow { background: #ffbd2e; }
    .terminal-dot.green { background: #27c93f; }

    .terminal-title {
      font-family: var(--mo);
      font-size: 11px;
      color: #8e8e93;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-weight: 500;
      white-space: nowrap;
      user-select: none;
    }

    .terminal-body {
      padding: 32px;
      font-family: var(--mo);
    }

    .terminal-prompt {
      font-family: var(--mo);
      font-size: 13px;
      margin-bottom: 18px;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .terminal-prompt .user {
      color: #34d399;
      font-weight: 600;
    }

    .terminal-prompt .loc {
      color: #e4e4e7;
    }

    .terminal-prompt .cmd {
      color: #a78bfa;
    }

    .qttl-terminal {
      font-size: 16.5px;
      font-weight: 500;
      margin-bottom: 20px;
      line-height: 1.6;
      color: #fafafa !important;
      font-family: var(--sa) !important;
    }

    .term-opt {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border: 1px solid #27272a;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 14px;
      font-family: var(--mo);
      background: #18181b;
      color: #d4d4d8;
      user-select: none;
      position: relative;
    }

    .term-opt::before {
      content: '>';
      font-family: var(--mo);
      color: var(--ac);
      position: absolute;
      left: 14px;
      opacity: 0;
      transform: translateX(-5px);
      transition: all 0.22s;
    }

    .term-opt:hover {
      border-color: var(--ac);
      background: #1d1b26;
      color: #ffffff;
      padding-left: 28px;
    }

    .term-opt:hover::before {
      opacity: 1;
      transform: translateX(0);
    }

    .term-opt-lbl {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 1px solid #27272a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
      font-weight: 600;
      background: #27272a;
      color: #a1a1aa;
      transition: all 0.22s;
    }

    .term-opt:hover .term-opt-lbl {
      border-color: var(--ac);
      background: var(--ac);
      color: #fff;
    }

    /* Terminal Success/Error states */
    .term-opt.correct {
      border-color: #10b981 !important;
      background: rgba(16, 185, 129, 0.08) !important;
      color: #34d399 !important;
    }

    .term-opt.correct::before {
      content: '✔';
      color: #10b981;
      opacity: 1;
      transform: translateX(0);
    }

    .term-opt.correct .term-opt-lbl {
      background: #10b981 !important;
      border-color: #10b981 !important;
      color: #fff !important;
    }

    .term-opt.incorrect {
      border-color: #ef4444 !important;
      background: rgba(239, 68, 68, 0.08) !important;
      color: #f87171 !important;
    }

    .term-opt.incorrect::before {
      content: '✘';
      color: #ef4444;
      opacity: 1;
      transform: translateX(0);
    }

    .term-opt.incorrect .term-opt-lbl {
      background: #ef4444 !important;
      border-color: #ef4444 !important;
      color: #fff !important;
    }

    /* Terminal code box */
    .qcode-terminal {
      background: #09090b !important;
      color: #e4e4e7 !important;
      font-family: var(--mo);
      font-size: 13px;
      line-height: 1.8;
      padding: 20px 24px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 16px 0 24px;
      white-space: pre;
      border: 1px solid #27272a;
    }

    .th-btn {
      font-family: var(--mo);
      font-size: 12px;
      padding: 8px 18px;
      border-radius: 30px;
      background: var(--grad);
      color: #fff;
      border: none;
      text-decoration: none;
      font-weight: 500;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2);
      transition: all 0.2s;
    }

    .th-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(124, 58, 237, 0.3);
    }

    /* Chip & Input styling */
    .chip {
      font-family: var(--mo);
      font-size: 11.5px;
      padding: 8px 18px;
      border: 1.5px solid var(--bd);
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--bg2);
      color: var(--ink2);
      user-select: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    
    .chip:hover {
      border-color: var(--ac);
      color: var(--ac);
    }
    
    .chip.sel {
      background: var(--grad);
      color: #fff !important;
      border-color: transparent;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.25);
    }

    /* ── PAGE VIEWPORT CONTAINER ── */
    #app {
      flex: 1;
      padding: 40px 48px 80px;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
    }

    .page-fade {
      animation: fadeInSlideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes fadeInSlideUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── HOME / LANDING PAGE ── */
    .hero {
      margin-bottom: 48px;
      position: relative;
    }

    .hero-pre {
      font-family: var(--mo);
      font-size: 11px;
      color: var(--ac);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: block;
      font-weight: 600;
    }

    .hero h1 {
      font-family: var(--se);
      font-size: 58px;
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -1.2px;
      margin-bottom: 18px;
      color: var(--ink);
    }

    .hero h1 em {
      font-style: italic;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 17px;
      color: var(--mu);
      font-weight: 300;
      max-width: 680px;
      line-height: 1.6;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 56px;
    }

    .stat-card {
      border: 1px solid var(--bd);
      background: var(--card);
      padding: 24px;
      border-radius: var(--r);
      box-shadow: var(--sh);
      text-align: center;
      transition: all 0.25s;
    }

    .stat-card:hover {
      box-shadow: var(--sh2);
      transform: translateY(-2px);
      border-color: var(--ac);
    }

    .stat-val {
      font-family: var(--se);
      font-size: 42px;
      font-weight: 400;
      line-height: 1;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .stat-label {
      font-family: var(--mo);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--mu);
    }

    .section-title {
      font-family: var(--se);
      font-size: 32px;
      font-weight: 400;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--bd);
    }

    .landing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }

    .landing-card {
      border: 1px solid var(--bd);
      background: var(--card);
      border-radius: var(--r);
      padding: 24px;
      box-shadow: var(--sh);
      transition: all 0.22s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .landing-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--grad);
      opacity: 0;
      transition: opacity 0.22s;
    }

    .landing-card:hover {
      box-shadow: var(--sh2);
      transform: translateY(-3px);
      border-color: var(--ac);
    }

    .landing-card:hover::before {
      opacity: 1;
    }

    .card-cat {
      font-family: var(--mo);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ac);
      margin-bottom: 12px;
      display: block;
      font-weight: 600;
    }

    .landing-card h3 {
      font-family: var(--sa);
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--ink);
    }

    .landing-card p {
      font-size: 13.5px;
      color: var(--mu);
      line-height: 1.5;
      font-weight: 300;
      flex: 1;
    }

    .card-footer {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mo);
      font-size: 11px;
      color: var(--ac);
      font-weight: 500;
    }

    .card-footer span {
      transition: transform 0.2s;
    }

    .landing-card:hover .card-footer span {
      transform: translateX(4px);
    }

    /* ── TOPIC DETAIL PAGE ── */
    .breadcrumbs {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mo);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--mu);
      margin-bottom: 24px;
    }

    .breadcrumbs a {
      color: var(--mu);
      text-decoration: none;
      transition: color 0.15s;
    }

    .breadcrumbs a:hover {
      color: var(--ac);
    }

    .topic-hdr {
      margin-bottom: 32px;
    }

    .topic-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .cat-badge {
      font-family: var(--mo);
      font-size: 9.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ac);
      background: var(--ac2);
      border: 1px solid var(--ac3);
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .read-time {
      font-family: var(--mo);
      font-size: 10.5px;
      color: var(--mu);
    }

    .topic-title {
      font-family: var(--se);
      font-size: 48px;
      font-weight: 400;
      line-height: 1.1;
      color: var(--ink);
    }

    .def-card {

      letter-spacing: 0.12em;

    .content-sec {

      font-size: 10px;

    .fn { color: #86efac; }

    .st { color: #fbbf24; }

      font-family: var(--mo);
      font-size: 12.5px;

      border-radius: 4px;

      border: 1px solid var(--ac3);

    /* Topic Flow Navigation */

      text-align: right;
      margin-left: auto;
    }

    .flow-lbl {
      font-family: var(--mo);
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--mu);

    .flow-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--ac);
      transition: color 0.15s;
    }

    .flow-btn:hover .flow-title {
      color: var(--ink);
    }

    /* ── DYNAMIC TABLE ── */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 13.5px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--bd);

    th {
      font-family: var(--mo);
      font-size: 9.5px;
      text-transform: uppercase;

      font-family: var(--mo);

      color: var(--mu);

      background: var(--grad);
      -webkit-background-clip: text;

      background-clip: text;
      font-weight: 600;
    }

    /* ── RESPONSIVE ADAPTATIONS ── */
    @media (max-width: 900px) {
      aside {

  <script>
    /* ── THEME INITIALIZATION & SHADOW STACKS ── */
    function toggleTheme() {
      const h = document.documentElement;
      if (h.dataset.theme === 'dark') {
        h.dataset.theme = 'light';
        localStorage.setItem('theme', 'light');
      } else {
        h.dataset.theme = 'dark';
        localStorage.setItem('theme', 'dark');
      }
    }

    (function() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.dataset.theme = savedTheme;
    })();

    /* Mobile Sidebar Trigger */
    function toggleSidebar() {
      const side = document.getElementById('appSidebar');
      side.classList.toggle('open');
    }

    // Hide sidebar on nav selection
    document.addEventListener('click', (e) => {
      const side = document.getElementById('appSidebar');
      if (side.classList.contains('open') && !side.contains(e.target) && !e.target.classList.contains('m-toggle')) {
        side.classList.remove('open');
      }
    });

    /* Search & Filter function in sidebar */
    function filterSidebar() {
      const val = document.getElementById('sidebarSearch').value.toLowerCase();
      const items = document.querySelectorAll('#sidebarNav li');
      
      items.forEach(li => {
        const a = li.querySelector('a');
        if (!a) return; // skip category headers
        
        const title = a.textContent.toLowerCase();
        if (title.includes(val)) {
          li.style.display = 'block';
        } else {
          li.style.display = 'none';
        }
      });
    }

    /* ── 26 TOPICS COMPREHENSIVE TEXT & SOURCE CONTENT ── */
    const TOPICS_DATA = {
      intro: {
        title: "Introduction to OOP",
        category: "Core",
        definition: "Object-Oriented Programming (OOP) is a programming paradigm centered around 'objects' rather than functions. Objects encapsulate both raw properties (fields) and specialized behaviors (methods), offering developers clean encapsulation and structured architectural control.",
        theory: "<p>Historically, software was built using procedural programming, separating functions from structures. While optimal for basic math and small scripts, this paradigm degrades rapidly at scale. The lack of logical ownership on data makes code vulnerable to cross-boundary modifications, structural bugs, and global side-effects.</p><p>OOP eliminates these issues by co-locating state and behavior into self-contained <strong>objects</strong>. C++ is engineered as a highly efficient, multi-paradigm language. Rather than forcing you strictly into high-level wrappers, C++ layers class hierarchies directly over hardware primitives. This provides raw, deterministic compiler execution speed alongside powerful architecture patterns: encapsulation, inheritance, polymorphism, and abstraction.</p>",
        keyConcepts: [
          { name: "Object vs Class", desc: "A class represents the static compilation template. An object is a live instance allocated in stack/heap memory." },
          { name: "The Four Pillars", desc: "Encapsulation (shielding details), Abstraction (hiding complexity), Inheritance (reusing models), Polymorphism (adapting interfaces)." },
          { name: "Zero-Cost Abstractions", desc: "C++ objects reside directly in memory with zero overhead unless dynamic runtime dispatch (virtual tables) is invoked." }
        ],
        syntax: "class ClassName {\nprivate:\n  // Hidden internal data members\npublic:\n  // Exposed operations interface\n};",
        code: `<span class="kw">#include</span> <span class="st">&lt;iostream&gt;</span>\n\n<span class="kw">class</span> <span class="ty">Printer</span> {\n<span class="kw">public</span>:\n    <span class="fn">void</span> display(<span class="kw">const</span> std::string&amp; text) {\n        std::cout &lt;&lt; <span class="st">"OOP active: "</span> &lt;&lt; text &lt;&lt; std::endl;\n    }\n};\n\n<span class="ty">int</span> <span class="fn">main</span>() {\n    <span class="ty">Printer</span> myObj; <span class="cm">// Stack allocated object</span>\n    myObj.display(<span class="st">"Hi from C++!"</span>);\n    <span class="kw">return</span> <span class="nu">0</span>;\n}`,
        pitfalls: "Instantiating objects heavily on the heap (using new) for trivial operations. Modern C++ heavily favors stack allocation for automated lifetime management and CPU cache friendliness.",
        tldr: "OOP couples data with operations. C++ yields peak speed by avoiding virtual layers unless explicitly configured."
      },
      classes: {
        title: "Classes & Objects",
        category: "Core",
        definition: "A class acts as the user-defined logical blueprint, outlining the fields and interface of a type. An object is the actual stateful instance of that blueprint created during program runtime.",
        theory: "<p>In C++, a class defines a clean encapsulation scope. It groups state variables (members) and standard algorithms (methods). Instantiating a class reserves physical bytes on either the stack (automatic storage) or the heap (dynamic storage).</p><p>By default, C++ classes maintain a strict private accessibility standard. Additionally, C++ maintains full backward compatibility with standard C. The <code>struct</code> keyword is identical to the <code>class</code> keyword, with the sole exception that <code>struct</code> defaults to public variables and inheritance.</p>",
        keyConcepts: [
          { name: "this Pointer", desc: "An implicit const pointer passed to non-static member functions pointing to the exact calling object instance." },
          { name: "Empty Class Sizing", desc: "Empty classes carry a 1-byte overhead size to guarantee that distinct object instances hold unique memory addresses." },
          { name: "Memory Alignment", desc: "Object sizes are padded to match the word sizes of target CPU registries for hardware speed optimizations." }
        ],
        syntax: "class ObjectBluePrint {\n  int privateVar; // private by default\npublic:\n  void publicMethod();\n};",
        code: `<span class="kw">class</span> <span class="ty">Point2D</span> {\n<span class="kw">private</span>:\n    <span class="ty">int</span> x = <span class="nu">0</span>;\n    <span class="ty">int</span> y = <span class="nu">0</span>;\n<span class="kw">public</span>:\n    <span class="fn">void</span> setCoordinates(<span class="ty">int</span> px, <span class="ty">int</span> py) {\n        x = px; \n        y = py;\n    }\n};\n\n<span class="ty">int</span> <span class="fn">main</span>() {\n    <span class="ty">Point2D</span> p1; <span class="cm">// Stack allocation</span>\n    p1.setCoordinates(<span class="nu">10</span>, <span class="nu">25</span>);\n}`,
        pitfalls: "Accessing members of uninitialized objects or mixing class and struct declarations confusingly across massive files.",
        tldr: "Classes define logical layouts; objects occupy runtime memory. structs are public by default; classes are private."
      },
      ctor: {
        title: "Constructors & Destructors",
        category: "Core",
        definition: "Constructors initialize an object's memory at creation time, while destructors execute automatically when the object's life cycle closes to release resources cleanly.",
        theory: "<p>Constructors configure class members at instantiation. C++ provides diverse constructors: default, parameterized, copy, move, and delegating constructors. Modern C++ heavily favors the Member Initializer List syntax over assignments inside the constructor body, as it initializes members directly rather than constructing first and assigning second.</p><p>Destructors are single, parameterless cleanup triggers prefixed with a tilde (<code>~</code>). When an object goes out of scope, its destructor runs, guaranteeing automated resource deallocation (such as closing file pipes, releasing heap arrays, or returning system mutices).</p>",
        keyConcepts: [
          { name: "Initializer List Efficiency", desc: "Member initialization lists compile directly to in-place setup, skipping redundant default construction stages." },
          { name: "Construction Sequence", desc: "Bases construct first, followed by members in order of their declaration, and finally the derived constructor runs." },
          { name: "Destruction Sequence", desc: "Destructors execute in strict reverse declaration sequence (LIFO) to ensure safe reference lifetimes." }
        ],
        syntax: "class Demo {\npublic:\n  Demo() : member(0) {} // Initializer list ctor\n  ~Demo() {}            // Destructor\n};",
        code: `<span class="kw">#include</span> <span class="st">&lt;iostream&gt;</span>\n\n<span class="kw">class</span> <span class="ty">DynamicArray</span> {\n<span class="kw">private</span>:\n    <span class="ty">int</span>* ptr;\n<span class="kw">public</span>:\n    <span class="cm">// Constructor</span>\n    <span class="ty">DynamicArray</span>(<span class="ty">int</span> size) : ptr(<span class="kw">new</span> <span class="ty">int</span>[size]) {\n        std::cout &lt;&lt; <span class="st">"Allocated"</span> &lt;&lt; std::endl;\n    }\n    <span class="cm">// Destructor</span>\n    ~<span class="ty">DynamicArray</span>() {\n        <span class="kw">delete</span>[] ptr;\n        std::cout &lt;&lt; <span class="st">"Deallocated"</span> &lt;&lt; std::endl;\n    }\n};`,
        pitfalls: "Forgetting to initialize raw pointer members, leading to unpredictable crashes when destructors attempt to free raw wild addresses.",
        tldr: "Constructors build objects; destructors clean them up. Prefer member initializers for better performance."
      },
      access: {
        title: "Access Specifiers",
        category: "Core",
        definition: "Access specifiers partition a class into logical zones of visibility: public (accessible anywhere), private (only within the class), and protected (restricted to the class and its children).",
        theory: "<p>Access modifiers form the core of structural scoping in C++. <code>public</code> exposes members to consumer interactions. <code>private</code> locks access strictly inside the class scope, protecting class invariants from external tampering. <code>protected</code> acts as an intermediary scope, allowing child classes in inheritance hierarchies to access the members while remaining closed to external callers.</p><p>These boundaries are compile-time validation gates. At compile time, the compiler raises immediate errors if a private variable is touched externally, but these checks carry zero runtime overhead.</p>",
        keyConcepts: [
          { name: "public", desc: "Exposes interface operations. Good for standard methods and API constructs." },
          { name: "private", desc: "Locks state. Forces access through methods, safeguarding object structure." },
          { name: "protected", desc: "Permits child visibility. Good for shared base values in tight hierarchies." }
        ],
        syntax: "class SecurityGate {\nprivate:\n  int accessKey;\nprotected:\n  int securityLevel;\npublic:\n  void unlock();\n};",
        code: `<span class="kw">class</span> <span class="ty">Account</span> {\n<span class="kw">private</span>:\n    <span class="ty">double</span> balance = <span class="nu">0.0</span>; <span class="cm">// Locked state</span>\n<span class="kw">public</span>:\n    <span class="fn">void</span> deposit(<span class="ty">double</span> amt) {\n        <span class="kw">if</span> (amt &gt; <span class="nu">0</span>) balance += amt; \n    }\n    <span class="ty">double</span> getBalance() <span class="kw">const</span> { <span class="kw">return</span> balance; } \n};`,
        pitfalls: "Making member data public for quick access, bypassing encapsulation and exposing class internals to widespread global side-effects.",
        tldr: "Use private for variables to protect state, and public for methods to define a clean, stable interface."
      },
      enc: {
        title: "Encapsulation",
        category: "Core",
        definition: "Encapsulation bundles data members and behavioral operations into a single logical unit while masking internal structure, allowing changes to code internals without breaking consumer contracts.",
        theory: "<p>Encapsulation represents the principal structural shield in OOP. Its primary goal is code maintainability. By binding data and behavior inside a class and restricting raw access to fields via <code>private</code> or <code>protected</code> modifiers, developers prevent tight coupling.</p><p>Instead of direct state modification, consumers communicate with objects through clear public methods. This abstraction layer enables developers to refactor internal data structures (e.g., swapping a raw array for a <code>std::vector</code>) without altering any external client code.</p>",
        keyConcepts: [
          { name: "Data Hiding", desc: "Keeping member variables private to hide internal representation and state." },
          { name: "Accessors & Mutators", desc: "Using getters and setters to read and update state while validating invariants." },
          { name: "Low Coupling", desc: "Minimizing dependencies between classes to build flexible, modular codebases." }
        ],
        syntax: "class EncapsulatedType {\nprivate:\n  int rawState;\npublic:\n  int getState() const;\n  void setState(int s);\n};",
        code: `<span class="kw">#include</span> <span class="st">&lt;stdexcept&gt;</span>\n\n<span class="kw">class</span> <span class="ty">Thermometer</span> {\n<span class="kw">private</span>:\n    <span class="ty">double</span> tempKelvin;\n<span class="kw">public</span>:\n    <span class="fn">void</span> setKelvin(<span class="ty">double</span> val) {\n        <span class="kw">if</span> (val &lt; <span class="nu">0.0</span>) \n            <span class="kw">throw</span> std::invalid_argument(<span class="st">"Below Absolute Zero"</span>);\n        tempKelvin = val;\n    }\n    <span class="ty">double</span> getCelsius() <span class="kw">const</span> { <span class="kw">return</span> tempKelvin - <span class="nu">273.15</span>; }\n};`,
        pitfalls: "Writing generic getters and setters blindly for every private variable without implementing valid invariant checks, which defeats data hiding.",
        tldr: "Bundle state and behavior. Encapsulation isolates changes, keeping code clean, secure, and decoupled."
      },
      inh: {
        title: "Inheritance",
        category: "Core",
        definition: "Inheritance allows a derived class to acquire the data members and member functions of a base class, modeling specialized 'IS-A' design relationships.",
        theory: "<p>Inheritance lets you construct hierarchical relationships. The child class (derived) extends the features of the parent (base). In C++, you can specify access modes for inheritance: <code>public</code> (preserves base specifiers), <code>protected</code> (makes base public/protected members protected in derived), and <code>private</code> (makes base members private in derived).</p><p>Multiple inheritance is fully supported but presents complications, such as the famous Diamond Problem. In a diamond hierarchy, a grandchild inherits duplicates of a grandparent class through separate paths. C++ solves this through Virtual Inheritance, ensuring a single shared grandparent instance is built in memory.</p>",
        keyConcepts: [
          { name: "IS-A Relationship", desc: "Models logical hierarchies: a Dog is a Mammal, a Manager is an Employee." },
          { name: "Inheritance Access Modes", desc: "Rules controlling member accessibility as they cascade down the inheritance tree." },
          { name: "Virtual Inheritance", desc: "A compiler trick that resolves multiple-path duplicates into a single shared base object." }
        ],
        syntax: "class DerivedClass : public BaseClass {\n  // Derived class extensions\n};",
        code: `<span class="kw">class</span> <span class="ty">Animal</span> {\n<span class="kw">public</span>:\n    <span class="fn">void</span> breathe() {}\n};\n\n<span class="kw">class</span> <span class="ty">Bird</span> : <span class="kw">public</span> <span class="ty">Animal</span> {\n<span class="kw">public</span>:\n    <span class="fn">void</span> fly() {}\n};\n\n<span class="cm">// Virtual inheritance resolving diamond paths</span>\n<span class="kw">class</span> <span class="ty">Grandparent</span> { <span class="kw">public</span>: <span class="ty">int</span> id; };\n<span class="kw">class</span> <span class="ty">Parent1</span> : <span class="kw">virtual</span> <span class="kw">public</span> <span class="ty">Grandparent</span> {};\n<span class="kw">class</span> <span class="ty">Parent2</span> : <span class="kw">virtual</span> <span class="kw">public</span> <span class="ty">Grandparent</span> {};\n<span class="kw">class</span> <span class="ty">Child</span> : <span class="kw">public</span> <span class="ty">Parent1</span>, <span class="kw">public</span> <span class="ty">Parent2</span> {};`,
        pitfalls: "Using public inheritance to share code where a 'has-a' (composition) relationship is more appropriate. Prefer composition over inheritance unless polymorphic behavior is needed.",
        tldr: "Share behavior via IS-A models. Resolve multiple path conflicts cleanly using virtual inheritance."
      },
      poly: {
        title: "Polymorphism",
        category: "Core",
        definition: "Polymorphism enables a single interface to execute different operations depending on the target type, supporting compile-time overloading or runtime virtual method dispatch.",
        theory: "<p>Polymorphism operates in two distinct phases in C++. **Compile-Time Polymorphism** uses method overloading and templates. The compiler analyzes static arguments during build time, resolving which specific method signature to execute. This approach has zero runtime cost.</p><p>**Runtime Polymorphism** leverages inheritance and virtual functions. A base pointer references a derived object, and virtual dispatch resolves the actual override method at execution time. This runtime flexibility is supported by compiler vtable structures.</p>",
        keyConcepts: [
          { name: "Static Polymorphism", desc: "Resolving overloads and templates at compile time for zero runtime overhead." },
          { name: "Dynamic Polymorphism", desc: "Resolving method calls at runtime using virtual functions and pointers." },
          { name: "Function Overriding", desc: "Allowing a child class to redefine a base class method with the exact same signature." }
        ],
        syntax: "class Base { virtual void run(); };\nclass Child : public Base { void run() override; };",
        code: `<span class="kw">#include</span> <span class="st">&lt;iostream&gt;</span>\n\n<span class="kw">class</span> <span class="ty">Logger</span> {\n<span class="kw">public</span>:\n    <span class="cm">// Static Polymorphism (Overloading)</span>\n    <span class="fn">void</span> log(<span class="ty">int</span> i) { std::cout &lt;&lt; i; }\n    <span class="fn">void</span> log(<span class="kw">const</span> std::string&amp; s) { std::cout &lt;&lt; s; }\n};\n\n<span class="ty">int</span> <span class="fn">main</span>() {\n    <span class="ty">Logger</span> l;\n    l.log(<span class="nu">100</span>); \n    l.log(<span class="st">" message"</span>);\n}`,
        pitfalls: "Omitting the virtual keyword on base destructors, which causes memory leaks as child destructors are skipped during dynamic base deletes.",
        tldr: "Polymorphism handles type-specific logic cleanly, resolving calls at compile-time (overloads) or runtime (virtuals)."
      },
      abs: {
        title: "Abstraction",
        category: "Core",
        definition: "Abstraction separates interfaces from implementation details. In C++, this is achieved using abstract classes that contain pure virtual functions to act as structural interfaces.",
        theory: "<p>Abstraction hides low-level complexity behind high-level interfaces. Abstract classes act as blueprints that cannot be instantiated directly. Instead, they define a strict contract that all derived classes must implement.</p><p>By hiding the details of derived implementations and exposing a clean base interface, you protect consumers from structural changes. Abstraction acts as the foundation of modern interface-driven API designs.</p>",
        keyConcepts: [
          { name: "Pure Virtual Method", desc: "A method declared with '= 0', indicating it has no implementation in the base class and must be overridden." },
          { name: "Interface Classes", desc: "Pure abstract classes that define interfaces without holding state variables or concrete implementations." },
          { name: "Separation of Concerns", desc: "Structuring applications around interfaces to decouple logic and simplify unit testing." }
        ],
        syntax: "class AbstractInterface {\npublic:\n  virtual void process() = 0; // Pure virtual\n  virtual ~AbstractInterface() = default;\n};",
        code: `<span class="kw">class</span> <span class="ty">DBConnection</span> {\n<span class="kw">public</span>:\n    <span class="kw">virtual</span> <span class="fn">void</span> connect() = <span class="nu">0</span>; <span class="cm">// Interface contract</span>\n    <span class="kw">virtual</span> ~<span class="ty">DBConnection</span>() = <span class="kw">default</span>;\n};\n\n<span class="kw">class</span> <span class="ty">MySQLConn</span> : <span class="kw">public</span> <span class="ty">DBConnection</span> {\n<span class="kw">public</span>:\n    <span class="fn">void</span> connect() <span class="kw">override</span> { /* MySQL logic */ }\n};`,
        pitfalls: "Failing to implement pure virtual methods in derived classes, which turns child classes into abstract types themselves and raises compile-time errors at instantiation.",
        tldr: "Define interfaces using pure virtual functions. Abstraction simplifies designs by hiding low-level details."
      },
      virt: {
        title: "Virtual Functions & vtable",
        category: "Core",
        definition: "Virtual functions enable dynamic runtime dispatch. This mechanism is powered by compiler-generated virtual tables (vtables) containing function pointers, accessed through active object virtual pointers (vptrs).",
        theory: "<p>When a method is marked <code>virtual</code>, the compiler implements a dynamic lookup mechanism. Every class with virtual methods gets a hidden static <strong>vtable</strong> (Virtual Table) containing pointers to its virtual functions. Additionally, each object instance of that class gains a hidden member pointer called a <strong>vptr</strong> (Virtual Pointer) referencing the vtable.</p><p>At runtime, a virtual method call dereferences the vptr, retrieves the target function address from the vtable, and jumps to it. While this dynamic dispatch introduces a minor runtime overhead, it is highly optimized. However, note that virtual calls inside constructors and destructors do not dispatch polymorphically because the object is either not yet fully formed or is already partially destroyed.</p>",
        keyConcepts: [
          { name: "vtable (Virtual Table)", desc: "A compiler-generated array of function pointers created for classes with virtual methods." },
          { name: "vptr (Virtual Pointer)", desc: "A hidden member pointer in object instances that references its class's vtable." },
          { name: "Virtual Destructors", desc: "Crucial for base classes to ensure child object resources are cleaned up correctly during polymorphic deletes." }
        ],
        syntax: "class Base {\npublic:\n  virtual void show(); // dynamic dispatch link\n  virtual ~Base() = default; // critical virtual dtor\n};",
        code: `<span class="kw">#include</span> <span class="st">&lt;iostream&gt;</span>\n\n<span class="kw">class</span> <span class="ty">Base</span> {\n<span class="kw">public</span>:\n    <span class="kw">virtual</span> <span class="fn">void</span> greet() { std::cout &lt;&lt; <span class="st">"Base"</span>; }\n    <span class="kw">virtual</span> ~<span class="ty">Base</span>() = <span class="kw">default</span>;\n};\n\n<span class="kw">class</span> <span class="ty">Der</span> : <span class="kw">public</span> <span class="ty">Base</span> {\n<span class="kw">public</span>:\n    <span class="fn">void</span> greet() <span class="kw">override</span> { std::cout &lt;&lt; <span class="st">"Derived"</span>; }\n};\n\n<span class="ty">int</span> <span class="fn">main</span>() {\n    <span class="ty">Base</span>* ptr = <span class="kw">new</span> <span class="ty">Der</span>();\n    ptr-&gt;greet(); <span class="cm">// Dynamic dispatch -> prints "Derived"</span>\n    <span class="kw">delete</span> ptr;   <span class="cm">// Dynamic destructor run</span>\n}`,
        pitfalls: "Calling virtual methods inside constructors. Since the derived class is not yet constructed, the compiler will only call the base version.",
        tldr: "Dynamic dispatch resolves calls via vtables. Always declare destructors virtual in base classes."
      },
      opov: {
        title: "Operator Overloading",
        category: "Advanced",
        definition: "Operator overloading allows developers to redefine how standard C++ operators (+, -, *, <<) interact with custom class objects, improving readability and developer experience.",
        theory: "<p>Operator overloading allows user-defined types to behave like built-in primitives. You can overload almost any operator in C++ by declaring a function named <code>operator</code> followed by the symbol (e.g., <code>operator+</code>).</p><p>However, you cannot overload certain operators, such as the member selector (<code>.</code>), scope resolution (<code>::</code>), ternary operator (<code>?:</code>), and <code>sizeof</code>. It is best practice to preserve the original mathematical semantics of operators (e.g., keeping addition commutative) to avoid confusing users.</p>",
        keyConcepts: [
          { name: "Overloadable Operators", desc: "Extending operators like +, -, ==, and << to support custom classes." },
          { name: "Non-Overloadable Operators", desc: "Operators like ., ::, ?:, and sizeof cannot be overloaded to preserve language integrity." },
          { name: "Friend Stream Inserters", desc: "Overloading stream insertion (<<) as a non-member friend function to format output." }
        ],
        syntax: "ReturnType operatorSymbol(const ClassName& operand);",
        code: `<span class="kw">#include</span> <span class="st">&lt;iostream&gt;</span>\n\n<span class="kw">class</span> <span class="ty">Vector2D</span> {\n<span class="kw">public</span>:\n    <span class="ty">float</span> x, y;\n    <span class="ty">Vector2D</span>(<span class="ty">float</span> x, <span class="ty">float</span> y) : x(x), y(y) {}\n    \n    <span class="cm">// Overloaded '+'</span>\n    <span class="ty">Vector2D</span> <span class="kw">operator</span>+(<span class="kw">const</span> <span class="ty">Vector2D</span>&amp; other) <span class="kw">const</span> {\n        <span class="kw">return</span> <span class="ty">Vector2D</span>(x + other.x, y + other.y);\n    }\n};`,
        pitfalls: "Overloading operators with unintuitive behaviors (like using '-' for multiplication), which confuses developers and ruins maintainability.",
        tldr: "Use operator overloading to let custom classes work like primitives. Keep operations logical and mathematically intuitive."
      },
      friend: {
        title: "Friend Functions & Classes",
        category: "Advanced",
        definition: "The friend keyword grants external functions or classes direct access to a type's private and protected members without exposing them publicly.",
        theory: "<p>Friendship bypasses encapsulation boundaries. By using the <code>friend</code> keyword, a class explicitly designates trusted external functions or classes. This allows them to read and write private variables directly.</p><p>Friendship is neither symmetric nor transitive: if Class A is a friend of Class B, Class B does not automatically get access to Class A's private members. Friendship should be used sparingly to avoid weakening encapsulation.</p>",
        keyConcepts: [
          { name: "Friend Function", desc: "An external non-member function granted full access to a class's private sections." },
          { name: "Friend Class", desc: "An entire class granted full access to another class's private members." },
          { name: "Encapsulation Check", desc: "Use friendship only for closely coupled systems (like Iterators or Builders) to preserve clean designs." }
        ],
        syntax: "class Demo {\n  friend class TrustedClass;\n  friend void trustedFunc(Demo&);\n};",
        code: `<span class="kw">class</span> <span class="ty">Vault</span> {\n<span class="kw">private</span>:\n    <span class="ty">int</span> code = <span class="nu">9988</span>;\n    <span class="kw">friend</span> <span class="fn">void</span> overrideAccess(<span class="ty">Vault</span>&amp; v); <span class="cm">// Friend declaration</span>\n};\n\n<span class="fn">void</span> overrideAccess(<span class="ty">Vault</span>&amp; v) {\n    v.code = <span class="nu">0000</span>; <span class="cm">// Direct private manipulation</span>\n}`,
        pitfalls: "Declaring classes as friends indiscriminately. This bypasses access controls, breaking code isolation and encapsulation.",
        tldr: "Grant trusted access using the friend keyword. Use it sparingly to protect clean encapsulation."
      },
      static: {
        title: "Static Members",
        category: "Advanced",
        definition: "Static members belong to the class itself rather than object instances. Static variables are shared across all instances, and static functions operate without a 'this' pointer.",
        theory: "<p>Static variables exist outside the scope of individual objects. They are declared inside the class body, but must be defined in a single source file to resolve memory allocation.</p><p>Static member functions can be called directly using the class name (e.g., <code>Class::Func()</code>). Because they are not bound to an instance, they have no implicit <code>this</code> pointer and can only access static data and other static functions.</p>",
        keyConcepts: [
          { name: "Shared State", desc: "Static data members are allocated once in global static memory and shared by all instances." },
          { name: "Static Methods", desc: "Functions callable using class scope (::) without instantiating objects." },
          { name: "this Elimination", desc: "Static methods operate without an instance scope, making them fast and memory-efficient." }
        ],
        syntax: "class Demo {\npublic:\n  static int count;\n  static int getCount();\n};",
        code: `<span class="kw">class</span> <span class="ty">Unit</span> {\n<span class="kw">public</span>:\n    <span class="kw">static</span> <span class="ty">int</span> count; <span class="cm">// Declaration</span>\n    <span class="ty">Unit</span>() { count++; }\n};\n\n<span class="cm">// Definition in global scope (required)</span>\n<span class="ty">int</span> <span class="ty">Unit</span>::count = <span class="nu">0</span>;\n\n<span class="ty">int</span> <span class="fn">main</span>() {\n    <span class="ty">Unit</span> u1, u2;\n    std::cout &lt;&lt; <span class="ty">Unit</span>::count; <span class="cm">// Output: 2</span>\n}`,
        pitfalls: "Forgetting to define static variables in a source file, which causes link-time errors (unresolved external symbol).",
        tldr: "Static members belong to the class scope, not instances. Always define static variables outside the class body."

      tpl: {
        title: "Templates & Generics",
        category: "Advanced",
        definition: "Templates support generic programming in C++, allowing functions and classes to operate with parameterized types for type-safe code reuse at compile-time.",
        theory: "<p>Templates enable powerful compile-time code generation. Instead of repeating logic for different types, you write a single template function or class parameterized by type tokens (e.g., <code>T</code>).</p><p>At compile time, when the template is called (e.g., <code>Stack&lt;int&gt;</code>), the compiler instantiates a concrete class matching that type. While this compile-time code generation can increase binary sizes (template bloat), it provides absolute type safety and zero runtime overhead.</p>",
        keyConcepts: [
          { name: "Generic Functions", desc: "Writing algorithm templates that adapt to any supporting type." },
          { name: "Class Templates", desc: "Defining generic container patterns (like stack, queue, or array structures)." },

        ],
        syntax: "template <typename T>\nT getMax(T a, T b) {\n  return (a > b) ? a : b;\n}",
        code: `<span class="kw">template</span> &lt;<span class="kw">typename</span> <span class="ty">T</span>&gt;\n<span class="kw">class</span> <span class="ty">Box</span> {\n<span class="kw">private</span>:\n    <span class="ty">T</span> data;\n<span class="kw">public</span>:\n    <span class="ty">Box</span>(<span class="ty">T</span> val) : data(val) {}\n    <span class="ty">T</span> getData() <span class="kw">const</span> { <span class="kw">return</span> data; }\n};\n\n<span class="ty">int</span> <span class="fn">main</span>() {\n    <span class="ty">Box</span>&lt;<span class="ty">int</span>&gt; intBox(<span class="nu">123</span>); <span class="cm">// Instantiates an int version</span>\n}`,
        pitfalls: "Writing all template code in standard source files (.cpp) rather than header files (.h). Templates must be visible to the compiler at the point of instantiation.",
        tldr: "Use templates for generic, type-safe, compile-time abstractions. Write templates in headers to prevent compilation failures."
      },
      exc: {
        title: "Exception Handling",
        category: "Advanced",
        definition: "Exception handling isolates error handling logic from main code paths. It uses try, catch, and throw blocks to propagate errors up the call stack.",
        theory: "<p>Exception handling provides structured error propagation. When a runtime error occurs, you <code>throw</code> an exception object. This unwinds the call stack, destroying local stack variables, until a matching <code>catch</code> block is found.</p><p>C++ guarantees that all fully constructed stack objects are destroyed during stack unwinding. However, heap objects and raw resources are leaked unless managed by smart pointers or RAII wrappers.</p>",
        keyConcepts: [
          { name: "Stack Unwinding", desc: "The automatic destruction of stack variables as an exception propagates up the call stack." },
          { name: "noexcept Specifier", desc: "Informing the compiler that a function will not throw, enabling compiler optimizations." },
          { name: "Exception Safety", desc: "Ensuring applications maintain valid state under three safety levels: basic, strong, or no-throw." }
        ],
        syntax: "try {\n  if (fail) throw std::runtime_error(\"error\");\n} catch (const std::exception& e) {\n  std::cerr << e.what();\n}",
        code: `<span class="kw">#include</span> <span class="st">&lt;stdexcept&gt;</span>\n\n<span class="ty">double</span> divide(<span class="ty">double</span> a, <span class="ty">double</span> b) {\n    <span class="kw">if</span> (b == <span class="nu">0.0</span>)\n        <span class="kw">throw</span> std::runtime_error(<span class="st">"Division by zero!"</span>);\n    <span class="kw">return</span> a / b;\n}\n\n<span class="ty">int</span> <span class="fn">main</span>() {\n    <span class="kw">try</span> {\n        divide(<span class="nu">10</span>, <span class="nu">0</span>);\n    } <span class="kw">catch</span> (<span class="kw">const</span> std::exception&amp; e) {\n        <span class="cm">// Catches runtime_error via exception reference</span>\n    }\n}`,
        pitfalls: "Throwing exceptions inside destructors. If an exception is thrown during stack unwinding from another exception, the runtime terminates immediately.",
        tldr: "Propagate runtime errors using try-catch blocks. Ensure destructors never throw exceptions to prevent immediate termination."
      },
      stl: {
        title: "STL Essentials",
        category: "Advanced",
        definition: "The Standard Template Library (STL) provides high-performance container templates (vector, map, set), standard algorithms (sort, search), and generic iterators.",
        theory: "<p>The STL is the backbone of modern C++. It contains three key parts: **Containers** (data structures like <code>std::vector</code> or <code>std::map</code>), **Algorithms** (reusable processes like <code>std::sort</code>), and **Iterators** (which act as generic pointers connecting algorithms to containers).</p><p>STL containers are optimized for memory layout and algorithmic complexity. For example, <code>std::vector</code> provides dynamic, contiguous memory with O(1) random access, while <code>std::unordered_map</code> implements fast hash-map lookups with O(1) average access times.</p>",
        keyConcepts: [
          { name: "Containers", desc: "Dynamic arrays (vector), linked nodes (list), balanced trees (map), or hash tables (unordered_map)." },
          { name: "Algorithms", desc: "Generic algorithms like std::sort, std::find, and std::binary_search." },
          { name: "Iterators", desc: "Abstract cursors that bridge algorithms and containers, shielding developers from internal layouts." }
        ],
        syntax: "#include <vector>\n#include <algorithm>\nstd::vector<int> v = {3, 1, 2};\nstd::sort(v.begin(), v.end());",
        code: `<span class="kw">#include</span> <span class="st">&lt;vector&gt;</span>\n<span class="kw">#include</span> <span class="st">&lt;algorithm&gt;</span>\n<span class="kw">#include</span> <span class="st">&lt;iostream&gt;</span>\n\n<span class="ty">int</span> <span class="fn">main</span>() {\n    std::vector&lt;<span class="ty">int</span>&gt; nums = {<span class="nu">5</span>, <span class="nu">2</span>, <span class="nu">8</span>, <span class="nu">1</span>};\n    std::sort(nums.begin(), nums.end()); <span class="cm">// Sorts ascending</span>\n    \n    <span class="kw">for</span> (<span class="ty">int</span> n : nums) {\n        std::cout &lt;&lt; n &lt;&lt; <span class="st">" "</span>; <span class="cm">// Output: 1 2 5 8</span>\n    }\n}`,
        pitfalls: "Modifying containers while iterating over them, which invalidates active iterators and causes undefined behavior or crashes.",
        tldr: "Leverage STL containers and algorithms for fast, secure, and highly optimized data structures."
      },
      fio: {
        title: "File I/O Streams",
        category: "Advanced",
        definition: "C++ I/O streams support robust file stream integration, providing ifstream (reading), ofstream (writing), and fstream (bidirectional read/write) classes.",
        theory: "<p>C++ uses streams to read and write files. <code>std::ifstream</code> and <code>std::ofstream</code> extend the standard <code>std::istream</code> and <code>std::ostream</code> classes, bringing file streaming into the generic C++ I/O system.</p><p>Streams manage resource handles automatically. However, you must handle operations carefully, using stream validation checks (like <code>is_open()</code>) and binary flags (<code>std::ios::binary</code>) when writing raw structures.</p>",
        keyConcepts: [
          { name: "Output Streams", desc: "Using std::ofstream to write formatted text or binary arrays to files." },
          { name: "Input Streams", desc: "Using std::ifstream to read file contents line-by-line or byte-by-byte." },
          { name: "Binary Transfer", desc: "Writing raw structures directly to files using ios::binary and reinterpret_cast." }
        ],
        syntax: "std::ofstream out(\"file.txt\");\nout << \"data\";\nout.close();",
        code: `<span class="kw">#include</span> <span class="st">&lt;fstream&gt;</span>\n<span class="kw">#include</span> <span class="st">&lt;string&gt;</span>\n\n<span class="fn">void</span> writeAndRead() {\n    <span class="cm">// Open stream and write</span>\n    std::ofstream out(<span class="st">"test.txt"</span>);\n    out &lt;&lt; <span class="st">"Line content"</span>;\n    out.close();\n    \n    <span class="cm">// Read back</span>\n    std::ifstream in(<span class="st">"test.txt"</span>);\n    std::string line;\n    <span class="kw">if</span> (in.is_open()) {\n        std::getline(in, line);\n    }\n}`,
        pitfalls: "Failing to check if a file stream opened successfully before performing I/O operations.",
        tldr: "Use standard file streams for I/O operations. Always check stream status before performing read or write actions."
      },
      dma: {
        title: "Dynamic Memory Allocation",
        category: "Advanced",
        definition: "Dynamic Memory Allocation is the mechanism of reserving heap memory at runtime using allocation operators (new/delete in C++ or malloc/free in C), giving programs size flexibility at the cost of manual lifecycle management.",
        theory: "<p>Unlike stack memory, which is automatically managed via scopes, <strong>dynamic memory allocation</strong> uses the heap. In C++, this is handled via <code>new</code> (which allocates bytes and runs constructors) and <code>delete</code> (which runs destructors and releases memory). These differ from C's <code>malloc</code> and <code>free</code>, which only allocate raw bytes without object initialization.</p><p>Dynamic allocation is crucial when resource sizes are unknown at compile-time. However, it requires absolute discipline: every allocated object must be paired with exactly one deallocation to avoid <strong>memory leaks</strong> or <strong>double frees</strong>. Modern OOP designs use RAII and smart pointers to wrap these operations, but understanding raw heap allocations remains fundamental.</p><p>C++ also lets classes overload <code>operator new</code> and <code>operator delete</code>, enabling custom memory pooling and tracking. Furthermore, <strong>Placement New</strong> allows constructors to run in pre-allocated buffers, avoiding heap overhead entirely.</p>",
        keyConcepts: [
          { name: "Heap vs Stack", desc: "Stack memory is scoped and fast; heap memory is manual, dynamic, and persists until explicitly freed." },
          { name: "Custom Allocation Overrides", desc: "Overloading operator new/delete globally or per-class to optimize memory pools." },
          { name: "Placement New", desc: "Constructing objects in-place within a pre-allocated memory buffer using static memory." }
        ],
        syntax: "void* buffer = malloc(sizeof(Type));\nType* p = new (buffer) Type(args);\np->~Type(); // Manual destructor call\nfree(buffer);",
        code: `<span class="kw">#include</span> <span class="st">&lt;iostream&gt;</span>\n<span class="kw">#include</span> <span class="st">&lt;new&gt;</span>\n\n<span class="kw">class</span> <span class="ty">CustomPool</span> {\n<span class="kw">public</span>:\n    <span class="ty">int</span> data;\n    <span class="cm">// Overload operator new</span>\n    <span class="fn">void</span>* <span class="kw">operator</span> <span class="fn">new</span>(size_t size) {\n        std::cout &lt;&lt; <span class="st">"Allocating "</span> &lt;&lt; size &lt;&lt; <span class="st">" bytes\\n"</span>;\n        <span class="kw">return</span> ::<span class="fn">operator new</span>(size);\n    }\n    <span class="cm">// Overload operator delete</span>\n    <span class="fn">void</span> <span class="kw">operator</span> <span class="fn">delete</span>(<span class="fn">void</span>* ptr) {\n        std::cout &lt;&lt; <span class="st">"Deallocating memory\\n"</span>;\n        ::<span class="fn">operator delete</span>(ptr);\n    }\n};\n\n<span class="ty">int</span> <span class="fn">main</span>() {\n    <span class="ty">CustomPool</span>* obj = <span class="kw">new</span> <span class="ty">CustomPool</span>();\n    obj-&gt;data = <span class="nu">42</span>;\n    <span class="kw">delete</span> obj; // Overloaded delete called\n    <span class="kw">return</span> <span class="nu">0</span>;\n}`,
        pitfalls: "Mismatching allocators (allocating with new[] and freeing with delete or free), failing to release memory (memory leaks), or using pointers after deallocation (dangling pointers/double frees).",
        tldr: "Dynamic memory uses the heap. C++ operator new/delete initialize objects automatically. class-level operator overloading allows customized allocation."
      },
      sptr: {
        title: "Smart Pointers",
        category: "Advanced",
        definition: "Smart Pointers implement automated memory management in C++, using unique_ptr (exclusive ownership), shared_ptr (reference-counted sharing), and weak_ptr (non-owning reference).",
        theory: "<p>Raw pointers are prone to leaks and dangling references. Modern C++ resolves this using Smart Pointers, which automate memory cleanup via object lifetimes.</p><p><code>std::unique_ptr</code> models exclusive ownership with zero runtime overhead. <code>std::shared_ptr</code> uses reference counting to share ownership across multiple scopes, freeing memory when the last owner is destroyed. <code>std::weak_ptr</code> references shared objects without incrementing their reference count, which is crucial to break cyclic reference memory leaks.</p>",
        keyConcepts: [
          { name: "std::unique_ptr", desc: "Exclusive ownership with zero runtime overhead. Cannot be copied, only moved." },
          { name: "std::shared_ptr", desc: "Shared ownership using thread-safe reference counting." },
          { name: "std::weak_ptr", desc: "Non-owning observer. Prevents cyclic dependency memory leaks." }
        ],
        syntax: "std::unique_ptr<Type> ptr = std::make_unique<Type>(args);",
        code: `<span class="kw">#include</span> <span class="st">&lt;memory&gt;</span>\n\n<span class="kw">class</span> <span class="ty">Device</span> {};\n\n<span class="ty">int</span> <span class="fn">main</span>() {\n    <span class="cm">// Exclusive stack owner</span>\n    std::unique_ptr&lt;<span class="ty">Device</span>&gt; dev = std::make_unique&lt;<span class="ty">Device</span>&gt;();\n    \n    <span class="cm">// Shared owners</span>\n    std::shared_ptr&lt;<span class="ty">Device</span>&gt; sh1 = std::make_shared&lt;<span class="ty">Device</span>&gt;();\n    std::shared_ptr&lt;<span class="ty">Device</span>&gt; sh2 = sh1; <span class="cm">// Ref count: 2</span>\n} <span class="cm">// Automatically freed</span>`,
        pitfalls: "Using raw pointer constructors (new) inside shared_ptrs instead of std::make_shared, which misses performance optimizations and exception safety.",
        tldr: "Modern smart pointers automate memory management. Use unique_ptr by default, and shared_ptr/weak_ptr when shared ownership is needed."
      },
      raii: {
        title: "RAII Pattern",
        category: "Advanced",
        definition: "Resource Acquisition Is Initialization (RAII) ties resource lifetimes to stack object scopes, ensuring automated, exception-safe cleanup.",
        theory: "<p>RAII is the core resource management pattern in C++. It states that any resource (memory, files, database connections, locks) must be acquired inside an object's constructor and released inside its destructor.</p><p>Because stack object destructors run automatically when they go out of scope—even during exceptions—RAII guarantees exception-safe cleanup, preventing memory leaks and resource locks.</p>",
        keyConcepts: [
          { name: "Resource Binding", desc: "Tying resources directly to the life cycle of stack-allocated objects." },
          { name: "Exception Safety", desc: "Stack unwinding ensures destructors execute and release resources even during crashes." },
          { name: "Scope Locking", desc: "Using RAII wrappers (like lock_guard) to safely manage thread locks." }
        ],
        syntax: "class ResourceGuard {\npublic:\n  ResourceGuard() { acquire(); }\n  ~ResourceGuard() { release(); }\n};",
        code: `<span class="kw">#include</span> <span class="st">&lt;mutex&gt;</span>\n\nstd::mutex mtx;\n\n<span class="fn">void</span> safeThreadOperation() {\n    <span class="cm">// RAII Lock: lock acquired here</span>\n    std::lock_guard&lt;std::mutex&gt; lock(mtx);\n    \n    <span class="cm">// Protected critical section</span>\n    \n} <span class="cm">// lock released automatically on exit</span>`,
        pitfalls: "Forgetting to wrap raw system resource allocations in RAII guards, leaving code vulnerable to memory and resource leaks during exceptions.",
        tldr: "RAII ties resource lifetimes to object scopes. Use stack-allocated guards to ensure reliable, exception-safe cleanup."
      },

        category: "Modern C++",
        definition: "Move Semantics transfers resource ownership from temporary objects to new destinations instead of deep-copying, using rvalue references (T&&) to improve performance.",
        theory: "<p>Before C++11, passing large objects (like vectors) required deep-copying all elements, which degraded performance. Move semantics solves this by introducing Rvalue References (<code>T&&</code>).</p><p>Instead of deep-copying, move constructors transfer ownership of internal resource pointers (e.g., copying a heap address and nulling the source pointer). This allows temporary objects to be transferred with near-zero overhead.</p>",
        keyConcepts: [

          { name: "std::move Cast", desc: "A cast that converts an lvalue to an rvalue, signaling that its resources are available to be moved." },

        syntax: "ClassName(ClassName&& other) noexcept; // Move constructor",
        code: `<span class="kw">#include</span> <span class="st">&lt;utility&gt;</span>\n\n<span class="kw">class</span> <span class="ty">BigBuffer</span> {\n<span class="kw">private</span>:\n    <span class="ty">int</span>* data = <span class="kw">nullptr</span>;\n<span class="kw">public</span>:\n    <span class="cm">// Move Constructor</span>\n    <span class="ty">BigBuffer</span>(<span class="ty">BigBuffer</span>&amp;&amp; other) <span class="kw">noexcept</span> : data(other.data) {\n        other.data = <span class="kw">nullptr</span>; <span class="cm">// Steals ownership</span>\n    }\n    ~<span class="ty">BigBuffer</span>() { <span class="kw">delete</span>[] data; }\n};`,
        pitfalls: "Accessing an object after casting it with std::move. The object is left in a valid but unspecified state, and accessing it can cause crashes.",
        tldr: "Move semantics replaces expensive deep copies with fast resource transfers. Mark move constructors noexcept."

        theory: "<p>Lambdas provide inline closures in C++. They simplify code by replacing formal function objects with inline anonymous expressions.</p><p>A lambda consists of a **Capture List** (specifying variables to capture by value or reference), a **Parameter List**, and a **Function Body**. Modern C++ supports generic lambdas (using <code>auto</code> parameters) and capture-initialized expressions.</p>",

        pitfalls: "Capturing local variables by reference inside lambdas that outlive the caller scope, which leads to dangling references and undefined behavior.",

        theory: "<p>Namespaces group classes, functions, and variables under a common prefix. This isolates code and prevents global naming collisions.</p><p>C++ fully supports nested namespaces, namespace aliases, and inline namespaces (used for API versioning). Avoid placing <code>using namespace std;</code> in header files, as it pollutes the global scope for every file that includes them.</p>",

      cast: {
        title: "Type Casting",
        category: "Modern C++",
        definition: "C++ type casting replaces unsafe C-style conversions with explicit, type-safe compile-time and runtime operators (static_cast, dynamic_cast, const_cast, reinterpret_cast).",
        theory: "<p>C-style casts are dangerous because they perform conversions silently without compile-time validation. C++ replaces them with four explicit casting operators:</p><p><code>static_cast</code> handles safe, related conversions (like numeric casts). <code>dynamic_cast</code> safely downcasts polymorphic pointers at runtime, verifying types using RTTI (Runtime Type Information). <code>const_cast</code> adds or removes constness, and <code>reinterpret_cast</code> performs raw bit pattern conversions.</p>",
        keyConcepts: [
          { name: "static_cast", desc: "Type-safe compile-time cast for related types, like conversion from float to int." },
          { name: "dynamic_cast", desc: "Safe downcast for polymorphic hierarchies. Checks types at runtime, returning nullptr on failure." },

        syntax: "TargetType val = static_cast<TargetType>(sourceVal);",
        code: `<span class="kw">class</span> <span class="ty">Base</span> { <span class="kw">public</span>: <span class="kw">virtual</span> ~<span class="ty">Base</span>() = <span class="kw">default</span>; };\n<span class="kw">class</span> <span class="ty">Derived</span> : <span class="kw">public</span> <span class="ty">Base</span> {};\n\n<span class="fn">void</span> process(<span class="ty">Base</span>* b) {\n    <span class="cm">// Dynamic downcast with runtime verification</span>\n    <span class="ty">Derived</span>* d = <span class="kw">dynamic_cast</span>&lt;<span class="ty">Derived</span>*&gt;(b);\n    <span class="kw">if</span> (d != <span class="kw">nullptr</span>) {\n        <span class="cm">// Cast succeeded</span>\n    }\n}`,

      cexp: {
        title: "const & constexpr",
        category: "Modern C++",
        definition: "const marks variables as runtime read-only, while constexpr forces compile-time evaluation, enabling zero-overhead execution.",
        theory: "<p>In C++, <code>const</code> and <code>constexpr</code> serve different purposes. <code>const</code> locks values at runtime, preventing mutation after initialization.</p><p><code>constexpr</code> guarantees compile-time evaluation. Functions marked constexpr execute during compilation if their arguments are constants, embedding the result directly in the binary. This enables zero-cost compile-time computation.</p>",
