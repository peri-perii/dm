      ro5: {
        title: "Rule of Five",
        category: "Modern C++",
        definition: "The Rule of Five states that if you define a custom destructor, copy constructor, copy assignment operator, move constructor, or move assignment operator, you likely need all five to manage resources safely.",
        theory: "<p>Before C++11, the Rule of Three governed custom resource management (destructor, copy constructor, and copy assignment). With C++11 and move semantics, this was expanded to the **Rule of Five** to include the move constructor and move assignment operator.</p><p>If a class manages raw resources (like heap memory or system handles), default compiler-generated copies can copy raw pointers instead of values, causing double-free bugs. Defining all five guarantees safe copy and move semantics. Modern C++ also promotes the **Rule of Zero**, which advises delegating resource management to STL containers and smart pointers so you don't have to write custom resource logic.</p>",
        keyConcepts: [
          { name: "Deep Copy", desc: "Duplicating resources dynamically so instances do not share and conflict over raw pointer structures." },
          { name: "Move Transfer", desc: "Moving pointer addresses and nulling source pointers to prevent double-free crashes." },
          { name: "Rule of Zero", desc: "Leverage smart pointers and containers so the compiler can safely generate all standard copy/move operations." }
        ],
        syntax: "class RuleOfFive {\npublic:\n  ~RuleOfFive();\n  RuleOfFive(const RuleOfFive&);\n  RuleOfFive& operator=(const RuleOfFive&);\n  RuleOfFive(RuleOfFive&&) noexcept;\n  RuleOfFive& operator=(RuleOfFive&&) noexcept;\n};",
        code: `<span class="kw">#include</span> <span class="st">&lt;utility&gt;</span>\n\n<span class="kw">class</span> <span class="ty">ResourceHandler</span> {\n<span class="kw">private</span>:\n    <span class="ty">int</span>* data;\n<span class="kw">public</span>:\n    <span class="cm">// 1. Destructor</span>\n    ~<span class="ty">ResourceHandler</span>() { <span class="kw">delete</span> data; }\n    <span class="cm">// 2. Copy Constructor</span>\n    <span class="ty">ResourceHandler</span>(<span class="kw">const</span> <span class="ty">ResourceHandler</span>&amp; o) : data(<span class="kw">new</span> <span class="ty">int</span>(*o.data)) {}\n    <span class="cm">// 3. Copy Assignment</span>\n    <span class="ty">ResourceHandler</span>&amp; <span class="kw">operator</span>=(<span class="kw">const</span> <span class="ty">ResourceHandler</span>&amp; o) {\n        <span class="kw">if</span> (<span class="kw">this</span> != &amp;o) { *data = *o.data; }\n        <span class="kw">return</span> *<span class="kw">this</span>;\n    }\n    <span class="cm">// 4. Move Constructor</span>\n    <span class="ty">ResourceHandler</span>(<span class="ty">ResourceHandler</span>&amp;&amp; o) <span class="kw">noexcept</span> : data(o.data) { o.data = <span class="kw">nullptr</span>; }\n    <span class="cm">// 5. Move Assignment</span>\n    <span class="ty">ResourceHandler</span>&amp; <span class="kw">operator</span>=(<span class="ty">ResourceHandler</span>&amp;&amp; o) <span class="kw">noexcept</span> {\n        <span class="kw">if</span> (<span class="kw">this</span> != &amp;o) { <span class="kw">delete</span> data; data = o.data; o.data = <span class="kw">nullptr</span>; }\n        <span class="kw">return</span> *<span class="kw">this</span>;\n    }\n};`,
        pitfalls: "Writing custom destructors without defining copy/move constructors, causing shared pointers to double-delete memory.",
        tldr: "If you declare one custom lifetime manager, define all five. Better yet, follow the Rule of Zero and use smart pointers."
      },
      inl: {
        title: "Inline Functions",
        category: "Modern C++",
        definition: "Inline functions hint to the compiler to substitute function calls with their actual body, reducing function call overhead.",
        theory: "<p>Function calls introduce minor execution overhead (pushing parameters onto the stack and jumping to target addresses). The <code>inline</code> keyword suggests that the compiler substitute the function call directly with its code body.</p><p>Modern compilers optimize code aggressively and can inline functions automatically regardless of the keyword. In modern C++, <code>inline</code> is primarily used in headers to prevent duplicate definition linking errors when functions are included across multiple translation units.</p>",
        keyConcepts: [
          { name: "Call Overhead Reduction", desc: "Substituting function bodies directly at the call site to eliminate stack jumps." },
          { name: "Header Definitions", desc: "Using inline to define non-member utility functions in headers safely." },
          { name: "Implicit Class Inlines", desc: "Methods declared directly inside class declarations are implicitly inlined by the compiler." }
        ],
        syntax: "inline int calculateSquare(int x) {\n  return x * x;\n}",
        code: `<span class="kw">class</span> <span class="ty">Calculator</span> {\n<span class="kw">public</span>:\n    <span class="cm">// Implicitly inlined by definition inside the class body</span>\n    <span class="ty">int</span> doubleVal(<span class="ty">int</span> n) {\n        <span class="kw">return</span> n * <span class="nu">2</span>;\n    }\n};\n\n<span class="cm">// Explicit inline declaration in header</span>\n<span class="kw">inline</span> <span class="ty">int</span> addNumbers(<span class="ty">int</span> a, <span class="ty">int</span> b) {\n    <span class="kw">return</span> a + b;\n}`,
        pitfalls: "Inlining large, complex functions. This increases binary sizes (code bloat) and hurts CPU instruction cache efficiency.",

      {d:"medium",q:"Can a nested class access private members of its enclosing class?",c:"",o:["Yes, nested classes have full access to outer class private members in C++11 and later.","No, they have no special access permissions.","Yes, but only if they are declared public.","No, unless the nested class is explicitly declared a friend."],a:0,e:"In modern C++, a nested class is treated as a member of the outer class and has full access to the outer class private members. [classes-medium]"},
      {d:"hard",q:"What is printed by this program illustrating member pointer offsets?",c:"struct Align {\n  char a;\n  int b;\n};\nint main() {\n  Align obj;\n  std::cout << (sizeof(Align) == 8);\n}",o:["1 (usually, due to int alignment padding to 4 bytes)","0","Error","Undefined"],a:0,e:"To align b (4-byte int) properly in memory, the compiler adds 3 bytes of padding after a (char). So sizeof(Align) is 8 bytes, printing 1. [classes-hard]"},
      {d:"hard",q:"What is printed by this program invoking pointers to member functions?",c:"class Op {\npublic:\n  void f() { std::cout << \"F\"; }\n};\nint main() {\n  Op obj;\n  void (Op::*ptr)() = &Op::f;\n  (obj.*ptr)();\n}",o:["F","Error","Nothing","Undefined"],a:0,e:"void (Op::*ptr)() defines a pointer to a member function of Op. (obj.*ptr)() invokes it on obj, printing F. [classes-hard]"},
      {d:"hard",q:"Which trait verifies that a class conforms to standard C-compatible layout restrictions?",c:"",o:["std::is_standard_layout","std::is_pod","std::is_trivial","std::is_literal_type"],a:0,e:"std::is_standard_layout checks if a class has C-compatible alignment and member layouts, which is crucial for binary interoperability. [classes-hard]"},
      {d:"hard",q:"What is the size of Derived in this multiple inheritance layout scenario?",c:"class A { char a; };\nclass B { char b; };\nclass Derived : public A, public B { int val; };\nint main() {\n  std::cout << (sizeof(Derived) >= 8);\n}",o:["1 (true, since members align on int boundaries, packing A and B to 4 bytes)","0 (false)","Error","Undefined"],a:0,e:"Derived inherits char from A and char from B, followed by int val. Under typical 4-byte int alignment, derived will pad chars to 4 bytes, so total size is 8. [classes-hard]"},
      {d:"hard",q:"How do non-virtual member functions affect C++ object size?",c:"class Func {\n  int val;\npublic:\n  void print() {}\n  void update(int n) {}\n};\nint main() {\n  std::cout << sizeof(Func);\n}",o:["4","8","12","16"],a:0,e:"Non-virtual member functions do not reside inside the object. They are regular functions under the hood. So sizeof(Func) is just sizeof(int) = 4. [classes-hard]"},
      {d:"easy",q:"What is the output?",c:"class A {\npublic:\n  A() { std::cout << \"Hi\"; }\n};\nint main() {\n  A a;\n}",o:["Hi","A","Error","Nothing"],a:0,e:"Default constructor A() runs when object is created, printing Hi. [ctor-easy]"},
      {d:"easy",q:"What is the output?",c:"class Box {\npublic:\n  int val;\n  Box(int v) : val(v) {}\n};\nint main() {\n  Box b(10);\n  std::cout << b.val;\n}",o:["10","0","v","Error"],a:0,e:"Parameterized constructor sets val=10 via initializer list. [ctor-easy]"},
      {d:"easy",q:"What is the output?",c:"class A {\npublic:\n  ~A() { std::cout << \"Bye\"; }\n};\nint main() {\n  A a;\n}",o:["Bye","~A","A","Error"],a:0,e:"Destructor runs when a goes out of scope at end of main. [ctor-easy]"},
      {d:"easy",q:"What is printed?",c:"class A {\npublic:\n  A() { std::cout << \"default\"; }\n  A(int) { std::cout << \"param\"; }\n};\nint main() {\n  A a(5);\n}",o:["param","default","5","Error"],a:0,e:"A(5) calls the parameterized A(int), printing param. [ctor-easy]"},
      {d:"easy",q:"What is printed?",c:"class A {\npublic:\n  A() { std::cout << \"C\"; }\n  A(const A&) { std::cout << \"P\"; }\n};\nint main() {\n  A a;\n  A b(a);\n}",o:["CP","CC","PP","Error"],a:0,e:"A a: default ctor (C). A b(a): copy ctor (P). Output: CP. [ctor-easy]"},
      {d:"medium",q:"What is printed by this program demonstrating constructor delegation?",c:"class A {\npublic:\n  A(int x) { std::cout << x; }\n  A() : A(42) { std::cout << \"D\"; }\n};\nint main() {\n  A a;\n}",o:["42D","D42","42","Error"],a:0,e:"A() delegates to A(int) which prints 42 first, then A() ctor body prints D. Output: 42D. [ctor-medium]"},
      {d:"medium",q:"What is the destructor call order for a derived class object?",c:"",o:["Derived class destructor runs first, then base class destructor.","Base class destructor runs first, then derived class destructor.","They run in parallel.","Only the derived class destructor runs."],a:0,e:"Destruction is LIFO: the derived class destructor executes first, followed by the base class destructor. [ctor-medium]"},
      {d:"medium",q:"What is the purpose of the explicit keyword on a constructor?",c:"",o:["To prevent the compiler from using the constructor for implicit type conversions","To allow the constructor to be called dynamically","To force the compiler to inline the constructor","To mark the constructor as virtual"],a:0,e:"The explicit keyword prevents implicit conversions and copy-initialization from converting argument types to class objects. [ctor-medium]"},
      {d:"medium",q:"What happens if a constructor throws an exception in C++?",c:"",o:["The exception propagates, and the object is NOT considered fully constructed (its destructor will NOT run).","The destructor runs immediately to clean up.","The program crashes instantly.","The memory leak is ignored."],a:0,e:"In C++, if a constructor throws, construction is incomplete. The destructor of the class itself is NOT called, though fully constructed member subobjects are destroyed. [ctor-medium]"},
      {d:"medium",q:"What is printed?",c:"class A {\npublic:\n  A() { std::cout << \"C\"; }\n  ~A() { std::cout << \"D\"; }\n};\nint main() {\n  { A a; }\n  std::cout << \"M\";\n}",o:["CDM","CMD","MCD","Error"],a:0,e:"A a is constructed (C), goes out of scope and is destroyed (D), then main prints M. Output: CDM. [ctor-medium]"},
      {d:"hard",q:"What is printed by this program involving non-trivial member construction order?",c:"class Member {\npublic:\n  Member(int n) { std::cout << n; }\n};\nclass Host {\n  Member m2;\n  Member m1;\npublic:\n  Host() : m1(1), m2(2) {}\n};\nint main() {\n  Host h;\n}",o:["21","12","Error","Undefined"],a:0,e:"Member variables are initialized in their order of declaration in the class body, not the initializer list order. m2 is declared before m1, so it prints 2 then 1. [ctor-hard]"},
      {d:"hard",q:"Under C++17, what is printed by this copy elision program?",c:"class A {\npublic:\n  A() { std::cout << \"C\"; }\n  A(const A&) { std::cout << \"K\"; }\n  A(A&&) { std::cout << \"M\"; }\n};\nA get() { return A(); }\nint main() {\n  A obj = get();\n}",o:["C","CK","CM","CKM"],a:0,e:"Under C++17 mandatory copy elision, returning a temporary directly initializes obj without copy or move constructors. Only C is printed. [ctor-hard]"},
      {d:"hard",q:"What happens when a class contains a pure virtual destructor?",c:"",o:["The class is abstract, and the pure virtual destructor MUST have a function definition outside the class body.","The constructor cannot exist.","The program fails to link if the destructor has a body.","The destructor is automatically generated."],a:0,e:"A pure virtual destructor makes a class abstract. Crucially, C++ requires a definition/body for a pure virtual destructor because derived class destructors always call base destructors during stack unwinding. [ctor-hard]"},
      {d:"hard",q:"What is printed by this list-initialization priority check?",c:"#include <initializer_list>\nclass A {\npublic:\n  A(int, int) { std::cout << \"std\"; }\n  A(std::initializer_list<int>) { std::cout << \"init\"; }\n};\nint main() {\n  A a{1, 2};\n}",o:["init","std","Error","Ambiguous"],a:0,e:"Braced-init list constructor (initializer_list) takes strict precedence over standard matching constructors. Output: init. [ctor-hard]"},
      {d:"hard",q:"What is printed by this program illustrating constructor failure unwinding?",c:"class Member {\npublic:\n  Member() { std::cout << \"M\"; }\n  ~Member() { std::cout << \"~M\"; }\n};\nclass Host {\n  Member m;\npublic:\n  Host() { std::cout << \"H\"; throw 1; }\n  ~Host() { std::cout << \"~H\"; }\n};\nint main() {\n  try { Host h; }\n  catch(...) { std::cout << \"E\"; }\n}",o:["MH~ME","MH~H~ME","MHE","Error"],a:0,e:"m is constructed (M). Host ctor prints H and throws. Since Host is incomplete, ~Host does NOT run. But fully constructed member m IS destroyed (~M). Catch prints E. Output: MH~ME. [ctor-hard]"},
      {d:"easy",q:"What happens if we try to access a private member variable of a class directly from main()?",c:"class A {\n  int val = 5;\n};\nint main() {\n  A a;\n  a.val = 10;\n}",o:["Compilation error","Runtime crash","val is updated silently","Undefined behavior"],a:0,e:"private members cannot be accessed outside the class scope. Attempting to do so triggers a compilation error. [access-easy]"},
      {d:"easy",q:"Which access specifier makes members accessible to derived classes but not to the general public?",c:"",o:["protected","private","public","friend"],a:0,e:"protected members are private to the public but accessible inside derived class scopes. [access-easy]"},
      {d:"easy",q:"What is the default inheritance access type for a struct inheriting from another struct?",c:"struct A {};\nstruct B : A {};",o:["public","private","protected","virtual"],a:0,e:"For structs, the default inheritance type is public. (For classes, it is private). [access-easy]"},
      {d:"easy",q:"Which of the following allows a public getter function to expose a private variable safely?",c:"class A {\n  int x = 5;\npublic:\n  int getX() const { return x; }\n};",o:["It returns a copy of x, preserving private encapsulation.","It allows direct modification of x from outside.","It bypasses compiler checks.","It is compilation error."],a:0,e:"Exposing private members by returning by value (copy) is a safe encapsulation practice. [access-easy]"},
      {d:"easy",q:"What access specifier is implicit for class members before any label is provided?",c:"class Test {\n  int val;\n};",o:["private","public","protected","friend"],a:0,e:"In a class, members are private by default before any access specifier label. [access-easy]"},
      {d:"medium",q:"What is the access level of Base members in Derived under protected inheritance?",c:"class Base {\npublic:\n  int val;\n};\nclass Derived : protected Base {};",o:["protected inside Derived","private inside Derived","public inside Derived","Inaccessible"],a:0,e:"Under protected inheritance, public and protected members of Base become protected in Derived. [access-medium]"},
      {d:"medium",q:"How can you restore the public access of a base class member in a privately inherited class?",c:"class Base { public: int x; };\nclass Derived : private Base {\npublic:\n  // How to restore access of x?\n};",o:["using Base::x;","Base::x = public;","friend Base::x;","It is impossible."],a:0,e:"A using-declaration like using Base::x; in Derived's public section restores the public access level of x. [access-medium]"},
      {d:"medium",q:"What is printed?",c:"class Base {\nprotected:\n  int x = 10;\n};\nclass Derived : public Base {\npublic:\n  void show() { std::cout << x; }\n};\nint main() {\n  Derived d;\n  d.show();\n}",o:["10","Error","x","Nothing"],a:0,e:"Derived can access protected x of Base inside its member methods. Output: 10. [access-medium]"},
      {d:"medium",q:"Which of the following is true about private inheritance?",c:"",o:["It represents \"implemented in terms of\" rather than \"is-a\".","It makes derived objects public.","It allows public base casting.","It inherits everything as public."],a:0,e:"Private inheritance models \"has-a\" or \"implemented in terms of\". Subclass pointers cannot be implicitly cast to base pointers by the public. [access-medium]"},
      {d:"medium",q:"What happens when main attempts to read a protected member through a derived object pointer?",c:"class A {\nprotected:\n  int val = 5;\n};\nclass B : public A {};\nint main() {\n  B b;\n  std::cout << b.val;\n}",o:["Compilation error","Prints 5","Runtime crash","Undefined"],a:0,e:"protected members are inaccessible to the general public (main), even through a derived class instance. [access-medium]"},
      {d:"hard",q:"Can you access a private member of a class using a pointer-to-member trick, bypassing access specifiers?",c:"",o:["Yes, via explicit template instantiation of member pointers (legal loophole in the C++ standard).","No, access specifiers are enforced at runtime.","Yes, by casting the class to a char* array only.","No, pointers to member functions always enforce private restrictions compile-time."],a:0,e:"By exploiting template instantiation rules (standard C++ loophole), one can bind a pointer-to-member to a private variable, bypassing access checks. [access-hard]"},
      {d:"hard",q:"What is printed by this multiple access check scenario?",c:"class A {\npublic:\n  int x = 1;\n};\nclass B : private A {\n  friend int main();\n};\nint main() {\n  B b;\n  A* a = (A*)&b; // C-style cast force slice\n  std::cout << a->x;\n}",o:["1","Error","0","Crash"],a:0,e:"Private inheritance prevents implicit casting to Base, but the explicit C-style cast bypasses the compiler block, displaying the underlying x=1. [access-hard]"},
      {d:"hard",q:"Does C++ allow access specifiers to affect the relative ordering of member variables in memory?",c:"",o:["Yes, the compiler is allowed to reorder variables separated by different access specifier labels.","No, the compiler must preserve order across all specifiers.","Yes, but only if virtual functions are present.","No, structs default to private if reordered."],a:0,e:"According to the C++ standard, members separated by access specifiers have unspecified order relative to each other (compilers can reorder them, losing standard-layout compliance). [access-hard]"},
      {d:"hard",q:"What is printed by this access boundary check?",c:"class Base {\npublic:\n  int val = 5;\n};\nclass Der : private Base {};\nint main() {\n  Der d;\n  // std::cout << d.val;\n  std::cout << \"OK\";\n}",o:["OK","Error","5","Crash"],a:0,e:"The code compiles and prints OK because the private member access violation code is commented out! [access-hard]"},
      {d:"hard",q:"How do using-declarations interact with private inheritance access?",c:"class A { protected: int x = 3; };\nclass B : private A {\npublic:\n  using A::x; // promoted to public!\n};\nint main() {\n  B b;\n  std::cout << b.x;\n}",o:["3","Error","x","Crash"],a:0,e:"A using-declaration in B's public section successfully elevates the protected member x of Base to public. Output: 3. [access-hard]"},
      {d:"easy",q:"What is encapsulation?",c:"",o:["Combining data and functions into a single unit, hiding implementation details","Declaring all variables static","Inheriting from multiple parent classes","Compiling code into a binary DLL"],a:0,e:"Encapsulation is the OOP concept of wrapping data variables and methods in a single class while protecting the state from direct external access. [enc-easy]"},
      {d:"easy",q:"Which of the following illustrates a write-only property in encapsulation?",c:"",o:["A setter function is provided, but no getter function is defined.","A getter is public; the setter is private.","The member variable is marked const.","The member variable is public."],a:0,e:"A write-only property is implemented by having a public setter to write values, without any public getter to retrieve them. [enc-easy]"},
      {d:"easy",q:"Why are class member variables usually kept private?",c:"",o:["To prevent unauthorized external code from modifying internal state directly","To make class compilation faster","To automatically free variables on scope exit","To allow methods to be virtual"],a:0,e:"Keeping member variables private enforces encapsulation, forcing users to interact via validated public interfaces. [enc-easy]"},
      {d:"easy",q:"What is a read-only property in encapsulation?",c:"",o:["A public getter is provided, but no public setter is defined.","The variable is protected.","The class is empty.","A public setter is provided but no getter."],a:0,e:"A read-only property is constructed by exposing a public getter function but no public setter. [enc-easy]"},
      {d:"easy",q:"Which method validates input to maintain a class's valid state?",c:"",o:["Setter function","Getter function","Destructor","Static function"],a:0,e:"Setter functions are the primary gatekeepers of encapsulation, validating input before updating private states. [enc-easy]"},
      {d:"medium",q:"When designing an encapsulated class, why might a getter return by const reference instead of value?",c:"",o:["To avoid expensive copies of large objects while preventing external modification","To make the variable private","To allow the caller to modify the internal state","To make compilation faster"],a:0,e:"Returning large structures by const reference avoids copying overhead while preserving read-only encapsulation. [enc-medium]"},
      {d:"medium",q:"What is the Pimpl (Pointer to Implementation) idiom in C++?",c:"",o:["A technique to hide implementation details by storing private members in a separate struct accessed via a raw or smart pointer","An optimization to replace virtual pointers","An implementation of static arrays","A memory profiling tool"],a:0,e:"The Pimpl idiom removes private variables from header files, reducing build dependencies and enforcing strict encapsulation. [enc-medium]"},
      {d:"medium",q:"What is printed?",c:"class State {\n  int val = 0;\npublic:\n  void set(int x) { if (x > 0) val = x; }\n  int get() const { return val; }\n};\nint main() {\n  State s;\n  s.set(-5);\n  std::cout << s.get();\n}",o:["0","-5","Error","Undefined"],a:0,e:"The setter validates input (x > 0). -5 is ignored, keeping val at its default 0. [enc-medium]"},
      {d:"medium",q:"How can a class encapsulate a raw array safely?",c:"",o:["By wrapping the array in a private section and exposing bounds-checked getters/setters","By making the array public","By using macros","By passing array pointers directly"],a:0,e:"Encapsulating raw arrays requires masking them as private and using bounds-checked methods (like `at()`) to protect memory. [enc-medium]"},
      {d:"medium",q:"Does encapsulation improve exception safety in class structures?",c:"",o:["Yes, because it isolates state transitions to member functions which can roll back on failures.","No, exception safety is unrelated.","Yes, but only for static variables.","No, it makes code more fragile."],a:0,e:"By routing all modifications through a single setter/member function, we can guarantee invariants and roll back states on exceptions. [enc-medium]"},
      {d:"hard",q:"What is a drawback of using the Pimpl idiom for encapsulation?",c:"",o:["It introduces an extra heap allocation and a level of pointer dereferencing indirection.","It makes the class public by default.","It cannot be used with smart pointers.","It makes static members illegal."],a:0,e:"The Pimpl idiom requires allocating the implementation struct on the heap and accessing it via pointer indirection, adding overhead. [enc-hard]"},
      {d:"hard",q:"What is printed by this program using nested encapsulated structures?",c:"class Outer {\n  class Inner {\n    int val = 42;\n    friend class Outer;\n  } in;\npublic:\n  int get() { return in.val; }\n};\nint main() {\n  Outer o;\n  std::cout << o.get();\n}",o:["42","Error","0","Nothing"],a:0,e:"Outer class is declared a friend of Inner nested class, allowing Outer::get() to access Inner::val, printing 42. [enc-hard]"},
      {d:"hard",q:"How does thread-safety affect encapsulated getters and setters?",c:"",o:["Getters and setters must synchronize state access (e.g. via std::mutex) to prevent race conditions on encapsulated variables.","Encapsulation automatically guarantees thread safety.","Static variables cannot be protected.","Mutexes are ignored in getters."],a:0,e:"Encapsulation allows us to wrap state changes inside synchronized blocks (using lock guards inside setters/getters) to guarantee thread safety. [enc-hard]"},
      {d:"hard",q:"What is printed by this transactional encapsulated setter program?",c:"class Trans {\n  int val = 10;\npublic:\n  void update(int x) {\n    int backup = val;\n    val = x;\n    if (val < 0) { val = backup; throw 0; }\n  }\n  int get() { return val; }\n};\nint main() {\n  Trans t;\n  try { t.update(-5); }\n  catch(...) { std::cout << t.get(); }\n}",o:["10","-5","0","Error"],a:0,e:"The setter rolls back to backup when val becomes negative and throws. Catch prints the unchanged state 10. [enc-hard]"},
      {d:"hard",q:"In C++, does compiling a class using Pimpl prevent ABI breakages when changing private members?",c:"",o:["Yes, because the public interface size of the enclosing class pointer remains static.","No, it does not affect ABI.","Yes, but only if we use virtual inheritance.","No, headers must still be updated."],a:0,e:"Pimpl keeps the private layout in a source-only struct. Changing private fields doesn't change the header object size, preserving ABI. [enc-hard]"},
      {d:"easy",q:"What is printed?",c:"class Base {\npublic:\n  void greet() { std::cout << \"Hi\"; }\n};\nclass Der : public Base {};\nint main() {\n  Der d;\n  d.greet();\n}",o:["Hi","Base","Der","Error"],a:0,e:"Der inherits greet() from Base. d.greet() calls Base::greet(). [inh-easy]"},
      {d:"easy",q:"What is the correct sequence of constructors called when instantiating a Derived class object?",c:"",o:["Base constructor runs first, then Derived class constructor.","Derived constructor runs first, then Base class constructor.","They execute concurrently.","Only the Derived constructor executes."],a:0,e:"C++ always constructs base objects first, then executes the subclass derived constructor. [inh-easy]"},
      {d:"easy",q:"What is the destructor execution sequence when a Derived object goes out of scope?",c:"",o:["Derived class destructor runs first, then Base class destructor.","Base class destructor runs first, then Derived class destructor.","They run in parallel.","Only the Base class destructor runs."],a:0,e:"Destruction order is the exact reverse of construction order: Derived class destructor runs first, followed by Base. [inh-easy]"},
      {d:"easy",q:"Which keyword is used to establish multiple inheritance in C++?",c:"",o:["A comma-separated list after the class colon (e.g. class C : public A, public B)","The multiple keyword","Defining classes nested inside each other","C++ does not support multiple inheritance."],a:0,e:"C++ supports multiple inheritance by providing a comma-separated list of base classes after the class colon. [inh-easy]"},
      {d:"easy",q:"What access level do public members of a Base class become in a Derived class with public inheritance?",c:"",o:["public","private","protected","inaccessible"],a:0,e:"Under public inheritance, public base members remain public inside the derived class. [inh-easy]"},
      {d:"medium",q:"What is object slicing in C++?",c:"",o:["The loss of derived class member variables when a derived object is assigned by value to a base class object","Dividing a class into multiple compilation units","Casting a base pointer to a derived pointer","A compiler optimization for virtual base classes"],a:0,e:"Object slicing occurs when a Derived object is assigned by value to a Base object, cutting off the Derived-specific fields. [inh-medium]"},
      {d:"medium",q:"What is printed by this program involving name hiding?",c:"class Base {\npublic:\n  void f(int) { std::cout << \"B\"; }\n};\nclass Derived : public Base {\npublic:\n  void f(double) { std::cout << \"D\"; }\n};\nint main() {\n  Derived d;\n  d.f(5);\n}",o:["D","B","BD","Error"],a:0,e:"Declaring f(double) in Derived hides all overloads of f in Base. d.f(5) calls Derived::f(double) -> D. [inh-medium]"},
      {d:"medium",q:"How can a derived class explicitly call a hidden base class method in C++?",c:"",o:["Using the scope resolution operator: d.Base::f(5);","Using super::f(5);","Using base->f(5);","By casting the method pointer."],a:0,e:"A hidden base class method can be invoked explicitly using the base class name and scope resolution operator. [inh-medium]"},
      {d:"medium",q:"What is printed by this multiple inheritance construction order test?",c:"class A { public: A() { std::cout << \"A\"; } };\nclass B { public: B() { std::cout << \"B\"; } };\nclass C : public B, public A { public: C() { std::cout << \"C\"; } };\nint main() {\n  C c;\n}",o:["BAC","ABC","CAB","Error"],a:0,e:"Base classes are constructed in the order they appear in the class inheritance declaration list (B first, then A), then C's constructor runs. Output: BAC. [inh-medium]"},
      {d:"medium",q:"What is the purpose of virtual inheritance in C++?",c:"",o:["To prevent duplicate subobjects of a base class from being created in a diamond inheritance pattern","To allow functions to be overridden dynamically","To speed up virtual function table lookups","To enable private class inheritances"],a:0,e:"Virtual inheritance ensures that a shared base class exists only as a single common instance in a diamond inheritance chain. [inh-medium]"},
      {d:"hard",q:"What is printed by this diamond inheritance program without virtual base classes?",c:"class V { public: int x = 1; };\nclass A : public V {};\nclass B : public V {};\nclass C : public A, public B {};\nint main() {\n  C c;\n  // std::cout << c.x; // Ambiguous!\n  std::cout << \"OK\";\n}",o:["OK","Error","1","Crash"],a:0,e:"Without virtual inheritance, C contains two instances of V. Accessing c.x directly is ambiguous and causes a compile error, but printing OK works. [inh-hard]"},
      {d:"hard",q:"What is printed by this virtual inheritance constructor chain program?",c:"class V {\npublic:\n  V() { std::cout << \"V\"; }\n  V(int) { std::cout << \"v\"; }\n};\nclass A : virtual public V {\npublic:\n  A() : V(1) { std::cout << \"A\"; }\n};\nclass B : virtual public V {\npublic:\n  B() : V(1) { std::cout << \"B\"; }\n};\nclass C : public A, public B {\npublic:\n  C() { std::cout << \"C\"; }\n};\nint main() {\n  C c;\n}",o:["VABC","vABvC","vABv","Error"],a:0,e:"In virtual inheritance, the most derived class (C) is responsible for constructing the virtual base (V) and uses V's default constructor (V) instead of initializer lists in A or B. Output: VABC. [inh-hard]"},

      {d:"easy",q:"What is printed?",c:"class A {\n  int x = 7;\n  friend class B;\n};\nclass B {\npublic:\n  void show(A& a) { std::cout << a.x; }\n};\nint main() {\n  A a;\n  B b;\n  b.show(a);\n}",o:["7","x","A","Error"],a:0,e:"B is a friend of A, accessing private x=7. [friend-easy]"},
      {d:"easy",q:"Which of the following is true about friendship in C++?",c:"",o:["Friendship must be declared explicitly inside the class that wants to grant access.","Friendship is granted automatically to subclasses.","Friendship is mutually automatic.","Friends cannot access protected members."],a:0,e:"A class must declare its friends inside its own definition to grant them access to its private variables. [friend-easy]"},
      {d:"easy",q:"Does declaring a function as a friend make it a member function of the class?",c:"",o:["No, friend functions are non-member functions.","Yes, they can be called using the dot operator.","Yes, they contain an implicit this pointer.","No, unless declared virtual."],a:0,e:"Friend functions are regular non-member functions that are granted special scope access. [friend-easy]"},
      {d:"easy",q:"Where should the friend declaration be placed in a class?",c:"",o:["It can be placed anywhere (private, public, or protected sections make no difference).","Only in the public section.","Only in the private section.","At the very end of the file."],a:0,e:"Friend declarations are independent of access specifier scopes; they can be placed anywhere inside the class definition. [friend-easy]"},
      {d:"medium",q:"Is friendship in C++ transitive?",c:"",o:["No, if A is a friend of B, and B is a friend of C, A is NOT automatically a friend of C.","Yes, friendship is transitive.","Yes, but only if templates are used.","No, unless they inherit from each other."],a:0,e:"Friendship is not transitive. Granting friend status to B does not grant it to B's friends. [friend-medium]"},
      {d:"medium",q:"Is friendship in C++ inherited?",c:"",o:["No, derived classes do not inherit friend status from their parent base classes.","Yes, subclasses are automatically friends of base friends.","Yes, if public inheritance is used.","No, unless the subclasses are virtual."],a:0,e:"Friendship is not inherited. A friend of a base class cannot access private members of subclasses. [friend-medium]"},
      {d:"medium",q:"What is printed?",c:"template<typename T> class A {\n  int val = 99;\n  template<typename U> friend class B;\n};\ntemplate<typename T> class B {\npublic:\n  void run(A<int>& obj) { std::cout << obj.val; }\n};\nint main() {\n  A<int> a;\n  B<double> b;\n  b.run(a);\n}",o:["99","Error","T","Nothing"],a:0,e:"Template friend declaration grants friend access to all instantiations of B template, printing 99. [friend-medium]"},
      {d:"medium",q:"What is a reciprocal friendship?",c:"",o:["When two classes declare each other as friends explicitly.","When a class befriended its base class.","When inline macros are used.","C++ does not support mutual friendship."],a:0,e:"Reciprocal friendship occurs when Class A declares B a friend, and Class B declares A a friend. [friend-medium]"},
      {d:"medium",q:"Can you overload a friend function in C++?",c:"",o:["Yes, friend declarations can match multiple overloaded function signatures.","No, friend functions cannot be overloaded.","Yes, but only for member templates.","No, unless marked explicit."],a:0,e:"Yes, friend functions can be overloaded, provided each overload signature matches a corresponding friend declaration in the class. [friend-medium]"},
      {d:"hard",q:"What is printed by this inline friend definition ADL program?",c:"class A {\n  int x = 5;\npublic:\n  friend void print(A& obj) { std::cout << obj.x; }\n};\nint main() {\n  A a;\n  print(a); // Found via Argument-Dependent Lookup (ADL)!\n}",o:["5","Error","Nothing","Undefined"],a:0,e:"Functions defined inline inside friend declarations are non-members found only by Argument-Dependent Lookup (ADL) based on their class arguments. Output: 5. [friend-hard]"},
      {d:"hard",q:"How can we befriend a private constructor to allow only a Factory class to instantiate a class?",c:"",o:["Make the class constructor private, and declare the Factory class a friend.","Set the constructor protected.","Use private inheritance.","Friendship cannot bypass constructors."],a:0,e:"Declaring Factory a friend of Product allows Factory methods to instantiate Product even if its constructor is private. [friend-hard]"},
      {d:"hard",q:"What is printed by this program befriending template parameters?",c:"template<typename T> class A {\n  int val = 42;\n  friend T;\n};\nclass B {\npublic:\n  void run(A<B>& obj) { std::cout << obj.val; }\n};\nint main() {\n  A<B> a;\n  B b;\n  b.run(a);\n}",o:["42","Error","Nothing","Undefined"],a:0,e:"C++11 allows befriending template parameters: friend T; grants friend access to type B when instantiating A<B>. Output: 42. [friend-hard]"},
      {d:"hard",q:"What is a friendship proxy helper class used for?",c:"",o:["To restrict friend access to a very specific subset of private class variables instead of exposing all of them.","To proxy compilation tasks.","To speed up virtual tables.","To avoid multiple inheritances."],a:0,e:"A friendship proxy is a public wrapper class representing specific members, granted friend status to limit scope exposure. [friend-hard]"},
      {d:"hard",q:"What is printed by this program befriending nested class templates?",c:"class Outer {\n  int val = 12;\n  class Nested {\n    friend class Outer;\n  };\n};\nint main() {\n  std::cout << \"OK\";\n}",o:["OK","Error","Nested","Crash"],a:0,e:"Nested classes do not automatically receive friend access to Outer class, but Outer has friend access to Nested. The code compiles and prints OK. [friend-hard]"},
      {d:"easy",q:"What is printed?",c:"class A {\npublic:\n  static int x;\n};\nint A::x = 42;\nint main() {\n  std::cout << A::x;\n}",o:["42","0","x","Error"],a:0,e:"Static member x is defined as 42 outside the class. A::x accesses it. [static-easy]"},
      {d:"easy",q:"What is the output?",c:"class A {\n  static int c;\npublic:\n  A() { c++; }\n  static int get() { return c; }\n};\nint A::c = 0;\nint main() {\n  A a, b, c_obj;\n  std::cout << A::get();\n}",o:["3","0","1","Error"],a:0,e:"Three A objects increment static c. get() returns 3. [static-easy]"},
      {d:"easy",q:"What is printed?",c:"void f() {\n  static int x = 0;\n  x++;\n  std::cout << x;\n}\nint main() {\n  f(); f(); f();\n}",o:["123","111","000","Error"],a:0,e:"Static local persists across calls. Increments to 1, 2, 3. [static-easy]"},
      {d:"easy",q:"Can a static member function access non-static class member variables?",c:"",o:["No, static member functions do not have an implicit \"this\" pointer.","Yes, if variables are declared public.","Yes, by casting the class pointer.","No, unless the function is virtual."],a:0,e:"Static functions belong to the class scope itself, not any object instance, and cannot access non-static variables. [static-easy]"},
      {d:"easy",q:"Which operator is used to access static members of a class without an object?",c:"",o:["::",".","->","*"],a:0,e:"The scope resolution operator :: is used to access static members directly through their class name. [static-easy]"},
      {d:"medium",q:"What is printed?",c:"template<typename T>\nclass Counter {\npublic:\n  static int c;\n};\ntemplate<typename T> int Counter<T>::c = 0;\nint main() {\n  Counter<int>::c = 5;\n  Counter<double>::c = 10;\n  std::cout << Counter<int>::c;\n}",o:["5","10","15","Error"],a:0,e:"Each template instantiation gets its own static variable instance. Counter<int>::c is independent of Counter<double>::c. Prints 5. [static-medium]"},
      {d:"medium",q:"What is a \"magic static\" (thread-safe local static) in C++11?",c:"",o:["A feature guaranteeing local static variable initialization is thread-safe and executes exactly once upon first control pass","A macro optimization","An automatically allocated heap buffer","A virtual compiler pointer"],a:0,e:"Magic statics ensure thread-safe initialization of local static variables, preventing race conditions on first access. [static-medium]"},
      {d:"medium",q:"What is an inline static member variable in C++17?",c:"",o:["A static variable that can be defined directly inside the class body without external linkage definitions","An inline function optimization","A static constant template only","A variable declared inside headers only"],a:0,e:"C++17 inline static variables can be declared and initialized directly inside the class definition, avoiding duplicate link definitions. [static-medium]"},
      {d:"medium",q:"What happens when you call a static member function through a null pointer?",c:"class Test {\npublic:\n  static void run() { std::cout << \"OK\"; }\n};\nint main() {\n  Test* p = nullptr;\n  p->run();\n}",o:["Compiles and prints OK (no \"this\" dereference occurs)","Runtime crash","Compilation error","Undefined behavior"],a:0,e:"Static functions do not dereference the object pointer. Calling p->run() resolves statically to Test::run(). Output: OK. [static-medium]"},
      {d:"medium",q:"What is printed?",c:"class Memo {\npublic:\n  static int count;\n  Memo() { count++; }\n};\nint Memo::count = 0;\nint main() {\n  Memo* p1 = new Memo();\n  Memo* p2 = new Memo();\n  std::cout << Memo::count;\n  delete p1; delete p2;\n}",o:["2","0","1","Error"],a:0,e:"Instantiation increments the static count twice, resulting in Memo::count = 2. [static-medium]"},
      {d:"hard",q:"Can you take a pointer to a static member function in C++?",c:"",o:["Yes, it is a standard non-member function pointer type (e.g. void (*)()).","No, pointers to static functions are illegal.","Yes, but it must be void (Class::*)().","No, unless the function is virtual."],a:0,e:"Static member functions don't have a this pointer, so their pointers are standard function pointers (e.g., void (*)() rather than member pointers). [static-hard]"},
      {d:"hard",q:"What is the CRTP static polymorphism pattern?",c:"",o:["Curiously Recurring Template Pattern where Base uses static_cast of this to Derived to bind calls statically","A dynamic casting optimization","A virtual inheritance diamond solver","A standard layout wrapper"],a:0,e:"CRTP inherits from a base template instantiated with the derived class itself. Calls are dispatched statically using static_casts of the this pointer. [static-hard]"},
      {d:"hard",q:"What is the C++ static initialization order fiasco?",c:"",o:["The undefined initialization order of global static variables defined across different translation units, causing potential read-before-write bugs","Static variables duplicating memory","Static class objects crashing at delete","A compiler thread synchronization deadlock"],a:0,e:"The standard does not define initialization order for globals across files. If global A depends on global B, A may read uninitialized memory. [static-hard]"},
      {d:"hard",q:"What is printed by this dynamic static counter program?",c:"class Counter {\n  inline static int total = 0;\npublic:\n  Counter() { total++; }\n  static int get() { return total; }\n};\nint main() {\n  Counter c1; { Counter c2; }\n  std::cout << Counter::get();\n}",o:["2","1","0","Error"],a:0,e:"Inline static variable total is incremented by both c1 and c2 construction, yielding 2. (c2 destruction doesn't decrement). Output: 2. [static-hard]"},
      {d:"hard",q:"Does a class containing only static variables have any memory footprint?",c:"class OnlyStatic {\n  static int x;\n  static double y;\n};\nint main() {\n  std::cout << sizeof(OnlyStatic);\n}",o:["1 (as static variables reside in global data section, leaving the class empty)","12","16","Error"],a:0,e:"Static variables reside in global static memory. The class contains no instance members, making its footprint 1 byte. [static-hard]"},
      {d:"easy",q:"What is the output?",c:"template<typename T>\nT add(T a, T b) { return a + b; }\nint main() {\n  std::cout << add(3, 4);\n}",o:["7","T","3+4","Error"],a:0,e:"Template deduces T=int. add(3,4)=7. [tpl-easy]"},

      {d:"easy",q:"What is template parameter deduction in C++?",c:"",o:["The process where the compiler automatically figures out template types based on function arguments","Casting types at runtime","Determining class sizes dynamically","Defining template specializations"],a:0,e:"Template parameter deduction allows programmers to call template functions without explicitly providing type bounds (e.g. `add(3, 4)` instead of `add<int>(3, 4)`). [tpl-easy]"},
      {d:"easy",q:"What is explicit template instantiation?",c:"",o:["Directing the compiler to generate code for a specific template argument at a particular place","Declaring templates static","Overriding virtual template functions","Writing custom generic parameters"],a:0,e:"Explicit template instantiation instructs the compiler to compile the template code for a specific type (e.g., `template class std::vector<int>;`). [tpl-easy]"},
      {d:"easy",q:"Can a class template contain multiple template parameters?",c:"",o:["Yes, e.g. template<typename T, typename U>","No, only one template parameter is allowed per class.","Yes, but only if they are all int parameters.","No, unless they are inside namespaces."],a:0,e:"C++ class templates can accept multiple template parameters, representing distinct generic types or values. [tpl-easy]"},
      {d:"medium",q:"What is printed?",c:"template<typename T, typename U>\nclass Pair {\npublic:\n  void show() { std::cout << \"general\"; }\n};\ntemplate<typename T>\nclass Pair<T, T> {\npublic:\n  void show() { std::cout << \"same\"; }\n};\nint main() {\n  Pair<int, double> p1;\n  Pair<int, int> p2;\n  p1.show(); p2.show();\n}",o:["generalsame","samegeneral","samesame","Error"],a:0,e:"Pair<int,double>: general template. Pair<int,int>: partial specialization T=T. Output: generalsame. [tpl-medium]"},
      {d:"medium",q:"What is a non-type template parameter in C++?",c:"",o:["A template parameter that is a constant value rather than a type","A templated class argument","An inline template function","A placeholder for standard layouts"],a:0,e:"Non-type template parameters are constant values passed at compile-time (such as integers, pointers, or lvalue references), e.g., `template<int N>`. [tpl-medium]"},
      {d:"medium",q:"What is printed?",c:"template<int N>\nclass Arr {\n  int data[N];\npublic:\n  int size() { return N; }\n};\nint main() {\n  Arr<5> a;\n  Arr<10> b;\n  std::cout << a.size() << b.size();\n}",o:["510","55","1010","Error"],a:0,e:"Non-type template param. Arr<5>::size()=5, Arr<10>::size()=10. Output: 510. [tpl-medium]"},
      {d:"medium",q:"Can you define default arguments for template parameters in C++?",c:"",o:["Yes, for both class templates and function templates (since C++11).","No, only class templates support default template arguments.","No, default template arguments are illegal.","Yes, but only for integer values."],a:0,e:"C++ supports default template arguments (e.g. `template<typename T = int>`), fully legal since C++11. [tpl-medium]"},
      {d:"medium",q:"What are member templates in C++?",c:"",o:["Template functions defined inside a class that can accept generic arguments distinct from the class template types","Private class members","Static templates only","Virtual template methods"],a:0,e:"Member templates allow individual class methods to be templated independently of the class-level templates. [tpl-medium]"},
      {d:"hard",q:"What is printed?",c:"template<typename T> void f(T x) { std::cout << \"T\"; }\ntemplate<typename T> void f(T* x) { std::cout << \"P\"; }\nint main() {\n  int n = 5;\n  f(n); f(&n);\n}",o:["TP","PT","TT","Error"],a:0,e:"f(n): int matches T template. f(&n): int* matches T* specialization (more specific). Output: TP. [tpl-hard]"},
      {d:"hard",q:"What is SFINAE (Substitution Failure Is Not An Error) in C++ templates?",c:"",o:["If a substitution error occurs while evaluating overloaded template signatures, the compiler discards that overload silently rather than throwing a compile error.","A template runtime exception model","A template class layout rule","A template metaprogramming crash"],a:0,e:"SFINAE allows overloading template functions based on type traits; invalid parameter substitutions simply discard the candidate overload. [tpl-hard]"},
      {d:"hard",q:"What is printed by this program using template specialization and static members?",c:"template<typename T> class Count {\npublic:\n  static int val;\n};\ntemplate<typename T> int Count<T>::val = 1;\ntemplate<> int Count<int>::val = 5;\nint main() {\n  std::cout << Count<double>::val << Count<int>::val;\n}",o:["15","51","11","55"],a:0,e:"Template specialization `Count<int>` sets its static val=5. The general template `Count<double>` uses default val=1. Output: 15. [tpl-hard]"},
      {d:"hard",q:"What is the Curiously Recurring Template Pattern (CRTP) inside C++ designs?",c:"",o:["A subclass inherits from a base template class parameterized with the subclass itself, enabling static polymorphism.","A recursive template deduction","A virtual inheritance diamond solver","A standard template library allocator"],a:0,e:"CRTP is a classic C++ idiom implementing zero-cost static polymorphism by passing the derived type up to the base template. [tpl-hard]"},
      {d:"hard",q:"What is printed by this fold expression in C++17?",c:"template<typename... Args>\nauto sum(Args... args) {\n  return (... + args);\n}\nint main() {\n  std::cout << sum(1, 2, 3, 4);\n}",o:["10","1234","Error","Undefined"],a:0,e:"C++17 fold expressions expand variadic template pack arguments. (... + args) expands to 1 + 2 + 3 + 4 = 10. [tpl-hard]"},
      {d:"easy",q:"What is the output?",c:"int main() {\n  try { throw 42; }\n  catch(int e) { std::cout << e; }\n}",o:["42","Error","e","exception"],a:0,e:"throw 42 throws int. catch(int e) catches it and prints 42. [exc-easy]"},
      {d:"easy",q:"What is printed?",c:"int main() {\n  try { throw std::runtime_error(\"err\"); }\n  catch(const std::exception& e) { std::cout << e.what(); }\n}",o:["err","Error","exception","runtime"],a:0,e:"runtime_error derives from exception. e.what() returns the message \"err\". [exc-easy]"},
      {d:"easy",q:"What is the purpose of the catch(...) block in exception handling?",c:"",o:["To catch any exception of any type","To throw an exception forward","To clear the stack allocation","To restart the main loop"],a:0,e:"The catch(...) block is a catch-all block that intercepts any exception thrown in the corresponding try scope. [exc-easy]"},
      {d:"easy",q:"Which keyword is used to announce that a function does not throw any exceptions?",c:"",o:["noexcept","nothrow","throw()","safe"],a:0,e:"The noexcept specifier tells the compiler that a function will not propagate exceptions. [exc-easy]"},
      {d:"easy",q:"What happens when an exception is thrown but no matching catch block is found in the call stack?",c:"",o:["std::terminate() is called, aborting the program.","The error is ignored.","The stack is rolled back.","The program restarts."],a:0,e:"If an exception goes uncaught up the call stack, C++ calls `std::terminate()` to abort execution. [exc-easy]"},
      {d:"medium",q:"What is printed?",c:"void f() {\n  try { throw 1; }\n  catch(int) { std::cout << \"A\"; throw; }\n}\nint main() {\n  try { f(); }\n  catch(int) { std::cout << \"B\"; }\n}",o:["AB","A","B","Error"],a:0,e:"f() catches, prints A, rethrows. main catches, prints B. Output: AB. [exc-medium]"},
      {d:"medium",q:"What is printed?",c:"class MyEx : public std::runtime_error {\npublic:\n  MyEx() : std::runtime_error(\"mine\") {}\n};\nint main() {\n  try { throw MyEx(); }\n  catch(const std::exception& e) { std::cout << e.what(); }\n}",o:["mine","MyEx","Error","runtime"],a:0,e:"MyEx inherits runtime_error. Caught by base ref. what()=mine. [exc-medium]"},
      {d:"medium",q:"What is the basic exception safety guarantee in C++?",c:"",o:["If an exception is thrown, the program remains in a valid state (no memory leaks or invariants broken).","The function either succeeds completely or rolls back fully.","Exceptions can never be thrown.","All exceptions are caught."],a:0,e:"The basic guarantee ensures that no resources are leaked and the program remains in a structurally valid state during exceptions. [exc-medium]"},
      {d:"medium",q:"What is stack unwinding in C++ exception handling?",c:"",o:["The process of executing destructors for all active stack-allocated objects between the throw site and the catch handler","Reversing the vector pointers","Compiling templates on demand","Optimizing static method addresses"],a:0,e:"Stack unwinding automatically cleans up local variables in executing functions as the call stack is wound back to the catch handler. [exc-medium]"},
      {d:"medium",q:"What is a function-try-block in C++ constructors?",c:"",o:["A try-catch block wrapping a constructor initialization list to catch member initialization failures","A function call optimization","A macro template","A static exception proxy"],a:0,e:"Function-try-blocks capture exceptions thrown by member initializer lists during object construction. [exc-medium]"},
      {d:"hard",q:"What is printed?",c:"class A {\n  std::string n;\npublic:\n  A(std::string x) : n(x) { std::cout << \"+\" << n; }\n  ~A() { std::cout << \"-\" << n; }\n};\nvoid work() {\n  A a(\"A\"); A b(\"B\");\n  throw std::runtime_error(\"fail\");\n}\nint main() {\n  try { work(); }\n  catch(...) { std::cout << \"E\"; }\n}",o:["+A+B-B-AE","+A+B-A-BE","+A+B-ABE","Error"],a:0,e:"Create a,b. Throw: unwind b(-B) then a(-A). Catch(E). Output: +A+B-B-AE. [exc-hard]"},
      {d:"hard",q:"What happens when an exception is thrown inside a destructor that is executing during stack unwinding?",c:"",o:["std::terminate() is called immediately, crashing the program.","The exception is ignored.","The catch block receives both exceptions.","The memory leak is ignored."],a:0,e:"C++ cannot handle two active exceptions at once. Throwing in a destructor during stack unwinding triggers an immediate `std::terminate()` abort. [exc-hard]"},
      {d:"hard",q:"What is printed by this exception slicing program?",c:"class Base { public: virtual const char* what() { return \"B\"; } };\nclass Der : public Base { public: const char* what() override { return \"D\"; } };\nint main() {\n  try { throw Der(); }\n  catch(Base e) { std::cout << e.what(); } // Catch by value!\n}",o:["B","D","Error","Crash"],a:0,e:"Catching by value slices the exception object, destroying the derived slice. Calling what() invokes Base::what() -> B. [exc-hard]"},
      {d:"hard",q:"Does the noexcept specifier allow the compiler to perform optimizations?",c:"",o:["Yes, it allows the compiler to avoid generating exception unwinding stack metadata and tables.","No, it is just a documentation aid.","Yes, but only for virtual functions.","No, unless templates are used."],a:0,e:"Marking functions noexcept enables the compiler to generate faster, more compact code, skipping exception unwinding tables. [exc-hard]"},
      {d:"hard",q:"What is printed by this exception throw-on-copy vector allocation program?",c:"#include <vector>\nclass A {\npublic:\n  A() {}\n  A(A&&) noexcept { std::cout << \"M\"; }\n  A(const A&) { std::cout << \"C\"; }\n};\nint main() {\n  std::vector<A> v;\n  v.reserve(1);\n  v.push_back(A());\n  std::cout << \" \";\n  v.resize(2); // trigger reallocation\n}",o:["M M","C C","MC","Error"],a:0,e:"Vector push_back moves the temp. When resizing, since A's move ctor is marked `noexcept`, vector reallocates using move ctor (M) rather than fallback copy (C). Output: M M (temp move then reallocation move). [exc-hard]"},
      {d:"easy",q:"What is the output?",c:"#include <vector>\nint main() {\n  std::vector<int> v = {1, 2, 3};\n  std::cout << v.size();\n}",o:["3","1","0","Error"],a:0,e:"Vector has 3 elements. v.size()=3. [stl-easy]"},
      {d:"easy",q:"What is the output?",c:"#include <vector>\nint main() {\n  std::vector<int> v = {10, 20, 30};\n  std::cout << v[1];\n}",o:["20","10","30","1"],a:0,e:"v[1] is the second element = 20. [stl-easy]"},
      {d:"easy",q:"What is the output?",c:"#include <set>\nint main() {\n  std::set<int> s = {3, 1, 4, 1, 5};\n  std::cout << s.size();\n}",o:["4","5","3","Error"],a:0,e:"set stores unique elements: {1, 3, 4, 5}. size=4. [stl-easy]"},
      {d:"easy",q:"What is the output?",c:"#include <set>\nint main() {\n  std::set<int> s = {3, 1, 4, 1, 5};\n  std::cout << *s.begin();\n}",o:["1","3","4","Error"],a:0,e:"set is sorted. begin() points to the smallest element = 1. [stl-easy]"},
