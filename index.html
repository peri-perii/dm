    function toggleChip(chip, gid) {
      document.querySelectorAll('#' + gid + ' .chip').forEach(c => c.classList.remove('sel'));
      chip.classList.add('sel');
      updatePoolCountInfo();
    }

    function toggleMultiChip(chip) {
      const parent = chip.parentElement;
      const selected = parent.querySelectorAll('.chip.sel');
      if (chip.classList.contains('sel') && selected.length <= 1) {
        return; // Prevent deselecting the last category
      }
      chip.classList.toggle('sel');
      updatePoolCountInfo();
    }

    function selectQCount(chip, val) {
      document.querySelectorAll('#nchips .chip').forEach(c => c.classList.remove('sel'));
      chip.classList.add('sel');
      const customInput = document.getElementById('customQCount');
      if (customInput) {
        customInput.value = '';
      }
    }

    function onCustomQCountInput(input) {
      document.querySelectorAll('#nchips .chip').forEach(c => c.classList.remove('sel'));
      const pool = calculatePool();
      let val = parseInt(input.value);
      if (isNaN(val)) return;
      if (val < 1) input.value = 1;
      if (val > pool.length) input.value = pool.length;
    }

    function getSelectedCategories() {
      const chips = document.querySelectorAll('#cchips .chip.sel');
      return Array.from(chips).map(c => c.dataset.v);
    }

    function getSelectedDifficulty() {
      const sel = document.querySelector('#dchips .chip.sel');
      return sel ? sel.dataset.v : 'all';
    }

    function getSelectedQType() {
      const sel = document.querySelector('#qtypeChips .chip.sel');
      return sel ? sel.dataset.v : 'all';
    }

    function getSelectedTopics() {
      const container = document.getElementById('topicChipsContainer');
      if (!container) return TOPIC_KEYS; // default if not rendered yet
      const chips = container.querySelectorAll('.chip.sel');
      return Array.from(chips).map(c => c.dataset.v);
    }

    function calculatePool() {
      const diff = getSelectedDifficulty();
      const cats = getSelectedCategories();
      const topics = getSelectedTopics();
      const qtype = getSelectedQType();
      return QS.filter(q => {
        const dMatch = (diff === 'all' || q.d === diff);
        const cMatch = cats.includes(q.category);
        const tMatch = topics.includes(q.topic);
        
        let typeMatch = true;
        if (qtype === 'code') {
          typeMatch = !!(q.c && q.c.trim());
        } else if (qtype === 'theory') {
          typeMatch = !(q.c && q.c.trim());
        }
        
        return dMatch && cMatch && tMatch && typeMatch;
      });
    }

    function updatePoolCountInfo() {
      const pool = calculatePool();
      const countLabel = document.getElementById('poolCountLabel');
      if (countLabel) {
        countLabel.textContent = pool.length;
      }
      const customInput = document.getElementById('customQCount');
      if (customInput) {
        customInput.max = pool.length;
        customInput.placeholder = `1-${pool.length}`;
      }
    }

    function toggleTimerChip(chip) {
      document.querySelectorAll('#tlimitChips .chip').forEach(c => c.classList.remove('sel'));
      chip.classList.add('sel');
    }

    function toggleOrderChip(chip) {
      document.querySelectorAll('#orderChips .chip').forEach(c => c.classList.remove('sel'));
      chip.classList.add('sel');
    }

    function toggleTopicsDrawer() {
      const drawer = document.getElementById('topicsDrawer');
      const btn = document.getElementById('topicsDrawerBtn');
      if (!drawer || !btn) return;
      
      if (drawer.style.display === 'none') {
        drawer.style.display = 'block';
        btn.innerHTML = `<span>Collapse</span> ▴`;
      } else {
        drawer.style.display = 'none';
        btn.innerHTML = `<span>Expand</span> ▾`;
      }
    }

    function populateTopicFilterChips() {
      const container = document.getElementById('topicChipsContainer');
      if (!container) return;
      
      let html = '';
      TOPIC_KEYS.forEach(key => {
        const t = TOPICS_DATA[key];
        html += `
          <div class="chip sel" data-v="${key}" onclick="toggleTopicChip(this)" style="font-size: 10px; padding: 6px 12px; margin: 2px;">
            ✦ ${t.title}
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function toggleTopicChip(chip) {
      const container = document.getElementById('topicChipsContainer');
      const selected = container.querySelectorAll('.chip.sel');
      if (chip.classList.contains('sel') && selected.length <= 1) {
        return; // lock at least 1 topic selected
      }
      chip.classList.toggle('sel');
      updatePoolCountInfo();
    }

    function selectAllTopics(select) {
      const container = document.getElementById('topicChipsContainer');
      if (!container) return;
      container.querySelectorAll('.chip').forEach(c => {
        if (select) {
          c.classList.add('sel');
        } else {
          c.classList.remove('sel');
        }
      });
      
      if (!select) {
        const first = container.querySelector('.chip');
        if (first) first.classList.add('sel');
      }
      
      updatePoolCountInfo();
    }

    /* ── GAME PLAY SYSTEM ENGINE ── */
    let gameQs = [], curIdx = 0, score = 0, skipped = 0, timerInt = null, timeLeft = 30, timerDuration = 30, hasAnswered = false;

    function getChipVal(gid) {
      const sel = document.querySelector('#' + gid + ' .chip.sel');
      return sel ? sel.dataset.v : null;
    }

    function startQuiz() {
      let pool = calculatePool();
      
      if (pool.length === 0) {
        alert("No questions match your selected criteria!");
        return;
      }
      
      const orderChip = document.querySelector('#orderChips .chip.sel');
      const ordering = orderChip ? orderChip.dataset.v : 'shuffled';
      
      if (ordering === 'sequential') {
        pool.sort((a, b) => TOPIC_KEYS.indexOf(a.topic) - TOPIC_KEYS.indexOf(b.topic));
      } else {
        pool.sort(() => Math.random() - 0.5);
      }
      
      let count = pool.length;
      const customInput = document.getElementById('customQCount');
      const customVal = customInput ? parseInt(customInput.value) : NaN;
      
      if (!isNaN(customVal) && customVal > 0) {
        count = Math.min(customVal, pool.length);
      } else {
        const range = getChipVal('nchips') || '10';
        count = range === 'all' ? pool.length : Math.min(parseInt(range), pool.length);
      }
      
      const timerChip = document.querySelector('#tlimitChips .chip.sel');
      timerDuration = timerChip ? parseInt(timerChip.dataset.v) : 30;
      
      gameQs = pool.slice(0, count);
      
      // Initialize userAnswer states
      gameQs.forEach(q => {
        q.userAnswer = undefined;
      });
      
      curIdx = 0;
      score = 0;
      skipped = 0;
      hasAnswered = false;
      
      document.getElementById('qs').style.display = 'none';
      document.getElementById('qg').style.display = 'block';
      document.getElementById('qr').style.display = 'none';
      showQuestion();
    }

    function recalculateScore() {
      score = 0;
      skipped = 0;
      gameQs.forEach(q => {
        if (q.userAnswer !== undefined) {
          if (q.userAnswer === q.a) {
            score++;
          } else if (q.userAnswer === -1) {
            skipped++;
          }
        }
      });
      const slive = document.getElementById('slive');
      if (slive) slive.textContent = score;
    }

    function showQuestion() {
      if (curIdx >= gameQs.length) {
        showResults();
        return;
      }
      
      const q = gameQs[curIdx];
      const tot = gameQs.length;
      
      document.getElementById('qnl').textContent = 'Q' + (curIdx + 1);
      document.getElementById('qtl').textContent = 'of ' + tot;
      document.getElementById('qdl').textContent = q.d.toUpperCase();
      recalculateScore();
      document.getElementById('pf').style.width = (curIdx / tot * 100) + '%';
      
      const tag = document.getElementById('qtag');
      tag.textContent = q.d.toUpperCase();
      tag.className = 'qtag ' + q.d;
      
      document.getElementById('qttl').textContent = q.q;
      const cd = document.getElementById('qcode');
      if (q.c) {
        cd.style.display = 'block';
        cd.textContent = q.c;
      } else {
        cd.style.display = 'none';
      }
      
      const opts = document.getElementById('qopts');
      const labels = ['A', 'B', 'C', 'D'];
      
      opts.innerHTML = q.o.map((opt, i) => `
        <div class="term-opt" id="op${i}" onclick="submitAnswer(${i})">
          <div class="term-opt-lbl">${labels[i]}</div>
          <span>${opt}</span>
        </div>
      `).join('');
      
      const exp = document.getElementById('qexp');
      exp.style.display = 'none';
      exp.textContent = '';
      
      if (q.userAnswer !== undefined) {
        hasAnswered = true;
        clearInterval(timerInt);
        
        const tring = document.getElementById('tringContainer');
        if (tring) {
          tring.style.display = 'none';
        }
        
        revealSolution(q.userAnswer);
      } else {
        hasAnswered = false;
        
        const tring = document.getElementById('tringContainer');
        if (tring) {
          tring.style.display = 'block';
        }
        
        const prevBtn = document.getElementById('prevBtn');
        const skipBtn = document.getElementById('skipBtn');
        const nxtBtn = document.getElementById('nxtb');
        
        if (prevBtn) prevBtn.style.display = curIdx > 0 ? 'inline-flex' : 'none';
        if (skipBtn) skipBtn.style.display = 'inline-flex';
        if (nxtBtn) nxtBtn.style.display = 'none';
        
        startTimer();
      }
    }

    function startTimer() {
      clearInterval(timerInt);
      
      const tring = document.getElementById('tringContainer');
      if (timerDuration === 0) {
        if (tring) {
          tring.style.display = 'block';
        }
        const circ = document.getElementById('tcirc');
        if (circ) {
          circ.style.strokeDashoffset = 0;
          circ.style.stroke = '#10b981';
        }
        const tnum = document.getElementById('tnum');
        if (tnum) {
          tnum.textContent = '∞';
        }
        return;
      }
      
      if (tring) {
        tring.style.display = 'block';
      }
      timeLeft = timerDuration;
      updateTimerUI();
      timerInt = setInterval(() => {
        timeLeft--;
        updateTimerUI();
        if (timeLeft <= 0) {
          clearInterval(timerInt);
          if (!hasAnswered) {
            const q = gameQs[curIdx];
            q.userAnswer = -1;
            recalculateScore();
            revealSolution(-1);
          }
        }
      }, 1000);
    }

    function updateTimerUI() {
      if (timerDuration === 0) return;
      const C = 119.4;
      const offset = C * (1 - timeLeft / timerDuration);
      const circ = document.getElementById('tcirc');
      if (circ) {
        circ.style.strokeDashoffset = offset;
        circ.style.stroke = timeLeft <= (timerDuration * 0.3) ? '#ef4444' : 'var(--ac)';
      }
      const tnum = document.getElementById('tnum');
      if (tnum) {
        tnum.textContent = timeLeft;
      }
    }

    function submitAnswer(idx) {
      if (hasAnswered) return;
      hasAnswered = true;
      clearInterval(timerInt);
      
      const q = gameQs[curIdx];
      q.userAnswer = idx;
      recalculateScore();
      revealSolution(idx);
    }

    function skipQ() {
      if (hasAnswered) return;
      hasAnswered = true;
      clearInterval(timerInt);
      
      const q = gameQs[curIdx];
      q.userAnswer = -1;
      recalculateScore();
      revealSolution(-1);
    }

    function revealSolution(chosen) {
      const q = gameQs[curIdx];
      
      for (let i = 0; i < q.o.length; i++) {
        const el = document.getElementById('op' + i);
        if (!el) continue;
        
        if (i === q.a) {
          el.classList.add('correct');
        } else if (i === chosen) {
          el.classList.add('incorrect');
        }
        
        el.style.pointerEvents = 'none';
      }
      
      const exp = document.getElementById('qexp');
      exp.innerHTML = `<strong style="font-family:var(--mo); font-size:10px; color:#a78bfa; letter-spacing:0.12em;">[wistaar@macbook] stdout: // EXPLANATION</strong><br><br>${q.e}`;
      exp.style.display = 'block';
      
      const prevBtn = document.getElementById('prevBtn');
      const skipBtn = document.getElementById('skipBtn');
      const nxtBtn = document.getElementById('nxtb');
      
      if (prevBtn) prevBtn.style.display = curIdx > 0 ? 'inline-flex' : 'none';
      if (skipBtn) skipBtn.style.display = 'none';
      if (nxtBtn) {
        nxtBtn.style.display = 'inline-flex';
        if (curIdx === gameQs.length - 1) {
          nxtBtn.innerHTML = `<span>Finish</span> ⚑`;
        } else {
          nxtBtn.innerHTML = `<span>Next</span> &rarr;`;
        }
      }
    }

    function prevQ() {
      if (curIdx > 0) {
        curIdx--;
        animateTransition();
      }
    }

    function nextQ() {
      if (curIdx < gameQs.length - 1) {
        curIdx++;
        animateTransition();
      } else {
        showResults();
      }
    }

    function animateTransition() {
      clearInterval(timerInt);
      const card = document.getElementById('qcard');
      if (card) {
        card.style.opacity = '0';
        card.style.transform = 'translateY(10px)';
        setTimeout(() => {
          card.style.opacity = '1';
          card.style.transform = 'translateY(0)';
          showQuestion();
        }, 200);
      } else {
        showQuestion();
      }
    }

    function showResults() {
      clearInterval(timerInt);
      document.getElementById('qg').style.display = 'none';
      document.getElementById('qr').style.display = 'block';
      
      const tot = gameQs.length;
      const wrong = tot - score - skipped;
      const pct = Math.round(score / tot * 100);
      
      document.getElementById('rscore').textContent = score + '/' + tot;
      document.getElementById('rpct').textContent = pct + '% correct';
      document.getElementById('bdc').textContent = score;
      document.getElementById('bdw').textContent = wrong;
      document.getElementById('bds').textContent = skipped;
      
      const grade = document.getElementById('rgrade');
      const remoji = document.getElementById('remoji');
      
      if (pct >= 85) {
        grade.textContent = 'Grade A — Master Standard';
        grade.style.background = 'linear-gradient(135deg, #d1fae5, #a7f3d0)';
        grade.style.color = '#065f46';
        grade.style.border = '1px solid #34d399';
        remoji.textContent = '🏆';
      } else if (pct >= 60) {
        grade.textContent = 'Grade B — Safe Competency';
        grade.style.background = 'linear-gradient(135deg, #fef3c7, #fde68a)';
        grade.style.color = '#92400e';
        grade.style.border = '1px solid #fb923c';
        remoji.textContent = '🎯';
      } else {
        grade.textContent = 'Grade C — Keep Practicing';
        grade.style.background = 'linear-gradient(135deg, #fee2e2, #fecaca)';
        grade.style.color = '#991b1b';
        grade.style.border = '1px solid #f87171';
        remoji.textContent = '📚';
      }
    }

    function resetQuiz() {
      clearInterval(timerInt);
      document.getElementById('qg').style.display = 'none';
      document.getElementById('qr').style.display = 'none';
      document.getElementById('qs').style.display = 'block';
    }
  </script>
</body>
</html>
