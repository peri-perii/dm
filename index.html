      {d:"easy",q:"Which C++ operator allocates memory on the heap and executes constructors?",c:"",o:["new","malloc","alloc","placement new"],a:0,e:"The new operator reserves memory on the heap and initializes the object by executing its constructor. [dma-easy]"},
      {d:"easy",q:"Which operator is used to release heap memory allocated via the new operator?",c:"",o:["delete","free","release","destroy"],a:0,e:"The delete operator executes the object's destructor and releases the allocated heap memory block. [dma-easy]"},
      {d:"easy",q:"What is the correct way to allocate and deallocate a dynamic array in C++?",c:"int* arr = /* allocate 10 ints */;\n/* deallocate arr */",o:["arr = new int[10]; and delete[] arr;","arr = new int(10); and delete arr;","arr = malloc(10); and free(arr);","arr = new int[10]; and delete arr;"],a:0,e:"Array allocation `new[]` must always be paired with array deallocation `delete[]` to avoid memory leaks or runtime crashes. [dma-easy]"},
      {d:"easy",q:"What is a memory leak in C++?",c:"",o:["Failing to deallocate dynamic memory (heap) after it is no longer needed","A hardware memory fault","Variables going out of scope too early","Exceeding the maximum stack size"],a:0,e:"A memory leak occurs when heap memory is allocated but never freed, slowly consuming system resources. [dma-easy]"},
      {d:"easy",q:"What should you do with a pointer immediately after executing delete on it?",c:"",o:["Set it to nullptr to avoid dangling pointer issues.","Leave it as is.","Delete it again.","Cast it to void."],a:0,e:"Setting a deleted pointer to nullptr ensures it cannot be dereferenced or accidentally double-freed. [dma-easy]"},
      {d:"medium",q:"What is printed?",c:"class Memo {\npublic:\n  static int count;\n  void* operator new(size_t sz) {\n    count++;\n    return ::operator new(sz);\n  }\n};\nint Memo::count = 0;\nint main() {\n  Memo* p1 = new Memo();\n  Memo* p2 = new Memo();\n  std::cout << Memo::count;\n  delete p1; delete p2;\n}",o:["2","0","1","Error"],a:0,e:"The class-level operator new is overloaded to increment static count. Since new Memo is invoked twice, the overloaded operator runs twice, setting Memo::count to 2. [dma-medium]"},
      {d:"medium",q:"What is printed by this placement new operation?",c:"#include <iostream>\n#include <new>\nclass Tracker {\npublic:\n  Tracker() { std::cout << \"C\"; }\n  ~Tracker() { std::cout << \"D\"; }\n};\nint main() {\n  char buf[sizeof(Tracker)];\n  Tracker* p = new (buf) Tracker();\n  p->~Tracker();\n}",o:["CD","C","CDD","Error"],a:0,e:"Placement new constructs the Tracker object inside the pre-allocated stack buffer buf (printing C). Destructors must be called manually (printing D) for correct cleanup. Output: CD. [dma-medium]"},
      {d:"medium",q:"How do malloc/free and new/delete differ fundamentally in C++?",c:"",o:["new/delete call constructors/destructors automatically; malloc/free only allocate raw bytes.","They are identical.","malloc resides on stack.","new is compile-time only."],a:0,e:"new/delete are C++ operators that automatically manage memory sizes and class constructor/destructor lifecycles. malloc/free only allocate raw bytes. [dma-medium]"},
      {d:"medium",q:"What exception is thrown by the default new operator if heap allocation fails?",c:"",o:["std::bad_alloc","std::bad_cast","std::out_of_range","std::runtime_error"],a:0,e:"If the system runs out of heap memory, calling `new` throws `std::bad_alloc` unless `new(std::nothrow)` is explicitly specified. [dma-medium]"},
      {d:"medium",q:"What is a dangling pointer in C++?",c:"",o:["A pointer referencing a memory address that has already been deallocated","A pointer initialized to nullptr","A pointer that exceeds stack limits","A pointer to a member function"],a:0,e:"Dangling pointers occur when a pointer continues to store the memory address of an object after it has been deleted. [dma-medium]"},
      {d:"hard",q:"What is printed by this custom array allocation tracking program?",c:"#include <iostream>\nclass Tracker {\npublic:\n  static void* operator new[](size_t sz) {\n    std::cout << \"A\";\n    return ::operator new[](sz);\n  }\n  static void operator delete[](void* p) {\n    std::cout << \"D\";\n    ::operator delete[](p);\n  }\n};\nint main() {\n  Tracker* arr = new Tracker[5];\n  delete[] arr;\n}",o:["AD","A5D5","A","Error"],a:0,e:"Class-level `operator new[]` and `operator delete[]` are called once for the entire array allocation block, not per element. Output: AD. [dma-hard]"},
      {d:"hard",q:"Why is manual destructor invocation required when using placement new?",c:"",o:["Because placement new constructs objects inside pre-allocated buffers, meaning calling delete on the pointer would illegally try to free the buffer itself.","To clear static pointers.","To prevent template errors.","It is not required."],a:0,e:"Placement new does not allocate heap memory, so delete cannot be called. The destructor must be called manually (e.g. `p->~Type()`) before the buffer scope exits. [dma-hard]"},
      {d:"hard",q:"What is printed by this double-free detection check?",c:"int main() {\n  int* p = new int(10);\n  delete p;\n  // delete p; // Double free crash!\n  std::cout << \"OK\";\n}",o:["OK","Crash","Error","10"],a:0,e:"Deleting the same heap memory twice corrupts the heap and crashes the application (Double Free). Commenting it out runs successfully. Output: OK. [dma-hard]"},
      {d:"hard",q:"What is a custom arena (block) allocator?",c:"",o:["An allocation scheme where a large chunk of heap memory is pre-allocated at once, and smaller allocations are sliced out via pointers to optimize speed and cache locality","A compiler macro template","A virtual inheritance table","A standard garbage collector"],a:0,e:"Arena allocators improve performance by bypassing slow system heap calls, reusing a single pre-allocated pool of memory. [dma-hard]"},
      {d:"hard",q:"Which standard C++ function is used to align memory allocations dynamically according to specific byte constraints?",c:"",o:["std::align","std::malloc_align","std::align_alloc","std::pack"],a:0,e:"std::align takes alignment requirements and pointer boundaries, updating them to point to the nearest aligned address in a buffer. [dma-hard]"},
      {d:"easy",q:"What is the output?",c:"#include <memory>\nint main() {\n  auto p = std::make_unique<int>(42);\n  std::cout << *p;\n}",o:["42","p","0","Error"],a:0,e:"make_unique<int>(42) creates a unique_ptr to int with value 42. *p dereferences it. [sptr-easy]"},
      {d:"easy",q:"What is printed?",c:"#include <memory>\nint main() {\n  auto s = std::make_shared<int>(5);\n  std::cout << s.use_count();\n  auto s2 = s;\n  std::cout << s.use_count();\n}",o:["12","11","21","Error"],a:0,e:"Initially use_count=1. After s2=s both share ownership: use_count=2. Output: 12. [sptr-easy]"},
      {d:"easy",q:"Which smart pointer is move-only and cannot be copied?",c:"",o:["std::unique_ptr","std::shared_ptr","std::weak_ptr","std::auto_ptr"],a:0,e:"std::unique_ptr represents exclusive ownership, so copying is disabled (it can only be moved). [sptr-easy]"},
      {d:"easy",q:"Which function is preferred for creating shared pointers in modern C++?",c:"",o:["std::make_shared","new std::shared_ptr","std::shared_ptr.create()","std::alloc_shared"],a:0,e:"make_shared is preferred because it performs a single heap allocation for both the control block and the object, improving speed and cache efficiency. [sptr-easy]"},
      {d:"easy",q:"What does a smart pointer do when it goes out of scope?",c:"",o:["Automatically deallocates its managed heap memory (if it is the sole owner)","Triggers a compiler warning","Increases the reference count","Leaks memory unless delete is called"],a:0,e:"Smart pointers employ RAII, automatically freeing their managed heap memory when they exit scope. [sptr-easy]"},
      {d:"medium",q:"What is printed?",c:"#include <memory>\nint main() {\n  auto s = std::make_shared<int>(5);\n  std::cout << s.use_count();\n  {\n    auto s2 = s;\n    std::cout << s.use_count();\n  }\n  std::cout << s.use_count();\n}",o:["121","122","111","Error"],a:0,e:"Count: 1 initially, 2 after s2 copies, 1 after s2 goes out of scope. Output: 121. [sptr-medium]"},
      {d:"medium",q:"What is printed?",c:"#include <memory>\nint main() {\n  auto p1 = std::make_unique<int>(10);\n  auto p2 = std::move(p1);\n  std::cout << (p1 == nullptr) << *p2;\n}",o:["110","010","1","Error"],a:0,e:"After move, p1=nullptr (prints 1). p2 owns int 10 (prints 10). Output: 110. [sptr-medium]"},
      {d:"medium",q:"How can we use std::weak_ptr to break cyclic reference memory leaks?",c:"",o:["By referencing a shared object without incrementing its shared reference count, allowing cleanup when all shared_ptr instances are destroyed","By making pointers const","By casting pointers to raw pointers","By deleting the shared pointer manually"],a:0,e:"weak_ptr observes objects managed by shared_ptr without owning them, breaking cycles that would keep reference counts above zero forever. [sptr-medium]"},
      {d:"medium",q:"What is a custom deleter in smart pointers?",c:"",o:["A custom function or functor supplied to a smart pointer to execute alternative cleanup (such as fclose) instead of standard delete","A template macro","A memory analyzer","A private class method"],a:0,e:"Custom deleters allow smart pointers to manage resources like files (using `fclose`) or database connections safely via RAII. [sptr-medium]"},
      {d:"medium",q:"What is printed?",c:"#include <memory>\nint main() {\n  std::shared_ptr<int> p1 = std::make_shared<int>(10);\n  std::weak_ptr<int> w = p1;\n  if(auto p2 = w.lock()){\n    std::cout << *p2 << \" \" << w.use_count();\n  }\n}",o:["10 2","10 1","10 0","Error"],a:0,e:"w.lock() returns a shared_ptr, temporarily incrementing the reference count to 2 inside the if block. w.use_count() returns 2. Output: 10 2. [sptr-medium]"},
      {d:"hard",q:"What is printed by this program using std::enable_shared_from_this?",c:"#include <memory>\nclass Target : public std::enable_shared_from_this<Target> {\npublic:\n  std::shared_ptr<Target> get() { return shared_from_this(); }\n};\nint main() {\n  auto p1 = std::make_shared<Target>();\n  auto p2 = p1->get();\n  std::cout << (p1 == p2);\n}",o:["1","Error","0","Crash"],a:0,e:"Target inherits enable_shared_from_this, allowing shared_from_this() to fetch the active shared_ptr safely without duplicating control blocks. Prints 1. [sptr-hard]"},
      {d:"hard",q:"What is the memory layout difference between std::make_shared and raw std::shared_ptr constructor?",c:"",o:["make_shared performs a single memory block allocation for both object and control block; constructor performs two separate allocations.","They are identical.","constructor resides on stack.","make_shared is compile-time only."],a:0,e:"make_shared packs control block and object into one allocation, minimizing heap fragmentation and improving cache efficiency. [sptr-hard]"},
      {d:"hard",q:"How can we check if a std::weak_ptr is referencing an object that has already been destroyed?",c:"",o:["By calling w.expired(), which returns true if the referenced shared_ptr reference count is 0.","By checking w == nullptr.","By casting w to a raw pointer.","By calling w.lock() directly."],a:0,e:"w.expired() checks if the underlying resource has been freed, providing a safe check before calling w.lock(). [sptr-hard]"},
      {d:"hard",q:"What happens when we create two distinct shared_ptrs using the same raw heap pointer?",c:"int* raw = new int(10);\nstd::shared_ptr<int> p1(raw);\nstd::shared_ptr<int> p2(raw); // What happens?",o:["Two separate control blocks are created, causing a double-free crash when both try to delete raw memory on exit.","They share reference counts.","Compilation error","Memory is leaked"],a:0,e:"Creating two shared_ptrs from a raw pointer spawns two independent control blocks. When they go out of scope, both try to delete the pointer, causing a crash. [sptr-hard]"},
      {d:"hard",q:"Does C++ support atomic operations on smart pointers?",c:"",o:["Yes, via std::atomic<std::shared_ptr<T>> (since C++20), allowing thread-safe shared pointer manipulations.","No, smart pointers are never thread-safe.","Yes, but only for unique_ptrs.","No, unless we use standard layouts."],a:0,e:"C++20 introduces explicit `std::atomic<std::shared_ptr<T>>` support, allowing thread-safe concurrent smart pointer exchanges. [sptr-hard]"},
      {d:"easy",q:"What does RAII stand for in C++ programming?",c:"",o:["Resource Acquisition Is Initialization","Run-time Array Interface Initialization","Recursive Allocator Interface Integration","Resource Allocation Is Immediate"],a:0,e:"RAII ties the lifecycle of a resource (like memory or file handles) to the scope/lifetime of a stack-allocated object. [raii-easy]"},
      {d:"easy",q:"Which standard C++ class implements RAII to manage mutex locking and unlocking automatically?",c:"",o:["std::lock_guard","std::mutex","std::unique_ptr","std::thread"],a:0,e:"std::lock_guard locks a mutex in its constructor and unlocks it automatically in its destructor on scope exit. [raii-easy]"},
      {d:"easy",q:"Why is RAII considered exception-safe?",c:"",o:["Because stack unwinding automatically calls destructors of stack-allocated objects, guaranteeing resource release even during crashes.","It disables exceptions globally.","It catches errors compiled.","It is static compiler optimization."],a:0,e:"Destructors of active stack objects are guaranteed to execute during stack unwinding, ensuring resources are released. [raii-easy]"},
      {d:"easy",q:"What is printed?",c:"class Guard {\npublic:\n  Guard() { std::cout << \"O\"; }\n  ~Guard() { std::cout << \"C\"; }\n};\nint main() {\n  { Guard g; }\n  std::cout << \"M\";\n}",o:["OCM","OMC","MOC","Error"],a:0,e:"Guard constructs (O), goes out of scope and destroys (C), then main prints M. Output: OCM. [raii-easy]"},
      {d:"easy",q:"What is the primary resource managed by std::unique_lock?",c:"",o:["A thread mutex (to guarantee safe locking scopes)","Heap memory pointers","File streams","Static variables"],a:0,e:"std::unique_lock is an RAII guard designed to manage thread locking and unlocking operations safely. [raii-easy]"},
      {d:"medium",q:"What is printed?",c:"#include <mutex>\nstd::mutex mtx;\nvoid run() {\n  std::lock_guard<std::mutex> lock(mtx);\n  std::cout << \"locked\";\n}\nint main() {\n  run();\n}",o:["locked","Error","Nothing","Undefined"],a:0,e:"lock_guard locks mtx, executes printing locked, and releases mtx automatically upon exiting run(). Output: locked. [raii-medium]"},
      {d:"medium",q:"How do std::lock_guard and std::unique_lock differ in C++?",c:"",o:["unique_lock allows manual locking/unlocking and deferred locking; lock_guard is strict scope-only.","lock_guard is faster.","They are identical.","unique_lock is compile-time only."],a:0,e:"std::unique_lock is more flexible, supporting manual locking, unlocking, and timed operations. std::lock_guard is simple, light, and strictly scope-based. [raii-medium]"},
      {d:"medium",q:"What is the purpose of std::scoped_lock in C++17?",c:"",o:["To lock multiple mutexes simultaneously using a deadlock-avoidance algorithm","To lock static variables","To allocate memory safely","To inline virtual functions"],a:0,e:"std::scoped_lock locks a variadic list of mutexes using a deadlock-prevention algorithm (e.g. sorted locking). [raii-medium]"},
      {d:"medium",q:"What is printed by this program utilizing RAII to manage resource lifetimes?",c:"class File {\npublic:\n  File() { std::cout << \"O\"; }\n  ~File() { std::cout << \"C\"; }\n};\nvoid f() { File f; throw 1; }\nint main() {\n  try { f(); } catch(...) { std::cout << \"E\"; }\n}",o:["OCE","OEC","OE","Error"],a:0,e:"File is created (O). Exception is thrown, stack unwinding runs ~File() (C), then exception is caught (E). Output: OCE. [raii-medium]"},
      {d:"medium",q:"Can you disable copying for custom RAII guard classes?",c:"",o:["Yes, they should be move-only or completely non-copyable to prevent duplicate resource releases.","No, they must be copyable.","Yes, by marking them static.","No, unless they inherit virtual Base."],a:0,e:"RAII classes manage unique resources. Allowing copies could lead to multiple destructors trying to release the same resource. [raii-medium]"},
      {d:"hard",q:"What is a transactional commit/rollback RAII guard pattern?",c:"",o:["An RAII wrapper that backs up state in the constructor and restores (rolls back) state in the destructor unless a commit() function is explicitly called.","A database macro optimization","A template specialization check","A virtual inheritance diamond solver"],a:0,e:"The rollback guard ensures that unless transaction success is confirmed (via `commit()`), all state changes are undone on scope exit. [raii-hard]"},
      {d:"hard",q:"What is printed by this custom RAII pointer wrapper program?",c:"class RAII {\n  int* p;\npublic:\n  RAII() : p(new int(5)) {}\n  ~RAII() { delete p; std::cout << \"D\"; }\n  int get() { return *p; }\n};\nint main() {\n  try {\n    RAII r;\n    std::cout << r.get();\n    throw 0;\n  } catch(...) { std::cout << \"E\"; }\n}",o:["5DE","5ED","5E","Error"],a:0,e:"RAII object r prints 5. Exception is thrown: stack unwinding destroys r (D), then catch runs (E). Output: 5DE. [raii-hard]"},
      {d:"hard",q:"Why is the copy constructor of std::lock_guard explicitly deleted?",c:"",o:["To prevent copying the lock, which would create multiple owners trying to unlock the same mutex, violating RAII thread safety.","To optimize compile speed.","To support static variables.","Because compilers cannot copy locks."],a:0,e:"Copying a lock guard violates exclusive ownership of the mutex lock state, potentially causing double unlocking errors. [raii-hard]"},
      {d:"hard",q:"How can we build a compile-time exception-safe class composition using RAII?",c:"",o:["By ensuring that all raw resource handles (e.g. pointers, sockets) are held inside individual RAII wrapper objects rather than raw members.","By using try-catch blocks everywhere.","By disabling destructors.","By making all variables static."],a:0,e:"If class members are RAII wrappers (like smart pointers), any exception mid-constructor will automatically trigger destructors of fully constructed wrappers, avoiding leaks. [raii-hard]"},
      {d:"hard",q:"What is printed by this thread-safety scoped lock program?",c:"#include <mutex>\nstd::mutex mtx;\nint main() {\n  {\n    std::unique_lock<std::mutex> l1(mtx);\n    std::unique_lock<std::mutex> l2 = std::move(l1);\n    std::cout << l2.owns_lock() << l1.owns_lock();\n  }\n}",o:["10","11","01","Error"],a:0,e:"Moving unique_lock transfers mutex ownership. l2 becomes active (1), while l1 becomes empty (0). Output: 10. [raii-hard]"},
      {d:"easy",q:"What is an lvalue in C++?",c:"",o:["An expression that refers to a persistent memory location with an address","A temporary rvalue","A compile-time template","An inline static constant"],a:0,e:"An lvalue points to a persistent object in memory that has an address (like a named variable). [move-easy]"},
      {d:"easy",q:"What is an rvalue in C++?",c:"",o:["A temporary value that does not persist beyond the expression that defines it","A named pointer","A virtual inheritance table","A compiler macro constant"],a:0,e:"An rvalue is a temporary value (such as a literal or result of an intermediate calculation) that can be moved. [move-easy]"},
      {d:"easy",q:"What does the std::move function actually do in C++?",c:"",o:["It performs a static cast converting an lvalue to an rvalue reference, signaling that its resources can be moved.","It physically copies object memory.","It compiles templates on demand.","It deletes the source pointer immediately."],a:0,e:"std::move does not move anything at runtime; it only casts an lvalue to an rvalue reference (`T&&`). [move-easy]"},
      {d:"easy",q:"What is the syntax for declaring an rvalue reference in C++?",c:"",o:["Type&&","Type&","Type*","Type"],a:0,e:"An rvalue reference is declared using the double ampersand syntax (`&&`). [move-easy]"},
      {d:"easy",q:"What is printed?",c:"class A {\npublic:\n  A() { std::cout << \"C\"; }\n  A(const A&) { std::cout << \"K\"; }\n  A(A&&) { std::cout << \"M\"; }\n};\nint main() {\n  A a;\n  A b = std::move(a);\n}",o:["CM","CK","CC","Error"],a:0,e:"A a constructs (C). A b = std::move(a) converts a to rvalue, triggering the move constructor (M). Output: CM. [move-easy]"},
      {d:"medium",q:"Which value categories were introduced in C++11 to support move semantics?",c:"",o:["prvalue, xvalue, lvalue","lvalue, rvalue","static, dynamic","const, volatile"],a:0,e:"C++11 categorized values into: prvalue (pure rvalue), xvalue (eXpiring value), and lvalue (local value). [move-medium]"},
      {d:"medium",q:"What state is a source object left in after its resources are moved?",c:"",o:["A valid but unspecified state (where it can be safely destroyed, but contents are cleared/moved)","It is completely deleted from memory.","It is set to nullptr.","It is in an undefined corrupted state."],a:0,e:"Moved-from objects must remain in a valid, destructible state. For safety, pointers should be set to nullptr. [move-medium]"},
      {d:"medium",q:"What is printed?",c:"class A {\n  int* p;\npublic:\n  A() : p(new int(5)) {}\n  ~A() { delete p; }\n  A(A&& o) noexcept : p(o.p) { o.p = nullptr; }\n};\nint main() {\n  A a;\n  A b = std::move(a);\n  std::cout << \"OK\";\n}",o:["OK","Error","Crash","5"],a:0,e:"The move constructor transfers the pointer and sets the source o.p to nullptr, preventing a double-free on destruction. Output: OK. [move-medium]"},
      {d:"medium",q:"Why should move constructors be marked noexcept?",c:"",o:["To enable STL containers (like std::vector) to use fast moves during reallocations instead of falling back to copies","To speed up compile speed","To prevent memory leaks","To make variables static"],a:0,e:"If the move constructor is not noexcept, STL containers fall back to copying to maintain strong exception safety. [move-medium]"},
      {d:"medium",q:"What is the \"Rule of Zero\"?",c:"",o:["A modern C++ guideline suggesting class designs leverage smart pointers and STL containers so you don't have to define any custom copy/move operations.","Declaring classes empty","Setting all pointers to 0","Bypassing constructors"],a:0,e:"The Rule of Zero advises delegating resource management to standard library wrappers, letting the compiler generate perfect copy/move operations automatically. [move-medium]"},
      {d:"hard",q:"What is perfect forwarding in C++ templates?",c:"",o:["A technique to forward function arguments to another function preserving their exact value category (lvalue/rvalue) using std::forward and universal references.","A compiler macro check","An optimization for virtual templates","A technique to compile functions faster"],a:0,e:"Perfect forwarding uses forwarding references (`T&&`) and `std::forward` to preserve parameter value types. [move-hard]"},
      {d:"hard",q:"What is a universal reference (forwarding reference) in templates?",c:"",o:["An rvalue reference syntax (T&&) placed on a deduced template parameter, which can bind to both lvalues and rvalues","A pointer to a global variable","A template class argument","An inline function optimization"],a:0,e:"`T&&` on a template argument `T` acts as a forwarding reference, matching lvalue reference `T&` or rvalue reference `T&&`. [move-hard]"},
      {d:"hard",q:"What is printed by this program illustrating rvalue reference overload binding?",c:"class A {\npublic:\n  void f(int& x) { std::cout << \"L\"; }\n  void f(int&& x) { std::cout << \"R\"; }\n};\nint main() {\n  A a;\n  int n = 5;\n  a.f(n); a.f(5);\n}",o:["LR","LL","RR","RL"],a:0,e:"n is a named variable, matching lvalue int& (L). 5 is a temporary literal, matching rvalue int&& (R). Output: LR. [move-hard]"},
      {d:"hard",q:"What is printed by this move-assignment self-assignment check?",c:"class A {\npublic:\n  int* p;\n  A() : p(new int(1)) {}\n  ~A() { delete p; }\n  A& operator=(A&& o) noexcept {\n    if (this != &o) {\n      delete p;\n      p = o.p;\n      o.p = nullptr;\n    }\n    return *this;\n  }\n};\nint main() {\n  A a;\n  a = std::move(a); // Self-assignment!\n  std::cout << *a.p;\n}",o:["1","Crash","0","Error"],a:0,e:"Because operator= checks `this != &o`, the self-assignment is safely intercepted, and a.p is not deleted. Output: 1. [move-hard]"},
      {d:"hard",q:"Under what conditions does the compiler refuse to generate default move operations?",c:"",o:["If the class defines a custom destructor, copy constructor, or copy assignment operator.","If the class has static members.","If the class contains templates.","If the class resides inside namespaces."],a:0,e:"According to the Rule of Five, defining any custom copy or destructor block suppresses the automatic generation of move constructors/assignments. [move-hard]"},
      {d:"easy",q:"What is printed?",c:"int main() {\n  auto f = [](int x) { return x * 2; };\n  std::cout << f(5);\n}",o:["10","5","x*2","Error"],a:0,e:"Lambda doubles its arg. f(5)=5*2=10. [lam-easy]"},
      {d:"easy",q:"What is printed?",c:"int main() {\n  int x = 10;\n  auto f = [x]() { std::cout << x; };\n  x = 20;\n  f();\n}",o:["10","20","x","Error"],a:0,e:"[x] captures by value at lambda creation. x=10 at that time, later x=20 doesnt affect it. [lam-easy]"},
      {d:"easy",q:"What is printed?",c:"int main() {\n  int x = 10;\n  auto f = [&x]() { x++; };\n  f(); f();\n  std::cout << x;\n}",o:["12","10","11","Error"],a:0,e:"[&x] captures by reference. Two increments: x becomes 12. [lam-easy]"},
      {d:"easy",q:"What are the three main components of a C++ lambda expression?",c:"",o:["Capture clause [], Parameter list (), and Function body {}","Templates, functions, and structs","static, dynamic, and virtual specifiers","public, private, and protected labels"],a:0,e:"A lambda is structured as: `[captures](parameters) -> return_type { body }`. [lam-easy]"},
      {d:"easy",q:"What does the capture-all by value [=] represent?",c:"",o:["Captures all local variables in scope by copying their values into the lambda closure object","Captures all variables by reference","Disables variable captures","Allocates lambda on heap"],a:0,e:"`[=]` captures every local variable in the enclosing scope by copying their values at the moment the lambda is constructed. [lam-easy]"},
      {d:"medium",q:"What is a generic lambda in C++14?",c:"",o:["A lambda that uses auto in its parameter list, generating a templated calling operator under the hood","A lambda inside a namespace template","A lambda returning generic void","A lambda with compile-time constraints only"],a:0,e:"Generic lambdas accept auto parameters, compiling into templated `operator()` methods in the anonymous closure class. [lam-medium]"},
      {d:"medium",q:"What is a mutable lambda in C++?",c:"",o:["A lambda marked mutable, allowing it to modify variables captured by value inside its body (modifying the closure copies)","A lambda that can be run on multiple threads","A lambda returning dynamic values","A compile-time macro"],a:0,e:"By default, lambda calling operators are const. The mutable keyword removes this restriction, allowing captured copies to be modified. [lam-medium]"},
      {d:"medium",q:"What is printed by this generic lambda program?",c:"int main() {\n  auto f = [](auto x, auto y) { return x + y; };\n  std::cout << f(3, 4.5);\n}",o:["7.5","7","8","Error"],a:0,e:"Generic lambda deduces parameters as int and double, returning double sum = 7.5. [lam-medium]"},
      {d:"medium",q:"Can a lambda be converted to a raw function pointer in C++?",c:"",o:["Yes, but ONLY if the lambda has an empty capture list [].","Yes, all lambdas can be converted.","No, lambdas are class functors.","No, unless templates are disabled."],a:0,e:"A lambda with no captures compiles into a class with an implicit conversion operator to a raw function pointer. [lam-medium]"},
      {d:"medium",q:"What is the capture initializer pattern in C++14?",c:"",o:["A feature allowing us to define and initialize new variables directly inside the capture list (e.g. [p = std::move(ptr)])","A static constructor block","A template instantiation","A compiler optimizer"],a:0,e:"Capture initialization allows moving variables (like unique_ptrs) directly into the lambda closure scope. [lam-medium]"},
      {d:"hard",q:"What is the memory size of a lambda closure object?",c:"",o:["It is exactly the size of all variables captured in its capture list (plus padding), behaving like a struct containing those variables.","It is always 1 byte.","It is always 8 bytes (pointer size).","It is dynamically allocated on the heap."],a:0,e:"A lambda compiles into an anonymous class. Captured variables are stored as member variables, making the closure size match their aggregate size. [lam-hard]"},
      {d:"hard",q:"What is printed by this lambda capture-this vs capture-value program?",c:"struct A {\n  int val = 10;\n  auto get() {\n    return [*this]() { std::cout << val; }; // capture copy of object!\n  }\n};\nint main() {\n  A* a = new A();\n  auto f = a->get();\n  a->val = 20;\n  f();\n  delete a;\n}",o:["10","20","Error","Crash"],a:0,e:"C++17 `[*this]` captures a copy of the host object at creation. Even though `a->val` becomes 20, the copy retains 10. Output: 10. [lam-hard]"},
      {d:"hard",q:"What is printed by this lambda overloading patterns program?",c:"#include <iostream>\n#include <variant>\n#include <visit>\ntemplate<class... Ts> struct overloaded : Ts... { using Ts::operator()...; };\ntemplate<class... Ts> overloaded(Ts...) -> overloaded<Ts...>;\nint main() {\n  std::variant<int, std::string> v = 42;\n  std::visit(overloaded {\n    [](int arg) { std::cout << \"I\"; },\n    [](const std::string& arg) { std::cout << \"S\"; }\n  }, v);\n}",o:["I","S","IS","Error"],a:0,e:"The overloaded struct aggregates multiple lambdas into one callable visitor. Since variant contains int, the int lambda runs, printing I. [lam-hard]"},
      {d:"hard",q:"Can you write a recursive lambda in C++?",c:"",o:["Yes, by capturing a std::function wrapper of the lambda by reference, or using generic auto parameters in C++14.","No, lambdas cannot call themselves.","Yes, but only if they are declared inside a struct.","No, unless they are marked virtual."],a:0,e:"Because the lambda type is anonymous, recursive calls require reference-capturing a `std::function` wrapper of the signature, or leveraging C++14 auto generic parameters. [lam-hard]"},
      {d:"hard",q:"What is printed by this lambda capture by reference lifecycle program?",c:"#include <functional>\nstd::function<void()> f;\nvoid build() {\n  int x = 10;\n  f = [&x]() { std::cout << x; };\n}\nint main() {\n  build();\n  // f(); // What happens if run?\n  std::cout << \"OK\";\n}",o:["OK","Dangling reference crash/undefined if f() was run","Prints 10","Error"],a:0,e:"x is on the stack inside build(). f captures x by reference. Once build() exits, x is destroyed, making calling f() undefined behavior. Output: OK. [lam-hard]"},
      {d:"easy",q:"What is printed?",c:"namespace ns {\n  int val = 7;\n}\nint main() {\n  std::cout << ns::val;\n}",o:["7","ns","val","Error"],a:0,e:"ns::val accesses the variable val in namespace ns. [ns-easy]"},
      {d:"easy",q:"What is printed?",c:"namespace A {\n  namespace B {\n    int x = 5;\n  }\n}\nint main() {\n  std::cout << A::B::x;\n}",o:["5","AB","x","Error"],a:0,e:"Nested namespace A::B contains x=5. [ns-easy]"},
      {d:"easy",q:"Why should \"using namespace std;\" be avoided in header files?",c:"",o:["It pollutes the global namespace for any file that includes the header, leading to naming collisions.","It makes compilation fail instantly.","It slows down dynamic dispatch.","It disables static assertions."],a:0,e:"Wide namespace imports in headers contaminate the global scope for all downstream files that include the header. [ns-easy]"},
      {d:"easy",q:"What is a namespace alias in C++?",c:"",o:["A shortcut name given to a long or nested namespace path (e.g. namespace FB = Facebook::Core::Billing;)","A macro variable","A virtual inheritance pointer","An anonymous namespace declaration"],a:0,e:"Namespace aliases simplify code by assigning shorter, readable prefixes to highly nested namespace chains. [ns-easy]"},
      {d:"easy",q:"What does the global scope resolution operator :: without a prefix refer to?",c:"",o:["The global namespace scope","The class scope pointer","A virtual method table","The local namespace scope"],a:0,e:"An unadorned `::x` refers explicitly to the variable `x` defined in the global namespace scope. [ns-easy]"},
      {d:"medium",q:"What is the purpose of an inline namespace in C++?",c:"",o:["To export members automatically to the enclosing namespace, allowing transparent library versioning","To speed up method lookups","To inline virtual functions","To define static templates"],a:0,e:"Members of an inline namespace are automatically visible in the outer parent namespace, enabling API version promotions. [ns-medium]"},
      {d:"medium",q:"What is an anonymous (unnamed) namespace in C++?",c:"",o:["A namespace restricting access of its members to the current translation unit only (similar to static linkage in C)","A namespace without variables","A template parameter namespace","A public class wrapper"],a:0,e:"Unnamed namespaces isolate variables and classes to a single translation unit, preventing linkage name collisions across files. [ns-medium]"},
      {d:"medium",q:"What is Argument-Dependent Lookup (ADL / Koenig Lookup) in C++?",c:"",o:["The compiler searches for functions in the namespaces of the arguments passed to the function call.","A template casting optimization","A static namespace resolution check","An exception unwinding step"],a:0,e:"ADL allows the compiler to resolve unqualified calls (like `operator<<`) by scanning namespaces associated with the function's parameters. [ns-medium]"},
      {d:"medium",q:"What is printed?",c:"namespace A {\n  int val = 1;\n}\nnamespace B {\n  using namespace A;\n  int val = 2;\n}\nint main() {\n  std::cout << B::val;\n}",o:["2","1","Error","Ambiguous"],a:0,e:"B defines its own val = 2, which takes priority in its scope over the imported A::val. Output: 2. [ns-medium]"},
      {d:"medium",q:"Can you declare using-directives inside local function scopes in C++?",c:"",o:["Yes, the imported names are visible only within that specific function scope.","No, using directives must be global.","No, they are only allowed in classes.","Yes, but only for structs."],a:0,e:"C++ allows importing namespaces inside local function blocks, limiting scope pollution strictly to that block. [ns-medium]"},
      {d:"hard",q:"What is printed by this program illustrating ADL and namespaces?",c:"namespace A {\n  struct X {};\n  void run(X) { std::cout << \"A\"; }\n}\nint main() {\n  A::X obj;\n  run(obj); // No namespace prefix! Found via ADL!\n}",o:["A","Error","X","Nothing"],a:0,e:"Since obj is of type A::X, Argument-Dependent Lookup (ADL) successfully scans namespace A and binds the call to A::run(). Output: A. [ns-hard]"},
      {d:"hard",q:"What is printed by this inline namespace versioning program?",c:"namespace Lib {\n  inline namespace V2 {\n    void f() { std::cout << \"2\"; }\n  }\n  namespace V1 {\n    void f() { std::cout << \"1\"; }\n  }\n}\nint main() {\n  Lib::f();\n}",o:["2","1","Error","Ambiguous"],a:0,e:"V2 is inline, making its members visible directly inside Lib. Lib::f() resolves transparently to V2::f(), printing 2. [ns-hard]"},
      {d:"hard",q:"How can we prevent ADL from resolving a function call?",c:"",o:["By wrapping the function call in parentheses (e.g. (f)(arg)), which suppresses Koenig lookup.","By making the variables static.","By declaring using namespace std.","It is impossible."],a:0,e:"Enclosing the function name in parentheses prevents the compiler from analyzing argument types for ADL, forcing standard name lookup. [ns-hard]"},
      {d:"hard",q:"What is printed by this nested namespace name lookup conflict program?",c:"int x = 1;\nnamespace Outer {\n  int x = 2;\n  namespace Inner {\n    void f() { std::cout << ::x; }\n  }\n}\nint main() {\n  Outer::Inner::f();\n}",o:["1","2","Error","Undefined"],a:0,e:"The unadorned scope resolution operator :: explicitly targets the global namespace, bypassing Outer::x. Output: 1. [ns-hard]"},
      {d:"hard",q:"What is a drawback of using unnamed namespaces in header files?",c:"",o:["It duplicates definitions in every translation unit that includes the header, causing linker conflicts and massive binary bloat.","It disables public classes.","It disables templates.","It throws exceptions compiled."],a:0,e:"Unnamed namespaces have internal linkage. Placing them in headers duplicates variables in each compiling source file, causing ODR violations. [ns-hard]"},
      {d:"easy",q:"What is printed?",c:"int main() {\n  double d = 3.7;\n  int x = (int)d;\n  std::cout << x;\n}",o:["3","4","3.7","Error"],a:0,e:"C-style cast from double to int truncates the decimal: 3.7 becomes 3. [cast-easy]"},
      {d:"easy",q:"Which C++ cast operator is used to perform safe, basic compile-time conversions (like numeric casts)?",c:"",o:["static_cast","dynamic_cast","const_cast","reinterpret_cast"],a:0,e:"static_cast handles related, compile-time conversions (like float to int, or upcasting pointers). [cast-easy]"},
      {d:"easy",q:"Why are explicit C++ casts preferred over C-style casts?",c:"",o:["They are explicit, type-safe, validated by the compiler, and easy to find in code.","They run faster at execution.","They reduce object memory footprint.","They are resolved at link time."],a:0,e:"C-style casts perform violent, unverified conversions. C++ casts enforce compiler type checks and clarify intent. [cast-easy]"},
      {d:"easy",q:"Which cast operator is used exclusively to add or remove constness from variables?",c:"",o:["const_cast","static_cast","reinterpret_cast","dynamic_cast"],a:0,e:"const_cast is the only cast operator capable of casting away or adding const restrictions. [cast-easy]"},
      {d:"easy",q:"What is printed by this implicit upcast program?",c:"class Base {};\nclass Der : public Base {};\nint main() {\n  Der d;\n  Base* b = &d;\n  std::cout << \"OK\";\n}",o:["OK","Error","Crash","Undefined"],a:0,e:"Casting a derived class pointer to a public base class pointer (upcasting) is safe and handled implicitly by C++. Output: OK. [cast-easy]"},
      {d:"medium",q:"Which cast operator safely downcasts polymorphic class pointers at runtime, verifying the actual type?",c:"",o:["dynamic_cast","static_cast","const_cast","reinterpret_cast"],a:0,e:"dynamic_cast downcasts polymorphic pointers, using Runtime Type Information (RTTI) to return nullptr on failure. [cast-medium]"},
      {d:"medium",q:"What does dynamic_cast return if a pointer conversion fails?",c:"",o:["nullptr","An invalid pointer","std::bad_cast exception","The base pointer itself"],a:0,e:"When casting pointer types, dynamic_cast returns `nullptr` on failure. (For references, it throws `std::bad_cast`). [cast-medium]"},
      {d:"medium",q:"What is the purpose of reinterpret_cast in C++?",c:"",o:["To perform raw, unsafe bit-level pointer casts, treating memory as a completely different type","To cast virtual interfaces","To remove const restrictions","To optimize dynamic tables"],a:0,e:"reinterpret_cast converts between unrelated pointer types by simply copying the binary bit pattern. [cast-medium]"},
      {d:"medium",q:"What is printed?",c:"class Base { public: virtual ~Base() {} };\nclass Der : public Base {};\nint main() {\n  Base* b = new Base();\n  Der* d = dynamic_cast<Der*>(b);\n  std::cout << (d == nullptr);\n}",o:["1","0","Error","Crash"],a:0,e:"b is an instance of Base, not Der. The dynamic downcast fails, returning nullptr (1). Output: 1. [cast-medium]"},
      {d:"medium",q:"What is printed by this const_cast modification test?",c:"#include <iostream>\nvoid update(const int* p) {\n  int* mp = const_cast<int*>(p);\n  *mp = 42;\n}\nint main() {\n  int x = 10;\n  update(&x);\n  std::cout << x;\n}",o:["42","10","Error","Crash"],a:0,e:"x resides in writeable memory. casting away const and modifying it is legal and updates x to 42. [cast-medium]"},
      {d:"hard",q:"What happens when const_cast is used to modify a variable that was originally declared const?",c:"const int x = 10;\nint* p = const_cast<int*>(&x);\n*p = 20; // What happens?",o:["Undefined behavior (often a crash or ignored write if stored in read-only memory)","x updates to 20","Compilation error","Memory is leaked"],a:0,e:"Modifying a truly const variable (stored in compiler read-only memory) leads to undefined behavior. [cast-hard]"},
      {d:"hard",q:"What is strict aliasing in C++ reinterpret_casts?",c:"",o:["A compiler rule stating that two pointers of different types cannot point to the same memory cell, allowing aggressive optimization unless cast violates it.","A template specialization check","A virtual base offset rule","An exception safety standard"],a:0,e:"Strict aliasing lets compilers assume pointer types don't overlap. Violating this rule via reinterpret_cast causes compiler optimization bugs. [cast-hard]"},
      {d:"hard",q:"What is printed by this dynamic cross-casting program in multiple inheritance?",c:"class I1 { public: virtual ~I1() {} };\nclass I2 { public: virtual ~I2() {} };\nclass Der : public I1, public I2 {};\nint main() {\n  I1* p1 = new Der();\n  I2* p2 = dynamic_cast<I2*>(p1); // Cross cast!\n  std::cout << (p2 != nullptr);\n}",o:["1","0","Error","Crash"],a:0,e:"Since p1 actually points to Der, dynamic_cast analyzes RTTI and successfully resolves the sibling interface address. Output: 1. [cast-hard]"},
      {d:"hard",q:"Can static_cast perform downcasting in polymorphic class trees?",c:"",o:["Yes, but it is unverified compile-time downcasting, faster than dynamic_cast but unsafe if the type is incorrect.","No, only dynamic_cast is allowed.","Yes, but only for template classes.","No, unless we use standard layouts."],a:0,e:"static_cast downcasting has zero runtime overhead but does not verify actual object type, easily causing memory corruption on errors. [cast-hard]"},
      {d:"hard",q:"What is printed by this function pointer reinterpret_cast program?",c:"#include <iostream>\nvoid f() { std::cout << \"F\"; }\nint main() {\n  void (*fp)() = &f;\n  auto fp2 = reinterpret_cast<void(*)()>(fp);\n  fp2();\n}",o:["F","Error","Nothing","Crash"],a:0,e:"Casting between function pointer types using reinterpret_cast and casting back to original before execution is fully legal. Output: F. [cast-hard]"},
      {d:"easy",q:"What is printed?",c:"class A {\n  int x = 5;\npublic:\n  int get() const { return x; }\n};\nint main() {\n  const A a;\n  std::cout << a.get();\n}",o:["5","const","x","Error"],a:0,e:"const object can only call const methods. get() returns x=5. [cexp-easy]"},
      {d:"easy",q:"What is printed?",c:"constexpr int square(int x) { return x * x; }\nint main() {\n  std::cout << square(4);\n}",o:["16","4","x*x","Error"],a:0,e:"constexpr: square(4)=4*4=16, computed at compile time. [cexp-easy]"},
      {d:"easy",q:"What is printed?",c:"constexpr int cube(int x) { return x * x * x; }\nint main() {\n  std::cout << cube(3);\n}",o:["27","9","3","Error"],a:0,e:"cube(3)=3*3*3=27, computed at compile time. [cexp-easy]"},
      {d:"easy",q:"What is a const member function in C++?",c:"",o:["A member function that guarantees it will not modify any non-static class member variables","A function returning const int","A static compiler function","An inline template method"],a:0,e:"A const member function cannot modify any non-static member variables (unless marked mutable). [cexp-easy]"},
      {d:"easy",q:"What is the difference between const and constexpr variables?",c:"",o:["const locks values runtime; constexpr guarantees compile-time constant evaluation.","They are identical.","constexpr resides on stack only.","const is compile-time only."],a:0,e:"const marks variables as runtime read-only. constexpr forces the compiler to evaluate the initialization at compile time. [cexp-easy]"},
      {d:"medium",q:"What is printed?",c:"#include <iostream>\nconstexpr int fib(int n) {\n  return n <= 1 ? n : fib(n - 1) + fib(n - 2);\n}\nint main() {\n  constexpr int val = fib(5);\n  std::cout << val;\n}",o:["5","8","13","Error"],a:0,e:"constexpr calculates fib(5) = 5 at compile-time, printing 5. [cexp-medium]"},

      {d:"medium",q:"Can you declare class constructors constexpr in C++?",c:"",o:["Yes, allowing objects to be fully constructed and initialized at compile-time.","No, constructors must execute at runtime.","Yes, but only if they are empty.","No, unless the class has virtual tables."],a:0,e:"constexpr constructors enable compile-time object generation, storing complete constant objects in the binary. [cexp-medium]"},
      {d:"medium",q:"What is printed by this static_assert check?",c:"constexpr int val = 100;\nstatic_assert(val == 100, \"Check\");\nint main() {\n  std::cout << \"OK\";\n}",o:["OK","Error","Check","Crash"],a:0,e:"The static_assert condition val == 100 is true, so the program compiles cleanly and prints OK. [cexp-medium]"},
      {d:"medium",q:"How do const pointer vs pointer to const differ?",c:"",o:["int* const is a const pointer (cannot change address); const int* is a pointer to const (cannot modify value).","They are identical.","One is static, other is dynamic.","const int* is illegal."],a:0,e:"`int* const` binds the pointer address; `const int*` protects the dereferenced target value from modifications. [cexp-medium]"},
      {d:"hard",q:"What is printed?",c:"class Vec {\n  int x, y;\npublic:\n  constexpr Vec(int a, int b) : x(a), y(b) {}\n  constexpr int dot(const Vec& o) const { return x * o.x + y * o.y; }\n};\nint main() {\n  constexpr Vec a(3, 4), b(1, 2);\n  constexpr int d = a.dot(b);\n  std::cout << d;\n}",o:["11","7","25","Error"],a:0,e:"dot product: 3*1+4*2=3+8=11. Computed at compile time (constexpr). [cexp-hard]"},

      {d:"hard",q:"Can a constexpr function contain loops and branch conditions?",c:"",o:["Yes (since C++14), allowing complex algorithms to run at compile-time.","No, they can only have single return statements.","Yes, but only if loops are static macros.","No, unless templates are used."],a:0,e:"C++14 relaxed constexpr constraints, allowing local variables, loops (`for`/`while`), and branches inside compile-time routines. [cexp-hard]"},

      {d:"easy",q:"What is the \"Rule of Three\" in C++?",c:"",o:["If you define a custom destructor, copy constructor, or copy assignment, you likely need all three.","A template specialization rule","A rule for dynamic allocation","A class access specifier guideline"],a:0,e:"Before C++11, if you managed raw resources requiring custom destructors, you needed custom copy semantics to prevent double frees. [ro5-easy]"},
      {d:"easy",q:"What does the copy assignment operator do?",c:"",o:["Overwrites an already existing object with a copy of another object","Constructs a new object from an old one","Moves resources between classes","Allocates memory on stack"],a:0,e:"Copy assignment operator (`operator=`) is invoked when assigning one existing object to another existing object of the same type. [ro5-easy]"},
      {d:"easy",q:"What is the difference between deep copy and shallow copy?",c:"",o:["Deep copy duplicates heap resources; shallow copy only copies pointer addresses.","They are identical.","Shallow copy is compile-time only.","Deep copy is static."],a:0,e:"Shallow copy replicates members as is, leaving both instances sharing heap addresses. Deep copy allocates fresh memory. [ro5-easy]"},
      {d:"easy",q:"How do you disable copying for a class in modern C++?",c:"",o:["By marking the copy constructor and copy assignment operator as deleted: `= delete;`","By placing them private only.","By using the mutable keyword.","By declaring the class static."],a:0,e:"Setting copy methods `= delete;` instructs the compiler to reject any code that attempts to copy class instances. [ro5-easy]"},
      {d:"easy",q:"What is printed?",c:"class A {\npublic:\n  A() { std::cout << \"C\"; }\n  ~A() { std::cout << \"D\"; }\n};\nint main() {\n  A a;\n}",o:["CD","C","D","Error"],a:0,e:"A is constructed (C) and destroyed (D) on scope exit. Output: CD. [ro5-easy]"},

      {d:"medium",q:"What is the \"Copy-and-Swap\" idiom?",c:"",o:["A robust implementation pattern for the copy assignment operator that uses a temporary copy and std::swap to provide strong exception safety","A template specialization","A casting routine","A dynamic lookup check"],a:0,e:"Copy-and-swap uses the copy constructor to build a temporary, then swaps members, automatically cleaning up old resources safely. [ro5-medium]"},
      {d:"medium",q:"What is printed?",c:"class A {\npublic:\n  int* p;\n  A() : p(new int(10)) {}\n  ~A() { delete p; }\n  A(const A& o) : p(new int(*o.p)) {}\n  A& operator=(const A& o) {\n    if (this != &o) { *p = *o.p; }\n    return *this;\n  }\n};\nint main() {\n  A a; A b = a; A c; c = a;\n  std::cout << *b.p << *c.p;\n}",o:["1010","10","Error","Crash"],a:0,e:"The class implements proper copy constructor (deep copy) and copy assignment, preventing heap corruption. Output: 1010. [ro5-medium]"},
      {d:"medium",q:"What happens when you declare a custom destructor without copy operations?",c:"",o:["The compiler still generates default copy operations which perform shallow copies, potentially causing double-free crashes.","Copies are disabled automatically.","The compiler throws a compile error.","The program leaks memory immediately."],a:0,e:"Custom destructors imply resource tracking. Leaving compiler default copy operations causes shallow copies and double-free vulnerabilities. [ro5-medium]"},
      {d:"medium",q:"What is printed?",c:"class A {\npublic:\n  A() {}\n  A(const A&) = delete;\n};\nint main() {\n  A a;\n  // A b = a; // Copy error!\n  std::cout << \"OK\";\n}",o:["OK","Error","Crash","Nothing"],a:0,e:"The copy ctor is deleted, preventing copy. Commenting out the copy makes the code compile and run, printing OK. [ro5-medium]"},
      {d:"hard",q:"What is printed by this program using the complete Rule of Five?",c:"class Resource {\npublic:\n  int* p;\n  Resource(int v) : p(new int(v)) {}\n  ~Resource() { delete p; }\n  Resource(Resource&& o) noexcept : p(o.p) { o.p = nullptr; }\n  Resource& operator=(Resource&& o) noexcept {\n    if (this != &o) { delete p; p = o.p; o.p = nullptr; }\n    return *this;\n  }\n};\nint main() {\n  Resource a(5);\n  Resource b = std::move(a);\n  std::cout << (a.p == nullptr) << *b.p;\n}",o:["15","05","1","Error"],a:0,e:"Move constructor steals pointer from a, setting a.p to nullptr (1), and assigns it to b (5). Output: 15. [ro5-hard]"},
      {d:"hard",q:"How does copy elision interact with the Rule of Five?",c:"",o:["Mandatory copy elision bypasses copy/move constructors entirely, constructing variables directly in the target address regardless of custom implementations.","It forces move copy.","It overrides copy operators.","It is static check only."],a:0,e:"Under C++17 copy elision, the compiler skips copy/move routines entirely, performing direct target scope construction. [ro5-hard]"},

      {d:"hard",q:"What is the risk of utilizing std::move on an object inside a self-move-assignment operator=?",c:"",o:["Without a self-assignment check, std::move transfers internal pointers to itself, which are then cleared, causing crashes or leaks.","It is legal and safe.","It speeds up execution.","It deletes class templates."],a:0,e:"Self-move-assignment without identity checks deletes its own memory before copying, leaving the object in a corrupt state. [ro5-hard]"},

      {d:"easy",q:"What is the purpose of the inline keyword in C++?",c:"",o:["To suggest that the compiler substitute function calls with their actual body code to avoid call overhead","To make variables static","To declare a method virtual","To run functions compile-time"],a:0,e:"The inline keyword suggests replacing function calls with inline code expansion to eliminate stack jumping overhead. [inl-easy]"},
      {d:"easy",q:"Where must inline functions be defined to be used across multiple translation units?",c:"",o:["In header files (so their bodies are visible to every compiling file)","In source files (.cpp) only","At the start of main()","Inside the class destructor"],a:0,e:"Because inline functions substitute code at call sites, their full definition must reside in header files. [inl-easy]"},
      {d:"easy",q:"Are methods defined directly inside a class body implicitly inlined?",c:"",o:["Yes, methods defined directly inside the class definition are implicitly inlined by the compiler.","No, they must be marked inline explicitly.","Yes, but only if they are private.","No, unless they are static."],a:0,e:"In C++, any member function declared and defined inside the class body is implicitly treated as an inline candidate. [inl-easy]"},
      {d:"easy",q:"How do inline functions compare to preprocessor macro functions?",c:"",o:["Inline functions are type-safe and verified by the compiler; macro functions perform raw text substitutions.","Macros are faster.","They are identical.","Inline functions are compile-time only."],a:0,e:"Inline functions preserve compiler type checking, scope boundaries, and execution rules, unlike unsafe macro substitutions. [inl-easy]"},
      {d:"easy",q:"What is printed?",c:"class Calc {\npublic:\n  inline int doubleVal(int n) { return n * 2; }\n};\nint main() {\n  Calc c;\n  std::cout << c.doubleVal(5);\n}",o:["10","5","Error","Nothing"],a:0,e:"The inline method calculates 5 * 2 = 10, running successfully. Output: 10. [inl-easy]"},
      {d:"medium",q:"How does the C++ One Definition Rule (ODR) interact with inline functions?",c:"",o:["Inline functions are allowed to be defined in multiple translation units, provided all definitions are identical.","Inline functions violate ODR.","They can only be defined once globally."," Linker merges them randomly."],a:0,e:"The linker allows duplicate inline definitions in headers, discarding duplicates and merging them into a single definition. [inl-medium]"},
      {d:"medium",q:"What is a risk of inlining large, complex functions?",c:"",o:["Code Bloat, increasing binary size and potentially hurting CPU instruction cache performance.","Compilation failures","Memory leaks","Disabling templates"],a:0,e:"Inlining large functions duplicates code at every call site, inflating binaries and reducing CPU cache efficiency. [inl-medium]"},
      {d:"medium",q:"What happens when you declare a virtual function inline?",c:"",o:["It is inlined when called through direct objects, but dispatched dynamically (vtable) when called through base pointers.","It is never inlined.","It causes a compilation error.","It disables dynamic binding."],a:0,e:"Virtual functions can be inlined if resolved statically. Dynamic pointer calls must still utilize the vtable. [inl-medium]"},

      {d:"hard",q:"How does the compiler evaluate the inline keyword?",c:"",o:["It treats inline as a mere hint, making the actual inlining decision based on internal budget heuristics and optimizations.","It forces inlining strictly.","It is ignored entirely.","It is resolved at link time."],a:0,e:"Compilers optimize aggressively, inlining small non-inline functions and rejecting inline keywords on massive routines. [inl-hard]"},

      {d:"hard",q:"Can an inline function contain a static local variable?",c:"",o:["Yes, and there will be exactly one shared instance of that static variable across all translation units.","No, local statics are forbidden.","Yes, but each file gets its own static variable.","No, unless templates are used."],a:0,e:"Despite inlining across multiple files, the standard guarantees that a single shared static variable instance is linked. [inl-hard]"},
      {d:"hard",q:"What is Profile-Guided Optimization (PGO) in function inlining?",c:"",o:["An advanced compiler optimization that uses runtime profiling data to identify high-frequency call sites and prioritize them for inlining.","A template specialization check","A virtual base offset finder","A manual code profiling tool"],a:0,e:"PGO guides inlining decisions using execution statistics, focusing cache space on frequently executed hot paths. [inl-hard]"}

    /* ── RUNTIME CLASSIFICATION OF QUESTIONS ── */
    function tagQuestions() {
      QS.forEach(q => {
        // 1. Explicit tag check (e.g. "[dma-easy]")
        const match = q.e ? q.e.match(/\[([a-zA-Z0-9]+)-(easy|medium|hard)\]/) : null;
        if (match) {
          q.topic = match[1];
          q.d = match[2];
          const tData = TOPICS_DATA[q.topic];
          q.category = tData ? tData.category : "Core";
        } else {
          // 2. Fallback to existing fuzzy keyword-based tagging
          const text = ((q.q || '') + ' ' + (q.c || '') + ' ' + (q.e || '')).toLowerCase();
          let cat = "Core";
          if (
            text.includes('move(') || text.includes('move semantics') || text.includes('&&') || 
            text.includes('lambda') || text.includes('constexpr') || 
            text.includes('cast') || text.includes('namespace') || text.includes('rule of five') || 
            text.includes('rule of 5') || text.includes('inline') || text.includes('decltype') ||
            text.includes('structured binding') || text.includes('noexcept') || text.includes('smart pointer') ||
            text.includes('unique_ptr') || text.includes('shared_ptr') || text.includes('weak_ptr')
          ) {
            cat = "Modern C++";
          } else if (
            text.includes('operator') || text.includes('friend') || text.includes('static') || 
            text.includes('template') || text.includes('typename') || text.includes('throw') || 
            text.includes('catch') || text.includes('try') || text.includes('stl') || 
            text.includes('vector') || text.includes('map') || text.includes('set') || 
            text.includes('stream') || text.includes('fstream') || text.includes('file') || 
            text.includes('raii') || text.includes('new') || text.includes('delete') ||
            text.includes('malloc') || text.includes('free') || text.includes('heap') ||
            text.includes('allocation')
          ) {
            cat = "Advanced";
          }
          q.category = cat;

          // Dynamic topic detection based on keywords
          let topicKey = "intro"; // default fallback
          if (text.includes('placement new') || text.includes('custom allocation') || text.includes('operator new') || text.includes('operator delete') || text.includes('malloc') || text.includes('free(') || text.includes('dynamic memory')) {
            topicKey = "dma";
          } else if (text.includes('destructor') || text.includes('constructor') || text.includes('ctor') || text.includes('~')) {
            topicKey = "ctor";
          } else if (text.includes('rule of five') || text.includes('rule of 5') || text.includes('rule of three') || text.includes('rule of 3') || text.includes('rule of zero') || text.includes('rule of 0')) {
            topicKey = "ro5";
          } else if (text.includes('move(') || text.includes('move semantics') || text.includes('rvalue reference') || text.includes('&&')) {
            topicKey = "move";
          } else if (text.includes('lambda') || text.includes('closure')) {
            topicKey = "lam";
          } else if (text.includes('constexpr') || text.includes('compile-time') || text.includes('static_assert')) {
            topicKey = "cexp";
          } else if (text.includes('smart pointer') || text.includes('unique_ptr') || text.includes('shared_ptr') || text.includes('weak_ptr') || text.includes('make_unique') || text.includes('make_shared')) {
            topicKey = "sptr";
          } else if (text.includes('raii') || text.includes('lock_guard') || text.includes('mutex') || text.includes('scoped_lock')) {
            topicKey = "raii";
          } else if (text.includes('cast') || text.includes('static_cast') || text.includes('dynamic_cast') || text.includes('reinterpret_cast') || text.includes('const_cast')) {
            topicKey = "cast";
          } else if (text.includes('namespace') || text.includes('using namespace')) {
            topicKey = "ns";
          } else if (text.includes('inline')) {
            topicKey = "inl";
          } else if (text.includes('exception') || text.includes('throw') || text.includes('catch') || text.includes('try') || text.includes('noexcept')) {
            topicKey = "exc";
          } else if (text.includes('operator') || text.includes('operator+') || text.includes('operator-') || text.includes('operator<<') || text.includes('operator=')) {
            topicKey = "opov";
          } else if (text.includes('friend')) {
            topicKey = "friend";
          } else if (text.includes('static ') || text.includes('static_') || text.includes('::')) {
            topicKey = "static";
          } else if (text.includes('template') || text.includes('typename') || text.includes('template<')) {
            topicKey = "tpl";
          } else if (text.includes('vector') || text.includes('map') || text.includes('set') || text.includes('unordered_') || text.includes('list') || text.includes('stl') || text.includes('queue') || text.includes('deque') || text.includes('stack')) {
            topicKey = "stl";
          } else if (text.includes('stream') || text.includes('fstream') || text.includes('ifstream') || text.includes('ofstream') || text.includes('file')) {
            topicKey = "fio";
          } else if (text.includes('virtual') || text.includes('vtable') || text.includes('vptr') || text.includes('dynamic dispatch')) {
            topicKey = "virt";
          } else if (text.includes('pure virtual') || text.includes('abstract class') || text.includes('interface')) {
            topicKey = "abs";
          } else if (text.includes('polymorphism') || text.includes('override') || text.includes('overload')) {
            topicKey = "poly";
          } else if (text.includes('inheritance') || text.includes('derived') || text.includes('base class') || text.includes('diamond')) {
            topicKey = "inh";
          } else if (text.includes('encapsulation') || text.includes('data hiding') || text.includes('getter') || text.includes('setter')) {
            topicKey = "enc";
          } else if (text.includes('access specifier') || text.includes('public') || text.includes('private') || text.includes('protected')) {
            topicKey = "access";
          } else if (text.includes('new') || text.includes('delete') || text.includes('malloc') || text.includes('free') || text.includes('placement new') || text.includes('dynamic memory') || text.includes('heap') || text.includes('allocation')) {
            topicKey = "dma";
          } else if (text.includes('class') || text.includes('object') || text.includes('struct') || text.includes('this pointer')) {
            topicKey = "classes";
          } else {
            topicKey = "intro";
          }
          q.topic = topicKey;
        }
      });
    }
    tagQuestions();

    /* ── DYNAMIC GENERATION OF SIDEBAR NAVIGATION ── */
    const TOPIC_KEYS = Object.keys(TOPICS_DATA);
    
    function buildSidebar() {
      const navList = document.getElementById('sidebarNav');
      let html = `<li><a href="#home" class="active">🏠 Dashboard</a></li>`;
      
      const categories = ["Core", "Advanced", "Modern C++"];
      categories.forEach(cat => {
        html += `<li><span class="sh">${cat}</span></li>`;
        TOPIC_KEYS.forEach(key => {
          const t = TOPICS_DATA[key];
          if (t.category === cat) {
            html += `<li><a href="#topic/${key}" id="nav-${key}">✦ ${t.title}</a></li>`;
          }
        });
      });
      
      html += `<li><span class="sh">Quiz</span></li>`;
      html += `<li><a href="#quiz" id="nav-quiz">🎯 Quiz</a></li>`;
      
      navList.innerHTML = html;
    }
    
    buildSidebar();

    /* ── ROUTING MATRIX ── */
    function router() {
      const hash = location.hash || '#home';
      const app = document.getElementById('app');
      
      // Clear styling active flags
      document.querySelectorAll('aside nav a').forEach(el => el.classList.remove('active'));
      
      app.innerHTML = `<div class="page-fade" id="pageContainer"></div>`;
      const container = document.getElementById('pageContainer');
      
      if (hash === '#home' || hash === '#') {
        document.querySelector('aside nav a[href="#home"]').classList.add('active');
        renderHome(container);
      } else if (hash === '#quiz') {
        const quizNav = document.getElementById('nav-quiz');
        if (quizNav) quizNav.classList.add('active');
        renderQuiz(container);
      } else if (hash.startsWith('#topic/')) {
        const slug = hash.split('/')[1];
        const topic = TOPICS_DATA[slug];
        if (topic) {
          const navEl = document.getElementById(`nav-${slug}`);
          if (navEl) navEl.classList.add('active');
          renderTopic(container, slug, topic);
        } else {
          location.hash = '#home';
        }
      } else {
        location.hash = '#home';
      }
      
      window.scrollTo(0,0);
    }
    
    window.addEventListener('hashchange', router);
    window.addEventListener('load', router);

    /* ── RENDER COMPONENT: HOME PAGE ── */

      let cardsHtml = '';
      TOPIC_KEYS.forEach(key => {
        const t = TOPICS_DATA[key];
        cardsHtml += `
          <a href="#topic/${key}" class="landing-card">
            <span class="card-cat">${t.category}</span>
            <h3>${t.title}</h3>
            <p>${t.definition.slice(0, 110)}...</p>
            <div class="card-footer">Explore Topic <span>&rarr;</span></div>
          </a>
        `;
      });
      
      container.innerHTML = `
        <div class="hero">
          <span class="hero-pre">C++ Core Reference Manual</span>
          <h1>Master Object-Oriented<br>Programming in <em>C++</em></h1>
          <p>An elite, interactive handbook dedicated to modern, high-performance object-oriented programming. Explore 26 detailed topics with exhaustive theory and take the dynamic timed quiz.</p>
        </div>
        
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-val">26</div>
            <div class="stat-label">Detailed Topics</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">390</div>
            <div class="stat-label">Verbatim Questions</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">100%</div>
            <div class="stat-label">Free &amp; Offline</div>
          </div>
        </div>
        
        <h2 class="section-title">Reference Modules</h2>
        <div class="landing-grid">
          ${cardsHtml}

      `;

    /* ── RENDER COMPONENT: TOPIC DETAILS ── */
    function renderTopic(container, slug, topic) {
      const idx = TOPIC_KEYS.indexOf(slug);
      const prevSlug = idx > 0 ? TOPIC_KEYS[idx - 1] : null;
      const nextSlug = idx < TOPIC_KEYS.length - 1 ? TOPIC_KEYS[idx + 1] : null;
      
      let conceptsHtml = '';
